<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Signal Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050010;
            --accent-purple: #7b2cbf;
            --accent-blue: #3a86ff;
            --accent-cyan: #00f2ea;
            --text-color: #ffffff;
            --brand-red: #ff334b;
            --brand-green: #00ff41;
            --glass-panel: rgba(20, 20, 30, 0.6);
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            height: 100vh;
            position: relative;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .terminal-text {
            color: var(--accent-cyan); font-family: 'Orbitron', monospace; 
            font-size: 12px; line-height: 1.6; text-align: left; width: 80%;
        }

        /* --- BACKGROUND --- */
        .cyber-wrapper {
            position: absolute; width: 100%; height: 100%; overflow: hidden;
            background: linear-gradient(to bottom, #020005 0%, #10002b 100%);
            z-index: -2; perspective: 600px;
        }
        .cyber-grid {
            position: absolute; bottom: -40%; left: -50%; width: 200%; height: 100%;
            background-image: 
                linear-gradient(90deg, rgba(58, 134, 255, 0.15) 1px, transparent 1px),
                linear-gradient(0deg, rgba(123, 44, 191, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(50deg);
            animation: cyberMove 3s linear infinite;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 60%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 60%);
        }
        @keyframes cyberMove { 0% { background-position: 0 0; } 100% { background-position: 0 50px; } }

        /* --- HUD (Исправил отступы Пинга) --- */
        .hud-bar {
            position: absolute; top: 0; left: 0; width: 100%; 
            /* Увеличил padding справа до 40px, чтобы пинг не улетал */
            padding: 15px 40px 15px 20px; 
            display: flex; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 11px;
            color: rgba(255, 255, 255, 0.5); z-index: 50; pointer-events: none;
        }
        .status-dot {
            width: 6px; height: 6px; background-color: var(--brand-green);
            border-radius: 50%; box-shadow: 0 0 5px var(--brand-green);
            display: inline-block; margin-right: 5px;
        }
        .ping-value { color: var(--accent-cyan); font-weight: bold; }

        /* --- LANGUAGE SELECTOR (Теперь глобальный, виден везде) --- */
        .lang-container { 
            position: absolute; top: 50px; right: 20px; z-index: 60; /* z-index выше чем у экранов */
        }
        select {
            background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 10px; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 12px;
            outline: none; backdrop-filter: blur(10px); cursor: pointer;
        }
        option { background: #000; color: #fff; }

        /* --- SESSION ID --- */
        .session-id {
            position: absolute; bottom: 15px; left: 0; width: 100%;
            text-align: center; font-family: 'Orbitron', sans-serif; font-size: 10px;
            color: rgba(255, 255, 255, 0.3); letter-spacing: 1px;
            z-index: 5; pointer-events: none;
        }

        /* --- MODAL (Security) --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            z-index: 1000; justify-content: center; align-items: center; flex-direction: column;
        }
        .pin-container {
            background: #0a0a0a; border: 1px solid rgba(123, 44, 191, 0.5);
            border-radius: 20px; padding: 25px; width: 280px; position: relative;
            box-shadow: 0 0 40px rgba(123, 44, 191, 0.2);
            display: flex; flex-direction: column; align-items: center;
        }
        .close-modal-btn {
            position: absolute; top: 15px; right: 20px; color: #fff; opacity: 0.5;
            font-size: 20px; cursor: pointer;
        }
        .pin-header {
            font-family: 'Orbitron', sans-serif; color: var(--accent-cyan);
            font-size: 14px; letter-spacing: 2px; margin-bottom: 20px; margin-top: 10px;
        }
        .pin-display {
            width: 100%; height: 50px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Orbitron', sans-serif; font-size: 22px; color: #fff;
            letter-spacing: 5px; margin-bottom: 20px;
        }
        .pin-display.success { color: var(--brand-green); border-color: var(--brand-green); }
        .pin-display.error { color: var(--brand-red); border-color: var(--brand-red); animation: shake 0.3s; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .key {
            height: 55px; background: rgba(255,255,255,0.05); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05); color: #fff;
            font-family: 'Orbitron', sans-serif; font-size: 18px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .key:active { background: rgba(255,255,255,0.1); transform: scale(0.96); }
        .key-action.enter { color: var(--brand-green); }
        .key-action.clear { color: var(--brand-red); }

        /* --- MAIN SCREEN --- */
        .screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%; position: relative; z-index: 10;
        }
        .screen.active { display: flex; }

        .main-logo { text-align: center; margin-bottom: 30px; }
        .logo-title {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 28px; color: #fff;
            text-shadow: 0 0 20px rgba(58, 134, 255, 0.6); letter-spacing: 1px;
            background: linear-gradient(180deg, #fff 0%, #c0c0c0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-subtitle {
            font-size: 10px; color: var(--accent-cyan); letter-spacing: 4px;
            text-transform: uppercase; margin-top: 5px; opacity: 0.8;
        }

        .menu-header {
            font-family: 'Orbitron', sans-serif; font-size: 14px; margin-bottom: 20px;
            text-transform: uppercase; letter-spacing: 2px; color: rgba(255, 255, 255, 0.7); text-align: center;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; }
        
        /* КАРТОЧКИ ИГР */
        .game-card {
            background: var(--glass-panel); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px;
            text-align: center; cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .game-card:active { transform: scale(0.96); }
        .game-img { width: 75px; height: 75px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .game-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 13px; color: #fff; letter-spacing: 0.5px; }

        /* LOCKED CARDS (Mines & Soon) */
        .game-card.locked {
            opacity: 0.7; cursor: not-allowed;
            background: rgba(10, 10, 15, 0.4);
        }
        /* При наведении они светятся, но не кликаются */
        .game-card.locked:hover {
            opacity: 1;
            border-color: var(--accent-purple);
            box-shadow: 0 0 20px rgba(123, 44, 191, 0.3);
            transform: translateY(-2px);
        }
        .lock-icon {
            position: absolute; top: 10px; right: 10px; font-size: 14px;
            color: rgba(255,255,255,0.5);
        }

        /* --- GAME UI --- */
        
        /* Кнопка поддержки */
        .telegram-link {
            text-decoration: none; font-family: 'Orbitron', sans-serif; color: var(--accent-cyan);
            border: 1px solid rgba(0, 242, 234, 0.3); padding: 8px 16px; border-radius: 20px;
            font-size: 12px; letter-spacing: 1px; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px); margin-bottom: 20px; transition: 0.3s;
            display: inline-block;
        }
        .telegram-link:hover { background: rgba(0, 242, 234, 0.1); box-shadow: 0 0 15px rgba(0, 242, 234, 0.2); }

        .circle-container {
            position: relative; width: 260px; height: 260px; 
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 25px;
        }
        .circle-glow {
            position: absolute; width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle, rgba(58, 134, 255, 0.15) 0%, transparent 70%);
            animation: pulseCore 3s infinite alternate;
        }
        @keyframes pulseCore { 0% { opacity: 0.3; transform: scale(0.9); } 100% { opacity: 0.6; transform: scale(1.1); } }

        .progress-ring { transform: rotate(-90deg); z-index: 1; }
        .progress-ring__circle { transition: stroke-dashoffset 0.5s ease-in-out; }
        
        .coef-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
            font-family: 'Orbitron', sans-serif; font-size: 52px; font-weight: 900;
            color: #fff; text-shadow: 0 0 30px rgba(255, 255, 255, 0.4); 
            z-index: 2; width: 100%; text-align: center;
        }

        .risk-block {
            position: absolute; top: 65%; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 10px; 
            opacity: 0; transition: opacity 0.5s; z-index: 3;
        }
        .risk-item {
            background: rgba(0,0,0,0.8); padding: 3px 8px; border-radius: 4px;
            font-family: 'Orbitron', sans-serif; font-size: 9px; color: #888; border: 1px solid rgba(255,255,255,0.1);
        }
        .risk-val { color: #fff; font-weight: bold; margin-left: 4px; }
        .risk-val.safe { color: var(--brand-green); }
        .risk-val.medium { color: #ffd700; }
        .risk-val.high { color: var(--brand-red); }

        .btn-signal {
            background: linear-gradient(90deg, #d6002a 0%, #8a001a 100%);
            border: none; width: 80%; max-width: 300px; padding: 16px; border-radius: 12px;
            color: white; font-family: 'Orbitron', sans-serif; font-size: 16px; letter-spacing: 1px;
            cursor: pointer; box-shadow: 0 5px 20px rgba(214, 0, 42, 0.25);
            text-transform: uppercase; margin-top: 5px; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-signal:active { transform: scale(0.98); }
        .tries-info { font-family: 'Orbitron', sans-serif; font-size: 10px; color: #666; margin-top: 10px; letter-spacing: 1px; }
        
        .loader-text {
            font-family: 'Orbitron', monospace; font-size: 10px; color: var(--accent-cyan);
            margin-top: 15px; height: 15px; letter-spacing: 1px;
        }

        .btn-back {
            margin-top: 25px; background: transparent; border: 1px solid rgba(255, 255, 255, 0.2);
            color: #888; padding: 10px 30px; border-radius: 20px; font-size: 11px; cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }
        .btn-back:hover { color: #fff; border-color: #fff; }

        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

    <!-- PRELOADER -->
    <div id="preloader">
        <div class="terminal-text" id="term-text"></div>
    </div>

    <!-- BACKGROUND -->
    <div class="cyber-wrapper">
        <div class="cyber-grid"></div>
    </div>

    <!-- HUD -->
    <div class="hud-bar">
        <div><span class="status-dot"></span>SYSTEM: ONLINE</div>
        <div>PING: <span id="ping-counter" class="ping-value">34</span>ms</div>
    </div>

    <!-- GLOBAL LANGUAGE SELECTOR -->
    <div class="lang-container">
        <select id="language-select" onchange="changeLanguage()">
            <option value="en">🇬🇧 EN</option>
            <option value="ru">🇷🇺 RU</option>
            <option value="es">🇪🇸 ES</option>
            <option value="ar">🇸🇦 AR</option>
        </select>
    </div>

    <!-- PIN PAD MODAL -->
    <div id="security-modal" class="modal-overlay">
        <div class="pin-container">
            <div class="close-modal-btn" onclick="closeModal()">✕</div>
            <div class="pin-header">SECURITY ACCESS</div>
            <div class="pin-display" id="pin-display">_ _ _ _</div>
            <div class="keypad">
                <div class="key" onclick="enterDigit('1')">1</div><div class="key" onclick="enterDigit('2')">2</div><div class="key" onclick="enterDigit('3')">3</div>
                <div class="key" onclick="enterDigit('4')">4</div><div class="key" onclick="enterDigit('5')">5</div><div class="key" onclick="enterDigit('6')">6</div>
                <div class="key" onclick="enterDigit('7')">7</div><div class="key" onclick="enterDigit('8')">8</div><div class="key" onclick="enterDigit('9')">9</div>
                <div class="key key-action clear" onclick="clearPin()">DEL</div><div class="key" onclick="enterDigit('0')">0</div><div class="key key-action enter" onclick="submitPin()">OK</div>
            </div>
        </div>
    </div>

    <!-- MENU SCREEN -->
    <div id="screen-menu" class="screen active">
        <div class="main-logo">
            <h1 class="logo-title">AI PREDICTOR</h1>
            <div class="logo-subtitle">NEURAL CORE V3.7</div>
        </div>
        
        <div class="menu-header" data-translate="choose_game">CHOOSE GAME</div>

        <div class="menu-grid">
            <div class="game-card" onclick="openGame('aviator')">
                <img src="/img/menu_aviator.png" class="game-img">
                <div class="game-title">AVIATOR</div>
            </div>
            <div class="game-card" onclick="openGame('penalty')">
                <img src="/img/menu_penalty.png" class="game-img">
                <div class="game-title">PENALTY</div>
            </div>
            <!-- MINES (LOCKED) -->
            <div class="game-card locked">
                <div class="lock-icon">🔒</div>
                <img src="/img/menu_mines.png" class="game-img">
                <div class="game-title">MINES (SOON)</div>
            </div>
            <!-- SOON (LOCKED) -->
            <div class="game-card locked">
                <div class="lock-icon">🔒</div>
                <div style="font-size: 40px; margin-bottom: 12px; opacity: 0.5;">🎲</div>
                <div class="game-title">SOON...</div>
            </div>
        </div>

        <!-- UNIQUE SESSION ID -->
        <div class="session-id" id="session-id-display">SESSION ID: ...</div>
    </div>

    <!-- GAME SCREEN -->
    <div id="screen-game" class="screen">
        
        <!-- TELEGRAM LINK -->
        <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>

        <div class="circle-container">
            <div class="circle-glow"></div>
            <svg class="progress-ring" width="260" height="260">
                <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="6" fill="transparent" r="110" cx="130" cy="130"/>
                <circle class="progress-ring__circle" stroke="#00f2ea" stroke-width="6" fill="transparent" r="110" cx="130" cy="130"
                        style="stroke-dasharray: 691; stroke-dashoffset: 691; stroke-linecap: round;"/>
            </svg>
            <div class="coef-text" id="coef-text">0.00x</div>
            <div class="risk-block" id="risk-block">
                <div class="risk-item">ACC: <span class="risk-val" id="acc-val">98%</span></div>
                <div class="risk-item">RISK: <span class="risk-val" id="risk-val">LOW</span></div>
            </div>
        </div>

        <button class="btn-signal" id="signal-btn" onclick="getSignal()" data-translate="get_signal">GET SIGNAL</button>
        <div class="tries-info">CREDITS: <span id="tries-count" style="color:#fff; font-weight:bold;">0</span></div>
        <div class="loader-text" id="loader-text"></div>

        <button class="btn-back" onclick="backToMenu()" data-translate="exit">EXIT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // --- PRELOADER SEQUENCE ---
        const termLines = [
            "INITIALIZING KERNEL...",
            "LOADING NEURAL WEIGHTS...",
            "CONNECTING TO SECURE SERVER...",
            "ACCESS GRANTED."
        ];
        let lineIdx = 0;
        const termEl = document.getElementById('term-text');
        const preloader = document.getElementById('preloader');

        function runTerminal() {
            if (lineIdx < termLines.length) {
                termEl.innerText = termLines[lineIdx];
                lineIdx++;
                setTimeout(runTerminal, 500); 
            } else {
                setTimeout(() => {
                    preloader.style.opacity = '0';
                    setTimeout(() => preloader.style.display = 'none', 500);
                }, 500);
            }
        }
        window.onload = runTerminal;

        // --- SESSION ID ---
        function initSession() {
            let sid = localStorage.getItem('omar_session_id');
            if (!sid) {
                const randomPart = Math.random().toString(36).substring(2, 8).toUpperCase();
                sid = `SID-${randomPart}-X`;
                localStorage.setItem('omar_session_id', sid);
            }
            document.getElementById('session-id-display').innerText = `SESSION ID: ${sid} | CONNECTED`;
        }
        initSession();

        // --- TRANSLATIONS ---
        const translations = {
            en: { choose_game: "CHOOSE GAME", get_signal: "GET SIGNAL", exit: "EXIT", connecting: "CALCULATING...", analyzing: "ANALYZING...", predicting: "PREDICTING...", wait: "WAIT", seconds: "s" },
            ru: { choose_game: "ВЫБЕРИ ИГРУ", get_signal: "ПОЛУЧИТЬ СИГНАЛ", exit: "ВЫХОД", connecting: "ВЫЧИСЛЕНИЕ...", analyzing: "АНАЛИЗ...", predicting: "ПРОГНОЗ...", wait: "ЖДИ", seconds: "с" },
            es: { choose_game: "ELIGE JUEGO", get_signal: "OBTENER SEÑAL", exit: "SALIR", connecting: "CALCULANDO...", analyzing: "ANALIZANDO...", predicting: "PREDICIENDO...", wait: "ESPERA", seconds: "s" },
            ar: { choose_game: "اختر اللعبة", get_signal: "احصل على إشارة", exit: "خروج", connecting: "جار الحساب...", analyzing: "تحليل...", predicting: "تنبؤ...", wait: "انتظر", seconds: "ث" }
        };
        let currentLang = 'en';

        function changeLanguage() {
            const selector = document.getElementById('language-select');
            currentLang = selector.value;
            
            // RTL support for Arabic
            if (currentLang === 'ar') document.body.style.direction = 'rtl';
            else document.body.style.direction = 'ltr';

            // Update all elements with data-translate attribute
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (translations[currentLang][key]) {
                    el.innerText = translations[currentLang][key];
                }
            });
        }

        // --- GAME LOGIC ---
        const VALID_CODES = {
            aviator: ['112233', '999999', '123123', '550055', '101010', '887766', '258000', '774411', '369369', '445566'],
            penalty: ['555555', '808080', '202525', '007007', '191919', '663300', '789789', '456456', '987654', '321321']
        };

        let aviatorCredits = 0;
        let penaltyCredits = 0;
        let usedCodes = [];
        let activeGame = 'aviator';
        let currentPin = "";
        let isVerifying = false;

        function loadState() {
            const saved = localStorage.getItem('omar_credits_v3');
            if (saved) {
                const data = JSON.parse(saved);
                aviatorCredits = data.av || 0;
                penaltyCredits = data.pen || 0;
                usedCodes = data.used || [];
            }
        }
        function saveState() {
            localStorage.setItem('omar_credits_v3', JSON.stringify({ av: aviatorCredits, pen: penaltyCredits, used: usedCodes }));
        }
        loadState();

        // --- PIN PAD ---
        const modal = document.getElementById('security-modal');
        const pinDisplay = document.getElementById('pin-display');
        const triesDisplay = document.getElementById('tries-count');

        function openModal() { modal.style.display = 'flex'; clearPin(); }
        function closeModal() { modal.style.display = 'none'; }
        function clearPin() { if(isVerifying) return; currentPin = ""; pinDisplay.className = "pin-display"; pinDisplay.innerText = "_ _ _ _"; }
        function enterDigit(d) { if(currentPin.length < 8 && !isVerifying) { currentPin += d; pinDisplay.innerText = currentPin.split('').map(()=>'•').join(' '); } }
        
        function submitPin() {
            if(isVerifying || !currentPin) return;
            isVerifying = true;
            pinDisplay.innerText = "VERIFYING...";
            setTimeout(() => validateCode(currentPin), 1000);
        }

        function validateCode(code) {
            if (usedCodes.includes(code)) { endVerify(false, "ALREADY USED"); return; }
            
            if (VALID_CODES.aviator.includes(code)) {
                aviatorCredits += 3; usedCodes.push(code); endVerify(true, "AVIATOR +3");
            } else if (VALID_CODES.penalty.includes(code)) {
                penaltyCredits += 5; usedCodes.push(code); endVerify(true, "PENALTY +5");
            } else {
                endVerify(false, "INVALID CODE");
            }
        }

        function endVerify(success, msg) {
            pinDisplay.innerText = msg;
            pinDisplay.className = success ? "pin-display success" : "pin-display error";
            if(success) { saveState(); updateCreditsUI(); }
            window.Telegram.WebApp.HapticFeedback.notificationOccurred(success ? 'success' : 'error');
            setTimeout(() => { 
                if(success) closeModal(); 
                isVerifying = false; clearPin(); 
            }, 1500);
        }

        // --- GAMEPLAY ---
        function openGame(game) {
            activeGame = game;
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            
            // Force translation update when entering game
            changeLanguage();
            
            updateCreditsUI();
            resetGameUI();
        }
        function backToMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }
        function updateCreditsUI() {
            triesDisplay.innerText = (activeGame === 'aviator' ? aviatorCredits : penaltyCredits);
        }
        function resetGameUI() {
            document.getElementById('coef-text').innerText = "0.00x";
            document.getElementById('risk-block').style.opacity = '0';
            setProgress(0);
        }

        const circle = document.querySelector('.progress-ring__circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;
        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function getSignal() {
            let credits = activeGame === 'aviator' ? aviatorCredits : penaltyCredits;
            if(credits <= 0) { openModal(); return; }

            const btn = document.getElementById('signal-btn');
            if(btn.disabled) return;
            btn.disabled = true;

            // Deduct
            if(activeGame === 'aviator') aviatorCredits--; else penaltyCredits--;
            saveState(); updateCreditsUI();
            resetGameUI();

            const loaderText = document.getElementById('loader-text');
            const t = translations[currentLang];
            loaderText.innerText = t.connecting;
            
            // Animation
            let p = 0;
            let interval = setInterval(() => {
                p += 2; setProgress(p);
                if(p > 30) loaderText.innerText = t.analyzing;
                if(p > 70) loaderText.innerText = t.predicting;
                if(p > 100) {
                    clearInterval(interval);
                    showResult();
                }
            }, 30);
        }

        function showResult() {
            const result = (Math.random() * (5.0 - 1.2) + 1.2).toFixed(2);
            document.getElementById('coef-text').innerText = result + "x";
            
            // Risk Analysis
            const riskBlock = document.getElementById('risk-block');
            const accVal = document.getElementById('acc-val');
            const riskVal = document.getElementById('risk-val');
            
            const accuracy = (Math.random() * (99.5 - 92.0) + 92.0).toFixed(1);
            accVal.innerText = accuracy + "%";

            riskVal.className = "risk-val";
            if (result < 2.0) { riskVal.innerText = "SAFE"; riskVal.classList.add('safe'); }
            else if (result < 5.0) { riskVal.innerText = "MEDIUM"; riskVal.classList.add('medium'); }
            else { riskVal.innerText = "HIGH"; riskVal.classList.add('high'); }

            riskBlock.style.opacity = '1';
            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');

            // Cooldown
            const btn = document.getElementById('signal-btn');
            const t = translations[currentLang];
            let cd = 5;
            const timer = setInterval(() => {
                btn.innerText = `${t.wait} ${cd}${t.seconds}`;
                cd--;
                if(cd < 0) { clearInterval(timer); btn.innerText = t.get_signal; btn.disabled = false; document.getElementById('loader-text').innerText=""; }
            }, 1000);
        }

        // --- PING ---
        setInterval(() => {
            const p = Math.floor(Math.random() * (60 - 15) + 15);
            document.getElementById('ping-counter').innerText = p;
        }, 3000);

    </script>
</body>
</html>
