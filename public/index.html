<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Signal Bot Ultimate v8.0.1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050010;
            --accent-cyan: #00f2ea;
            --text-color: #ffffff;
            --brand-green: #00ff41;
            --brand-red: #ff334b;
            --glass-panel: rgba(20, 20, 30, 0.6);
            --mines-bg: #272749;
            --mines-tile: #2b2e55;
            --mines-active: #094e67;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0; overflow: hidden; user-select: none; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .terminal-text {
            color: var(--accent-cyan); font-family: 'Orbitron', monospace; 
            font-size: 12px; line-height: 1.6; text-align: left; width: 80%;
        }

        /* --- BACKGROUND --- */
        .cyber-wrapper {
            position: absolute; width: 100%; height: 100%; overflow: hidden;
            background: linear-gradient(to bottom, #020005 0%, #10002b 100%);
            z-index: -2;
        }

        /* --- HUD --- */
        .hud-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; padding: 0 20px; box-sizing: border-box;
            display: flex; align-items: center; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 11px; color: rgba(255, 255, 255, 0.5); z-index: 50;
        }
        .hud-left { display: flex; align-items: center; }
        .hud-right { display: flex; align-items: center; gap: 15px; }
        .status-dot { width: 6px; height: 6px; background: var(--brand-green); border-radius: 50%; box-shadow: 0 0 5px var(--brand-green); display: inline-block; margin-right: 5px; }
        #sound-toggle { width: 24px; height: 24px; cursor: pointer; }
        #sound-toggle img { width: 100%; height: 100%; filter: invert(50%); transition: filter 0.2s; }
        #sound-toggle:active img { filter: invert(80%); }

        /* --- LANG --- */
        .lang-select {
            background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 8px; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 12px; outline: none;
        }
        .lang-select option { background: #000; }

        /* --- ID MODAL --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column;
            backdrop-filter: blur(10px);
        }
        .id-box {
            background: #111; border: 1px solid var(--accent-cyan); padding: 30px 20px; border-radius: 16px; width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 234, 0.15);
        }
        .id-input {
            width: 100%; padding: 14px; margin: 20px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; box-sizing: border-box;
            font-family: 'Orbitron'; text-align: center; font-size: 18px; border-radius: 10px; outline: none; transition: 0.3s;
        }
        .id-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0,242,234,0.2); }
        .id-btn {
            background: linear-gradient(90deg, #00f2ea 0%, #0080ff 100%); color: #000; border: none; width: 100%; padding: 14px; 
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 14px; text-transform: uppercase;
        }
        .sync-log {
            font-family: 'Orbitron'; font-size: 10px; color: #00ff41; margin-top: 15px; min-height: 15px; text-align: left; width: 100%; display: none;
        }

        /* --- SCREENS --- */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: flex-start; height: 100%; width: 100%; position: absolute; z-index: 10; top: 0; left: 0; box-sizing: border-box; padding: 60px 0 15px 0; }
        .screen.active { display: flex; }

        /* --- MENU --- */
        .main-menu-content { text-align:center; flex-grow:1; display:flex; flex-direction:column; justify-content:center; align-items:center; width: 100%; }
        .main-logo { text-align: center; margin-bottom: 20px; }
        .logo-title { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 26px; color: #fff; text-shadow: 0 0 20px rgba(58, 134, 255, 0.6); letter-spacing: 1px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 90%; max-width: 380px; }
        .game-card { background: var(--glass-panel); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: scale(0.96); border-color: var(--accent-cyan); }
        .game-img { width: 60px; height: 60px; margin-bottom: 8px; border-radius: 12px; object-fit: cover; }
        .game-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 12px; color: #fff; }
        .game-card-soon { opacity: 0.5; cursor: not-allowed; pointer-events: none; display: flex; justify-content: center; align-items: center; min-height: 108px; box-sizing: border-box; }
        .soon-text { font-family: 'Orbitron'; font-size: 20px; color: #fff; letter-spacing: 2px; }

        /* --- LIVE FEED --- */
        .live-feed { width: 90%; max-width: 380px; margin-top: auto; padding: 5px 10px; box-sizing: border-box; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; font-family: 'Orbitron', monospace; font-size: 10px; }
        .feed-title { color: #888; text-align: center; margin-bottom: 5px; letter-spacing: 1px; }
        .feed-list { list-style: none; margin: 0; padding: 0; height: 75px; overflow: hidden; position: relative; }
        .feed-item { display: flex; justify-content: space-between; padding: 2px 5px; color: #ccc; border-radius: 4px; transition: all 0.5s ease-out; }
        .feed-item span:first-child { color: var(--accent-cyan); min-width: 60px; }
        .feed-item span:nth-child(2) { color: #fff; flex-grow: 1; text-align: center; }
        .feed-item span:last-child { color: var(--brand-green); font-weight: bold; min-width: 70px; text-align: right; }
        .new-win { animation: newWinHighlight 2.5s ease-out; }
        @keyframes newWinHighlight { 0% { background: rgba(0, 242, 234, 0.2); transform: translateY(-10px); opacity: 0; } 30% { background: rgba(0, 242, 234, 0.2); transform: translateY(0); opacity: 1; } 100% { background: transparent; } }

        /* --- GAME SCREEN --- */
        #screen-game { justify-content: center; }
        .game-content-wrapper { display: flex; flex-direction: column; align-items: center; flex-grow: 1; justify-content: center; width: 100%; }
        .telegram-link { text-decoration: none; font-family: 'Orbitron', sans-serif; color: var(--accent-cyan); border: 1px solid rgba(0, 242, 234, 0.3); padding: 8px 16px; border-radius: 20px; font-size: 12px; letter-spacing: 1px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); margin-bottom: 20px; transition: 0.3s; display: inline-block; }
        .risk-block { width: 100%; display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; opacity: 0; transition: opacity 0.5s; }
        .risk-item { background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 6px; font-family: 'Orbitron'; font-size: 10px; color: #aaa; border: 1px solid rgba(255,255,255,0.1); }
        .risk-val { color: #fff; font-weight: bold; margin-left: 5px; }
        .btn-signal { background: linear-gradient(90deg, #d6002a 0%, #8a001a 100%); border: none; width: 80%; max-width: 300px; padding: 16px; border-radius: 12px; color: white; font-family: 'Orbitron', sans-serif; font-size: 16px; letter-spacing: 1px; cursor: pointer; box-shadow: 0 5px 20px rgba(214, 0, 42, 0.25); text-transform: uppercase; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-signal:disabled { opacity: 0.7; transform: scale(0.98); }
        .btn-back { margin-top: 20px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #888; padding: 8px 25px; border-radius: 20px; font-size: 10px; font-family: 'Orbitron'; }
        .loader-text { font-family: 'Orbitron'; font-size: 12px; color: var(--accent-cyan); margin-top: 15px; height: 20px; }

        /* --- AVIATOR --- */
        .aviator-logo-img { width: 140px; height: auto; display: block; margin: 0 auto 15px auto; filter: drop-shadow(0 0 10px rgba(255, 51, 75, 0.5)); animation: floatLogo 4s infinite ease-in-out; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .aviator-wrapper { display: none; position: relative; width: 300px; height: 200px; margin-bottom: 20px; background: radial-gradient(circle at center, rgba(40,10,20,0.6) 0%, rgba(5,5,10,0.2) 80%); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; box-shadow: 0 0 30px rgba(255, 51, 75, 0.05); }
        .aviator-graph-svg { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0; transition: opacity 0.5s; }
        .aviator-graph-svg.active { opacity: 1; }
        .aviator-plane-img { position: absolute; bottom: 10px; left: 10px; width: 50px; height: auto; z-index: 5; transition: opacity 0.3s; opacity: 0; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .aviator-plane-img.visible { opacity: 1; animation: hoverPlane 3s infinite ease-in-out; }
        .aviator-plane-img.taking-off { opacity: 1; animation: takeoff 2s forwards cubic-bezier(0.2, 0.6, 0.2, 1) !important; }
        .coef-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron'; font-size: 52px; font-weight: 900; color: #fff; z-index: 10; text-shadow: 0 0 20px rgba(0,0,0,1); opacity: 0; transition: opacity 0.3s; }
        .coef-text.visible { opacity: 1; }
        @keyframes hoverPlane { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes takeoff { 0% { bottom: 10px; left: 10px; transform: scale(1) rotate(0deg); } 100% { bottom: 150px; left: 240px; transform: scale(1.3) rotate(-15deg); } }
        
        /* --- OTHER GAMES --- */
        .penalty-container { position: relative; width: 320px; height: 210px; display: none; margin-bottom: 20px; background-image: url('/img/penalty_bg.png'); background-size: cover; background-position: center; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .target-zone { position: absolute; width: 40px; height: 40px; border-radius: 50%; transition: 0.1s; }
        .z1 { top: 12%; left: 7%; } .z2 { top: 12%; left: 80%; } .z3 { top: 11%; left: 44%; } .z4 { top: 48%; left: 6%; } .z5 { top: 49%; left: 81%; }
        .target-zone.scanning { border: 2px solid rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); }
        .target-zone.winner { border: 3px solid #00f2ea; background: radial-gradient(circle, rgba(0,242,234,0.4) 0%, transparent 70%); box-shadow: 0 0 15px #00f2ea; }
        .mines-wrapper { display: none; width: 95%; max-width: 340px; margin-bottom: 20px; }
        .mines-grid-select { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 5px; }
        .mines-btn-grid { flex: 1; background: #333; border: 1px solid #555; color: #fff; padding: 8px 0; border-radius: 6px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; text-align: center; transition: 0.2s; }
        .mines-btn-grid.active { background: var(--accent-cyan); color: #000; border-color: var(--accent-cyan); font-weight: bold; }
        .mines-input-box { display: flex; align-items: center; justify-content: space-between; background: #222; padding: 5px 10px; border-radius: 8px; border: 1px solid #444; margin-bottom: 10px; }
        .mines-label { font-family: 'Orbitron'; font-size: 11px; color: #aaa; }
        .mines-val-input { background: transparent; border: none; color: #fff; font-family: 'Orbitron'; font-size: 14px; text-align: right; width: 60px; outline: none; }
        .mines-board { background: var(--mines-bg); padding: 10px; border-radius: 10px; display: grid; gap: 5px; border: 2px solid #3d3d5c; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); transition: all 0.3s; }
        .mine-tile { background-color: var(--mines-tile); border-radius: 4px; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; box-shadow: 0 2px 0 rgba(0,0,0,0.3); transition: transform 0.1s; }
        .mine-tile img { width: 80%; height: 80%; object-fit: contain; display: none; animation: popIn 0.3s ease; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .mine-tile.reveal { background-color: var(--mines-active); }
        .mine-tile.reveal img { display: block; }
        .chicken-wrapper { display: none; width: 95%; max-width: 340px; margin-bottom: 20px; flex-direction: column; align-items: center; }
        .chicken-controls { width: 100%; display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .chicken-road-grid { width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; background: #2b2b2b; border-radius: 12px; border: 2px dashed #444; box-shadow: inset 0 0 20px #000; transition: all 0.3s ease; }
        .chicken-step { width: 100%; aspect-ratio: 1; background: #1a1a1a; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #333; position: relative; transition: 0.3s; box-shadow: 0 4px 5px rgba(0,0,0,0.5); font-family: 'Orbitron'; font-size: 10px; color: #444; }
        .chicken-step.safe { border-color: #00ff41; background: radial-gradient(circle, #004d13 0%, #002209 100%); box-shadow: 0 0 15px #00ff41; transform: scale(1.1); color: transparent; }

    </style>
</head>
<body>
    <div id="preloader"><div class="terminal-text" id="term-text"></div></div>
    <div class="cyber-wrapper"></div>
    <div class="hud-bar">
        <div class="hud-left"><span class="status-dot"></span>ONLINE</div>
        <div class="hud-right">
            <div id="session-id">SID: ...</div>
            <select class="lang-select" onchange="changeLang(this.value)">
                <option value="en">🇬🇧 EN</option><option value="ru">🇷🇺 RU</option><option value="es">🇪🇸 ES</option>
            </select>
            <div id="sound-toggle" onclick="toggleSound()"><img id="sound-icon" src="/img/icon_sound_on.svg"></div>
        </div>
    </div>

    <!-- MAIN MENU SCREEN -->
    <div id="screen-menu" class="screen active">
        <div class="main-menu-content">
            <div class="main-logo">
                <div class="logo-title" data-tr="title">AI PREDICTOR</div>
                <div style="font-size:9px; color:#00f2ea; letter-spacing:2px; font-weight:bold; margin-top:5px;">NEURAL V8.0.1</div>
            </div>
            <div class="menu-grid">
                <div class="game-card" onclick="openGame('aviator')"><img src="/img/menu_aviator.png" class="game-img"><div class="game-title" data-tr="aviator">AVIATOR</div></div>
                <div class="game-card" onclick="openGame('penalty')"><img src="/img/menu_penalty.png" class="game-img"><div class="game-title" data-tr="penalty">PENALTY</div></div>
                <div class="game-card" onclick="openGame('mines')"><img src="/img/menu_mines.png" class="game-img"><div class="game-title" data-tr="mines">MINES</div></div>
                <div class="game-card" onclick="openGame('chicken')"><img src="/img/menu_chicken.png" class="game-img"><div class="game-title" data-tr="chicken">CHICKEN</div></div>
                <div class="game-card game-card-soon"><div class="soon-text">SOON</div></div>
                <div class="game-card game-card-soon"><div class="soon-text">SOON</div></div>
            </div>
        </div>
        <div class="live-feed">
            <div class="feed-title" data-tr="live_wins">🏆 LIVE WINS</div>
            <ul class="feed-list" id="feed-list-menu"></ul>
        </div>
    </div>

    <!-- ID MODAL -->
    <div id="id-modal" class="modal-overlay">
        <div class="id-box">
            <h3 style="color:#00f2ea; font-family:'Orbitron'; margin-bottom:5px;">AUTHORIZATION</h3>
            <p style="font-size:11px; color:#aaa; margin-bottom:20px;">Secure connection to Server</p>
            <input type="tel" id="user-id-input" class="id-input" placeholder="Account ID (10 digits)" maxlength="10">
            <button id="btn-connect" class="id-btn" onclick="validateAndConnect()">CONNECT ACCOUNT</button>
            <div id="id-error" style="color:#ff334b; font-size:10px; margin-top:10px; min-height:15px; font-weight:bold;"></div>
            <div id="sync-log" class="sync-log"></div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="screen-game" class="screen">
        <div class="game-content-wrapper">
            <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>

            <!-- Game Specific Views -->
            <div id="aviator-logo-view" style="display:none;"><img src="/img/aviator_logo.png" class="aviator-logo-img"></div>
            <div id="aviator-view" class="aviator-wrapper">
                <svg class="aviator-graph-svg" id="aviator-graph" viewBox="0 0 300 200" preserveAspectRatio="none"><path d="M0,200 Q150,120 300,20 L300,200 Z" fill="rgba(255, 51, 75, 0.2)" /><path d="M0,200 Q150,120 300,20" fill="none" stroke="#ff334b" stroke-width="4" /></svg>
                <img src="/img/plane.png" id="aviator-plane" class="aviator-plane-img">
                <div class="coef-text" id="coef-text">0.00x</div>
            </div>
            <div id="penalty-view" class="penalty-container">
                <div class="target-zone z1" id="pz1"></div><div class="target-zone z2" id="pz2"></div><div class="target-zone z3" id="pz3"></div><div class="target-zone z4" id="pz4"></div><div class="target-zone z5" id="pz5"></div>
            </div>
            <div id="mines-view" class="mines-wrapper">
                <div class="mines-grid-select"><div class="mines-btn-grid active" id="btn-3" onclick="setMinesGrid(3)">3x3</div><div class="mines-btn-grid" id="btn-5" onclick="setMinesGrid(5)">5x5</div><div class="mines-btn-grid" id="btn-7" onclick="setMinesGrid(7)">7x7</div><div class="mines-btn-grid" id="btn-9" onclick="setMinesGrid(9)">9x9</div></div>
                <div class="mines-input-box"><span class="mines-label">MINES AMOUNT:</span><input type="number" id="mines-input" class="mines-val-input" value="3" min="1"></div>
                <div id="mines-board" class="mines-board"></div>
            </div>
            <div id="chicken-view" class="chicken-wrapper">
                <div class="chicken-controls"><select id="chicken-diff" class="mines-select" onchange="updateChickenGrid()"><option value="easy">EASY</option><option value="medium" selected>MEDIUM</option><option value="hard">HARD</option></select></div>
                <div class="chicken-road-grid" id="chicken-grid"></div>
            </div>

            <div class="risk-block" id="risk-block"><div class="risk-item">ACC: <span class="risk-val" id="acc-val">0%</span></div><div class="risk-item">RISK: <span class="risk-val" id="risk-val">LOW</span></div></div>
            <div id="loader-text" class="loader-text"></div>
            <button id="signal-btn" class="btn-signal" onclick="getSignal()" data-tr="get_signal">GET SIGNAL</button>
            <button class="btn-back" onclick="backMenu()" data-tr="exit">EXIT</button>
        </div>
        <div class="live-feed">
            <div class="feed-title" data-tr="live_wins">🏆 LIVE WINS</div>
            <ul class="feed-list" id="feed-list-game"></ul>
        </div>
    </div>

    <script>
        // --- GLOBAL STATE & CONFIG ---
        let isMuted = false;
        let activeGame = null;
        let curLang = 'en';
        let minesSize = 3;
        const winSound = new Audio('/audio/win-blip.mp3');
        winSound.volume = 0.5;

        const langConfig = {
            en: { locale: 'en-US', currency: 'USD' },
            ru: { locale: 'ru-RU', currency: 'RUB' },
            es: { locale: 'es-ES', currency: 'EUR' }
        };

        const trans = {
            en: { title: "AI PREDICTOR", aviator: "AVIATOR", penalty: "PENALTY", mines: "MINES", chicken: "CHICKEN", get_signal: "GET SIGNAL", exit: "EXIT", live_wins: "🏆 LIVE WINS" },
            ru: { title: "AI ПРЕДИКТОР", aviator: "АВИАТОР", penalty: "ПЕНАЛЬТИ", mines: "МИНЫ", chicken: "КУРИЦА", get_signal: "ПОЛУЧИТЬ СИГНАЛ", exit: "МЕНЮ", live_wins: "🏆 ВЫИГРЫШИ" },
            es: { title: "AI PREDICTOR", aviator: "AVIATOR", penalty: "PENALTI", mines: "MINAS", chicken: "POLLO", get_signal: "OBTENER SEÑAL", exit: "SALIR", live_wins: "🏆 GANANCIAS EN VIVO" }
        };

        // --- CORE FUNCTIONS ---
        window.onload = function() {
            const term = document.getElementById('term-text');
            const termLines = ["INITIALIZING...", "CHECKING RESOURCES...", "ESTABLISHING SECURE TUNNEL...", "READY."];
            let lineIdx = 0;
            function typeLine() {
                if(lineIdx < termLines.length) {
                    term.innerText = termLines[lineIdx++];
                    setTimeout(typeLine, 400);
                } else {
                    setTimeout(() => { 
                        document.getElementById('preloader').style.display='none'; 
                        document.getElementById('id-modal').style.display='flex';
                    }, 500);
                }
            }
            typeLine();

            const sid = "SID-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            document.getElementById('session-id').innerText = sid;
            
            if (localStorage.getItem('isMuted') === 'true') {
                isMuted = true;
                document.getElementById('sound-icon').src = '/img/icon_sound_off.svg';
            }
            
            runLiveFeed();
        };
        
        function validateAndConnect() {
            const val = document.getElementById('user-id-input').value;
            const err = document.getElementById('id-error');
            const btn = document.getElementById('btn-connect');
            const log = document.getElementById('sync-log');

            if (val.length !== 10 || isNaN(val)) { err.innerText = "ERROR: ID MUST BE 10 DIGITS"; return; }
            if (parseInt(val.substring(0, 3)) < 155) { err.innerText = "ERROR: ID NOT FOUND IN DATABASE"; return; }

            err.innerText = ""; btn.disabled = true; btn.style.background = "#333"; btn.innerText = "CONNECTING..."; log.style.display = "block";
            setTimeout(() => { log.innerText = "> Handshake established..."; }, 500);
            setTimeout(() => { log.innerText = "> Verifying hash tokens..."; }, 1500);
            setTimeout(() => { log.innerText = "> Downloading betting history..."; }, 2500);
            setTimeout(() => { log.innerText = "> SYNCHRONIZATION COMPLETE"; btn.innerText = "SUCCESS"; btn.style.background = "#00f2ea"; btn.style.color = "#000"; }, 3500);
            setTimeout(() => { document.getElementById('id-modal').style.display = 'none'; document.getElementById('screen-menu').classList.add('active'); }, 4200);
        }

        function changeLang(l) {
            curLang = l;
            document.querySelectorAll('[data-tr]').forEach(el => {
                const k = el.getAttribute('data-tr');
                if(trans[l][k]) el.innerText = trans[l][k];
            });
        }

        function toggleSound() {
            isMuted = !isMuted;
            localStorage.setItem('isMuted', isMuted);
            document.getElementById('sound-icon').src = isMuted ? '/img/icon_sound_off.svg' : '/img/icon_sound_on.svg';
        }
        function playSound(sound) {
            if (!isMuted) {
                sound.currentTime = 0;
                sound.play().catch(e => console.error("Sound play failed:", e));
            }
        }
        
        function openGame(g) {
            activeGame = g;
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            
            ['aviator-logo-view', 'aviator-view', 'penalty-view', 'mines-view', 'chicken-view'].forEach(id => {
                 document.getElementById(id).style.display = 'none';
            });
            
            document.getElementById('signal-btn').disabled = false;
            document.getElementById('loader-text').innerText = "";
            document.getElementById('risk-block').style.opacity = '0';

            if(g === 'aviator') { 
                document.getElementById('aviator-view').style.display='block'; 
                document.getElementById('aviator-logo-view').style.display='block';
                const plane = document.getElementById('aviator-plane');
                plane.classList.remove('visible', 'taking-off');
                document.getElementById('coef-text').innerText="0.00x";
                document.getElementById('coef-text').classList.remove('visible');
                document.getElementById('aviator-graph').classList.remove('active');
            }
            if(g === 'penalty') { document.getElementById('penalty-view').style.display='block'; document.querySelectorAll('.target-zone').forEach(el=>el.classList.remove('winner','scanning')); }
            if(g === 'mines') { document.getElementById('mines-view').style.display='block'; setMinesGrid(3); }
            if(g === 'chicken') { document.getElementById('chicken-view').style.display='flex'; updateChickenGrid(); }
        }
        
        function backMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }

        // --- LIVE FEED LOGIC ---
        function generateFakeWin() {
            const games = [ { name: 'AVIATOR', weight: 4 }, { name: 'PENALTY', weight: 2 }, { name: 'MINES', weight: 2 }, { name: 'CHICKEN', weight: 2 }];
            const weightedGames = games.flatMap(game => Array(game.weight).fill(game.name));
            const gameName = weightedGames[Math.floor(Math.random() * weightedGames.length)];

            let coef, bet;

            if (gameName === 'AVIATOR') {
                coef = parseFloat((Math.random() * (15 - 1.2) + 1.2).toFixed(2));
                bet = Math.floor(Math.random() * (200 - 5) + 5);
            } else if (gameName === 'PENALTY') {
                coef = 5.88; // Placeholder
                bet = Math.floor(Math.random() * (300 - 10) + 10);
            } else { // Mines & Chicken
                coef = parseFloat((Math.random() * (8 - 2) + 2).toFixed(2));
                bet = Math.floor(Math.random() * (100 - 10) + 10);
            }
            
            const config = langConfig[curLang];
            const winAmount = (coef * bet).toLocaleString(config.locale, { style: 'currency', currency: config.currency, minimumFractionDigits: 0, maximumFractionDigits: 0 });
            return { game: gameName, coef: coef.toFixed(2) + 'x', win: winAmount };
        }

        function updateLiveFeed() {
            const activeScreen = document.querySelector('.screen.active');
            if (!activeScreen) return;

            const list = activeScreen.querySelector('.feed-list');
            if (!list) return;

            const winData = generateFakeWin();
            const item = document.createElement('li');
            item.className = 'feed-item new-win';
            item.innerHTML = `<span>${winData.game}</span> <span>${winData.coef}</span> <span>${winData.win}</span>`;

            list.prepend(item);
            if (list.children.length > 5) list.lastChild.remove();
            
            playSound(winSound);
            setTimeout(() => item.classList.remove('new-win'), 2500);
        }

        function runLiveFeed() {
            updateLiveFeed();
            const randomInterval = Math.random() * (20000 - 10000) + 10000;
            setTimeout(runLiveFeed, randomInterval);
        }

        // --- SIGNAL GENERATION LOGIC ---
        function getSignal() {
            const btn = document.getElementById('signal-btn');
            const loader = document.getElementById('loader-text');

            if(activeGame === 'mines') {
                const mInput = parseInt(document.getElementById('mines-input').value);
                const totalCells = minesSize * minesSize;
                if(isNaN(mInput) || mInput < 1) { alert("ERROR: Enter at least 1 mine"); return; }
                if(mInput >= totalCells) { alert(`ERROR: Too many mines for ${minesSize}x${minesSize} grid!`); return; }
            }

            btn.disabled = true; loader.innerText = "ANALYZING...";
            document.getElementById('risk-block').style.opacity = '0';
            
            if(activeGame === 'aviator') {
                 const plane = document.getElementById('aviator-plane');
                 plane.classList.remove('taking-off', 'visible');
                 void plane.offsetWidth; 
            }
            
            if(activeGame === 'penalty') document.querySelectorAll('.target-zone').forEach(el=>el.classList.remove('winner'));
            if(activeGame === 'mines') document.querySelectorAll('.mine-tile').forEach(el=>el.classList.remove('reveal'));
            if(activeGame === 'chicken') resetChicken();

            if(activeGame === 'aviator') runAviatorAnimation(loader, btn);
            else if(activeGame === 'penalty') runPenaltyAnimation(loader, btn);
            else setTimeout(() => {
                if(activeGame === 'mines') runMines();
                if(activeGame === 'chicken') runChicken();
                finishSignal(loader, btn);
            }, 1500);
        }

        function finishSignal(loader, btn) {
            loader.innerText = "";
            const acc = (Math.random()*(99-92)+92).toFixed(1);
            document.getElementById('acc-val').innerText = acc + "%";
            document.getElementById('risk-block').style.opacity = '1';
            let cd = 5;
            const t = setInterval(() => {
                btn.innerText = `WAIT ${cd}s`; cd--;
                if(cd < 0) { clearInterval(t); btn.innerText = trans[curLang].get_signal || "GET SIGNAL"; btn.disabled = false; }
            }, 1000);
        }

        function runAviatorAnimation(loader, btn) {
            document.getElementById('aviator-plane').classList.add('visible', 'taking-off');
            document.getElementById('aviator-graph').classList.add('active');
            const textEl = document.getElementById('coef-text');
            textEl.classList.add('visible');
            const finalVal = parseFloat((Math.random()*(5.0-1.2)+1.2).toFixed(2));
            let currentVal = 1.00;
            const int = setInterval(() => {
                currentVal += 0.05;
                if (currentVal >= finalVal) {
                    clearInterval(int);
                    textEl.innerText = finalVal.toFixed(2) + "x";
                    loader.innerText = "";
                    finishSignal(loader, btn);
                } else {
                    textEl.innerText = currentVal.toFixed(2) + "x";
                }
            }, 50); 
        }

        function runPenaltyAnimation(loader, btn) {
            const targets = document.querySelectorAll('.target-zone');
            let steps = 0;
            const int = setInterval(() => {
                targets.forEach(el=>el.classList.remove('scanning')); targets[Math.floor(Math.random()*5)].classList.add('scanning');
                steps++;
                if(steps>15) {
                    clearInterval(int); targets.forEach(el=>el.classList.remove('scanning'));
                    document.getElementById('pz'+(Math.floor(Math.random()*5)+1)).classList.add('winner');
                    finishSignal(loader, btn);
                }
            }, 150);
        }

        function setMinesGrid(s) {
            minesSize = s; 
            const b = document.getElementById('mines-board');
            b.style.gridTemplateColumns = `repeat(${s}, 1fr)`; b.innerHTML = "";
            [3,5,7,9].forEach(n => document.getElementById(`btn-${n}`).classList.remove('active'));
            document.getElementById(`btn-${s}`).classList.add('active');
            for(let i=0; i<s*s; i++) {
                const d = document.createElement('div'); d.className='mine-tile'; d.id='mt-'+i; d.innerHTML='<img src="/img/mines_star.png">'; b.appendChild(d);
            }
        }

        function runMines() {
            const mInput = parseInt(document.getElementById('mines-input').value);
            const totalCells = minesSize * minesSize;
            const safeCells = totalCells - mInput;
            let starsToReveal = 0;
            if (safeCells > 20) starsToReveal = Math.floor(Math.random() * (7 - 4 + 1)) + 4;
            else if (safeCells > 10) starsToReveal = Math.floor(Math.random() * (5 - 3 + 1)) + 3;
            else if (safeCells > 3) starsToReveal = Math.floor(Math.random() * (3 - 2 + 1)) + 2;
            else starsToReveal = 1;

            let set = new Set();
            while(set.size < starsToReveal) { set.add(Math.floor(Math.random() * totalCells)); }
            let arr = Array.from(set); let i=0;
            let int = setInterval(() => { 
                if(i>=arr.length) clearInterval(int); 
                else { document.getElementById('mt-'+arr[i]).classList.add('reveal'); i++; } 
            }, 400);
        }

        function updateChickenGrid() {
            const val = document.getElementById('chicken-diff').value;
            const grid = document.getElementById('chicken-grid');
            grid.innerHTML = "";
            let count = 15;
            if(val === 'easy') count = 25; if(val === 'medium') count = 15; if(val === 'hard') count = 10;
            for(let i=1; i<=count; i++) {
                const step = document.createElement('div'); step.className = 'chicken-step'; step.id = 'ch' + i; step.innerText = i; grid.appendChild(step);
            }
        }
        function resetChicken() { const allSteps = document.querySelectorAll('.chicken-step'); allSteps.forEach(el => { el.classList.remove('safe'); el.style.transform = "scale(1)"; }); }
        function runChicken() {
            const diff = document.getElementById('chicken-diff').value;
            let totalSteps = 10; let safePath = 0;
            if (diff === 'easy') { totalSteps=25; safePath = Math.floor(Math.random()*(23-15)+15); } 
            else if (diff === 'medium') { totalSteps=15; safePath = Math.floor(Math.random()*(13-6)+6); } 
            else { totalSteps=10; safePath = Math.floor(Math.random()*(5-2)+2); } 
            let i=1; 
            let int = setInterval(() => { 
                if(i > safePath || i > totalSteps) clearInterval(int); 
                else { const el = document.getElementById('ch'+i); if(el) el.classList.add('safe'); i++; } 
            }, 300);
        }

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
