<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1xBet Signal Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f121b;
            --card-bg: #1e222d;
            --primary: #007aff;
            --aviator-red: #e50b20;
            --penalty-yellow: #ffcc00;
            --mines-green: #00e700;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
        }

        /* Убираем стрелочки в инпуте */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease-in-out;
        }

        .screen.active { display: flex; }

        /* --- МЕНЮ --- */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .game-card:active { transform: scale(0.95); background-color: #2a3040; }
        .game-icon { font-size: 35px; margin-bottom: 10px; }
        .game-title { font-weight: bold; font-size: 14px; letter-spacing: 1px; }

        h2 { margin-bottom: 15px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: #888; font-size: 14px; }

        /* --- ОБЩИЕ ЭЛЕМЕНТЫ --- */
        .input-group { width: 100%; max-width: 300px; margin-bottom: 15px; text-align: center;}
        .hidden { display: none !important; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #666; }
        .history-input {
            background: var(--card-bg); border: 1px solid #333; color: white;
            padding: 12px; border-radius: 10px; width: 100%; text-align: center;
            font-size: 18px; outline: none; box-sizing: border-box;
        }
        .history-input:focus { border-color: var(--primary); }

        .btn {
            background: linear-gradient(90deg, #007aff, #00b4ff); border: none;
            padding: 16px; color: white; font-size: 16px; font-weight: bold;
            border-radius: 12px; cursor: pointer; width: 100%; max-width: 300px;
            margin-top: 15px; box-shadow: 0 5px 20px rgba(0, 122, 255, 0.2);
        }
        .btn-back { background: transparent; border: none; padding: 15px; color: #555; font-size: 14px; cursor: pointer; }

        /* --- MINES --- */
        .mines-grid-container {
            display: none; grid-template-columns: repeat(5, 1fr); gap: 8px;
            background: #151921; padding: 10px; border-radius: 10px; margin-bottom: 10px;
        }
        .mine-cell {
            width: 45px; height: 45px; background-color: #2a3040; border-radius: 5px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .mine-cell.active { background-color: #00e700; transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 231, 0, 0.5); }

        /* --- AVIATOR STAGE --- */
        .aviator-stage {
            display: none; width: 100%; max-width: 320px; height: 200px;
            background: linear-gradient(to bottom, #1a1d29, #0f121b);
            border-radius: 20px; border: 1px solid #333; position: relative;
            overflow: hidden; margin-bottom: 20px;
            align-items: center; justify-content: center;
        }
        
        .fly-curve {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            stroke: var(--aviator-red); stroke-width: 4; fill: none;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
        }
        
        /* Локальная картинка самолета */
        .plane-img {
            position: absolute; width: 80px; bottom: 10px; left: 10px;
            transition: transform 0.1s; opacity: 0;
            filter: drop-shadow(0 0 10px rgba(229, 11, 32, 0.5));
            z-index: 20;
        }
        
        .plane-img.flying { opacity: 1; animation: flyMove 2s forwards ease-out; }

        .aviator-big-text {
            font-size: 48px; font-weight: 800; color: white; z-index: 10;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        @keyframes flyMove { 
            0% { bottom: 10px; left: 10px; transform: rotate(0deg); }
            100% { bottom: 130px; left: 230px; transform: rotate(15deg); }
        }

        /* --- PENALTY STAGE --- */
        .penalty-stage {
            display: none; width: 100%; max-width: 320px; height: 220px;
            position: relative; margin-bottom: 20px;
            /* Ссылка на локальную картинку ворот */
            background-image: url('img/gate.png'); 
            background-size: cover;
            background-position: center;
            border-radius: 15px; overflow: hidden; border: 1px solid #333;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        /* Локальная картинка вратаря */
        .keeper-img {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 90px; height: auto; 
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.7));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }
        
        .keeper-img.jump-left { transform: translateX(-80px) rotate(-15deg); }
        .keeper-img.jump-right { transform: translateX(20px) rotate(15deg); }

        /* Мячи-цели */
        .target-ball {
            position: absolute; width: 24px; height: 24px;
            background: rgba(255,255,255,0.1); 
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
            z-index: 10;
        }
        
        .pos-tl { top: 40px; left: 40px; } 
        .pos-tr { top: 40px; right: 40px; } 
        .pos-bl { bottom: 40px; left: 40px; } 
        .pos-br { bottom: 40px; right: 40px; } 
        .pos-tc { top: 30px; left: 50%; transform: translateX(-50%); } 

        /* АКТИВНЫЙ МЯЧ - Локальная картинка */
        .target-ball.active {
            width: 35px; height: 35px;
            background-color: transparent;
            background-image: url('img/ball.png');
            background-size: contain;
            background-repeat: no-repeat;
            border: none;
            box-shadow: 0 0 20px white;
            transform: scale(1.3);
            animation: pulseBall 0.5s infinite alternate;
        }
        
        @keyframes pulseBall { from { transform: scale(1.3); } to { transform: scale(1.5); } }

        /* --- LOADER --- */
        .loader {
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; display: none; margin: 50px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <!-- МЕНЮ -->
    <div id="screen-menu" class="screen active">
        <h2 style="color: white;">CHOOSE GAME</h2>
        <div class="menu-grid">
            <div class="game-card" onclick="openGame('aviator')">
                <div class="game-icon">✈️</div>
                <div class="game-title">AVIATOR</div>
            </div>
            <div class="game-card" onclick="openGame('penalty')">
                <div class="game-icon">⚽</div>
                <div class="game-title">PENALTY</div>
            </div>
            <div class="game-card" onclick="openGame('mines')">
                <div class="game-icon">💣</div>
                <div class="game-title">MINES</div>
            </div>
            <div class="game-card" style="opacity: 0.5;">
                <div class="game-icon">🔒</div>
                <div class="game-title">SOON...</div>
            </div>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="screen-game" class="screen">
        <h2 id="game-title">GAME</h2>
        
        <!-- Input -->
        <div class="input-group" id="input-block">
            <label>ENTER LAST COEFFICIENT</label>
            <input type="number" id="last-coef" class="history-input" placeholder="1.00" step="0.01">
        </div>

        <!-- 1. AVIATOR STAGE -->
        <div class="aviator-stage" id="aviator-stage">
            <svg class="fly-curve" viewBox="0 0 300 200">
                <path id="curve-path" d="M0,200 Q150,200 300,50" fill="none" stroke="#e50b20" stroke-width="4" stroke-dasharray="400" stroke-dashoffset="400" />
            </svg>
            
            <!-- КАРТИНКА ИЗ ПАПКИ img/plane.png -->
            <img src="img/plane.png" class="plane-img" id="plane" alt="plane">

            <div class="aviator-big-text" id="aviator-result">1.00x</div>
        </div>

        <!-- 2. PENALTY STAGE -->
        <div class="penalty-stage" id="penalty-stage">
            
            <!-- КАРТИНКА ИЗ ПАПКИ img/keeper.png -->
            <img src="img/keeper.png" class="keeper-img" id="goalkeeper" alt="keeper">
            
            <div class="target-ball pos-tl" id="ball-0"></div>
            <div class="target-ball pos-tc" id="ball-1"></div>
            <div class="target-ball pos-tr" id="ball-2"></div>
            <div class="target-ball pos-bl" id="ball-3"></div>
            <div class="target-ball pos-br" id="ball-4"></div>
        </div>

        <!-- 3. MINES STAGE -->
        <div class="mines-grid-container" id="mines-grid"></div>

        <div class="loader" id="loader"></div>

        <button class="btn" onclick="makePrediction()">GET SIGNAL</button>
        <button class="btn-back" onclick="backToMenu()">BACK TO MENU</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        let currentGame = '';

        function createMinesGrid() {
            const grid = document.getElementById('mines-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                let cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.id = 'cell-' + i;
                grid.appendChild(cell);
            }
        }
        createMinesGrid();

        function openGame(gameType) {
            currentGame = gameType;
            
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');

            document.getElementById('aviator-stage').style.display = 'none';
            document.getElementById('penalty-stage').style.display = 'none';
            document.getElementById('mines-grid').style.display = 'none';
            document.getElementById('input-block').classList.add('hidden');
            document.getElementById('last-coef').value = '';

            const title = document.getElementById('game-title');
            const btn = document.querySelector('.btn');
            btn.innerHTML = "GET SIGNAL";

            if (gameType === 'aviator') {
                title.innerText = 'AVIATOR';
                document.getElementById('aviator-stage').style.display = 'flex';
                document.getElementById('input-block').classList.remove('hidden');
                
                document.getElementById('aviator-result').innerText = "WAIT";
                document.getElementById('plane').classList.remove('flying');
                document.getElementById('curve-path').style.transition = 'none';
                document.getElementById('curve-path').style.strokeDashoffset = '400';
            } 
            else if (gameType === 'penalty') {
                title.innerText = 'PENALTY';
                document.getElementById('penalty-stage').style.display = 'block';
                document.querySelectorAll('.target-ball').forEach(b => b.classList.remove('active'));
                document.getElementById('goalkeeper').className = 'keeper-img';
            } 
            else if (gameType === 'mines') {
                title.innerText = 'MINES';
                document.getElementById('mines-grid').style.display = 'grid';
                document.querySelectorAll('.mine-cell').forEach(c => {
                    c.classList.remove('active'); c.innerHTML = '';
                });
            }
        }

        function backToMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }

        function makePrediction() {
            const loader = document.getElementById('loader');
            const btn = document.querySelector('.btn');
            const lastCoef = document.getElementById('last-coef').value;

            if (currentGame === 'aviator' && !lastCoef) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                const res = document.getElementById('aviator-result');
                res.innerText = "INPUT!";
                setTimeout(() => res.innerText = "WAIT", 1000);
                return;
            }

            loader.style.display = 'block';
            btn.disabled = true;
            btn.style.opacity = '0.5';

            if(currentGame === 'mines') document.getElementById('mines-grid').style.opacity = '0.5';
            if(currentGame === 'penalty') {
                document.querySelectorAll('.target-ball').forEach(b => b.classList.remove('active'));
                document.getElementById('goalkeeper').className = 'keeper-img'; 
            }
            if(currentGame === 'aviator') {
                 document.getElementById('aviator-result').innerText = "LOADING...";
                 document.getElementById('plane').classList.remove('flying');
                 document.getElementById('curve-path').style.strokeDashoffset = '400';
            }

            setTimeout(() => {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                loader.style.display = 'none';
                btn.disabled = false;
                btn.style.opacity = '1';

                // --- AVIATOR LOGIC ---
                if (currentGame === 'aviator') {
                    document.getElementById('plane').classList.add('flying');
                    document.getElementById('curve-path').style.transition = 'stroke-dashoffset 2s ease-out';
                    document.getElementById('curve-path').style.strokeDashoffset = '0';

                    let prediction;
                    if (Math.random() > 0.85) prediction = (Math.random() * (7.00 - 2.00) + 2.00).toFixed(2);
                    else prediction = (Math.random() * (1.90 - 1.10) + 1.10).toFixed(2);
                    
                    document.getElementById('aviator-result').innerText = prediction + "x";
                }

                // --- PENALTY LOGIC ---
                else if (currentGame === 'penalty') {
                    const balls = document.querySelectorAll('.target-ball');
                    const randomBallIndex = Math.floor(Math.random() * 5);
                    balls[randomBallIndex].classList.add('active');
                    
                    // Вратарь прыгает
                    const keeper = document.getElementById('goalkeeper');
                    if (randomBallIndex === 0 || randomBallIndex === 2) { 
                        keeper.classList.add('jump-right'); 
                    } else {
                        keeper.classList.add('jump-left');
                    }
                }

                // --- MINES LOGIC ---
                else if (currentGame === 'mines') {
                    const grid = document.getElementById('mines-grid');
                    grid.style.opacity = '1';
                    
                    document.querySelectorAll('.mine-cell').forEach(c => {
                        c.classList.remove('active'); c.innerHTML = '';
                    });

                    let safeSpots = [];
                    while(safeSpots.length < 4) {
                        let r = Math.floor(Math.random() * 25);
                        if(safeSpots.indexOf(r) === -1) safeSpots.push(r);
                    }

                    safeSpots.forEach((index, i) => {
                        setTimeout(() => {
                            const cell = document.getElementById('cell-' + index);
                            cell.classList.add('active');
                            cell.innerHTML = '⭐️';
                            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                        }, i * 300);
                    });
                }

            }, 1000);
        }
    </script>
</body>
</html>
