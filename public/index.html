<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI PREDICTOR v29.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0f19;
            --neon-cyan: #00f2ea;
            --neon-red: #ff334b;
            --card-bg: rgba(22, 29, 45, 0.9);
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1a253a 0%, #0b0f19 70%);
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- UI ELEMENTS --- */
        .hidden { display: none !important; }
        
        /* HEADER & HUD */
        .hud-bar {
            width: 90%; margin-top: 15px;
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Orbitron', sans-serif; font-size: 10px; color: rgba(255,255,255,0.5);
        }
        .status-dot { width: 6px; height: 6px; background: var(--neon-cyan); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px var(--neon-cyan); }
        .limit-box { color: var(--neon-red); font-weight: bold; border: 1px solid var(--neon-red); padding: 2px 8px; border-radius: 4px; }

        /* SCREENS */
        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; align-items: center; transition: opacity 0.3s; }
        
        /* MENU SCREEN */
        .main-logo { margin-top: 40px; text-align: center; margin-bottom: 30px; }
        .logo-title { font-family: 'Orbitron'; font-weight: 900; font-size: 28px; letter-spacing: 2px; text-shadow: 0 0 15px rgba(0, 242, 234, 0.3); }
        .logo-ver { font-size: 10px; color: var(--neon-cyan); letter-spacing: 3px; font-weight: 700; margin-top: 5px; }
        .logo-sub { font-size: 9px; color: #555; margin-top: 2px; letter-spacing: 1px; }

        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            width: 90%; max-width: 350px;
        }
        .game-card {
            background: linear-gradient(145deg, #161d2d, #0f1420);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; height: 120px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; position: relative; overflow: hidden;
            transition: transform 0.1s, border-color 0.2s;
        }
        .game-card:active { transform: scale(0.97); border-color: var(--neon-cyan); }
        .game-icon { font-size: 35px; margin-bottom: 10px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        .game-title { font-family: 'Orbitron'; font-size: 11px; color: #fff; letter-spacing: 1px; }
        
        .game-card.soon { opacity: 0.5; cursor: default; }
        .soon-text { font-size: 10px; color: #555; border: 1px solid #333; padding: 2px 6px; border-radius: 4px; }

        /* LOGIN MODAL (V28 STYLE + V29 LOGIC) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            width: 80%; max-width: 300px;
            background: #111625;
            border: 1px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 234, 0.1);
        }
        .input-field {
            width: 100%; background: #0b0f19; border: 1px solid #333; color: white;
            padding: 12px; margin-bottom: 15px; border-radius: 8px; text-align: center;
            font-family: 'Orbitron'; font-size: 14px; outline: none;
        }
        .input-field:focus { border-color: var(--neon-cyan); }
        .btn-main {
            width: 100%; padding: 12px;
            background: var(--neon-cyan); color: #000;
            font-family: 'Orbitron'; font-weight: 700; border: none; border-radius: 8px;
            cursor: pointer; font-size: 14px;
        }
        .error-msg { color: var(--neon-red); font-size: 10px; margin-top: 10px; min-height: 15px; }

        /* GAME SCREEN & AVIATOR CANVAS (V28 ENGINE) */
        .game-header { width: 90%; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: none; border: none; color: #777; font-size: 24px; cursor: pointer; }
        
        .aviator-wrapper {
            position: relative; width: 100%; height: 220px;
            margin-top: 20px; margin-bottom: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: radial-gradient(circle at 50% 50%, #1a253a 0%, #0b0f19 100%);
            overflow: hidden;
        }
        #aviator-canvas { width: 100%; height: 100%; }
        
        .coef-display {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Orbitron'; font-size: 48px; font-weight: bold; color: white;
            opacity: 0; transition: opacity 0.2s;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            z-index: 10;
        }
        .coef-display.visible { opacity: 1; }

        .controls-area { width: 90%; display: flex; flex-direction: column; align-items: center; }
        .big-btn {
            width: 100%; padding: 18px;
            background: linear-gradient(90deg, #00f2ea, #0080ff);
            border: none; border-radius: 12px;
            color: #fff; font-family: 'Orbitron'; font-weight: bold; font-size: 18px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            box-shadow: 0 5px 20px rgba(0, 242, 234, 0.3);
            cursor: pointer; transition: transform 0.1s;
        }
        .big-btn:active { transform: scale(0.98); }
        .big-btn:disabled { background: #333; box-shadow: none; color: #888; }

        /* OTHER GAMES */
        .grid-game { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 300px; margin: 20px auto; }
        .cell { aspect-ratio: 1; background: #161d2d; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: 0.3s; border: 1px solid #222; }
        .cell.active { background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); border-color: #fff; }
        .cell.chicken { background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }

        /* LOCK SCREEN (V29 LOGIC) */
        .lock-icon { font-size: 60px; color: var(--neon-red); margin-bottom: 20px; }
        .lock-text { font-family: 'Orbitron'; font-size: 20px; color: var(--neon-red); margin-bottom: 10px; }
        .lock-sub { font-size: 12px; color: #888; text-align: center; width: 80%; line-height: 1.5; }

        /* TERMINAL LOADER */
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; padding: 20px; font-family: 'Courier New', monospace; font-size: 12px; color: var(--neon-cyan); display: flex; flex-direction: column; justify-content: flex-end; }

    </style>
</head>
<body>

    <div id="preloader"></div>

    <div id="id-modal" class="modal-overlay hidden">
        <div class="login-box">
            <h3 style="color:var(--neon-cyan); font-family:'Orbitron'; margin:0 0 20px 0;">SYSTEM AUTH</h3>
            <input type="number" class="input-field" placeholder="ACCOUNT ID" value="15592023">
            <input type="text" id="access-key" class="input-field" placeholder="ACCESS KEY" style="text-transform: uppercase;">
            <button class="btn-main" onclick="attemptLogin()">CONNECT</button>
            <div id="login-error" class="error-msg"></div>
        </div>
    </div>

    <div id="screen-menu" class="screen hidden">
        <div class="hud-bar">
            <div><span class="status-dot"></span>ONLINE <span id="online">1,420</span></div>
            <div class="limit-box">SIG: <span id="sig-count-menu">5</span></div>
        </div>

        <div class="main-logo">
            <div class="logo-title">AI PREDICTOR</div>
            <div class="logo-ver">NEURAL v29.0</div>
            <div class="logo-sub">powered by Omar</div>
        </div>

        <div class="menu-grid">
            <div class="game-card" onclick="openGame('aviator')">
                <div class="game-icon">✈️</div>
                <div class="game-title">AVIATOR</div>
            </div>
            <div class="game-card" onclick="openGame('penalty')">
                <div class="game-icon">⚽</div>
                <div class="game-title">PENALTY</div>
            </div>
            <div class="game-card" onclick="openGame('mines')">
                <div class="game-icon">💣</div>
                <div class="game-title">MINES</div>
            </div>
            <div class="game-card" onclick="openGame('chicken')">
                <div class="game-icon">🍗</div>
                <div class="game-title">CHICKEN</div>
            </div>
            <div class="game-card soon"><div class="soon-text">SOON</div></div>
            <div class="game-card soon"><div class="soon-text">SOON</div></div>
        </div>
    </div>

    <div id="screen-game" class="screen hidden">
        <div class="game-header">
            <button class="back-btn" onclick="backToMenu()">❮</button>
            <div style="font-family:'Orbitron'; font-size:14px; letter-spacing:1px;" id="game-name">GAME</div>
            <div class="limit-box">LEFT: <span id="sig-count-game">5</span></div>
        </div>

        <div id="game-content-area" style="width:100%; flex:1; display:flex; justify-content:center; align-items:center; position:relative;">
            </div>

        <div class="controls-area" style="margin-bottom: 30px;">
            <button id="signal-btn" class="big-btn" onclick="getSignal()">GET SIGNAL</button>
        </div>
    </div>

    <div id="lock-modal" class="modal-overlay hidden">
        <div class="login-box" style="border-color: var(--neon-red); box-shadow: none;">
            <div class="lock-icon">🛑</div>
            <div class="lock-text">SESSION EXPIRED</div>
            <div class="lock-sub">
                Safety Limit Reached (5/5).<br>
                Connection terminated.<br><br>
                Contact Omar for a new Access Key.
            </div>
        </div>
    </div>

<script>
    // --- V29 CONFIG ---
    const VALID_KEYS = ['START-777', 'WIN-2024', 'VIP-EGYPT', 'BOSS-LEVEL', 'FINAL-GLITCH'];
    let signalsLeft = 5;
    let currentGame = null;

    // --- V28 AVIATOR ENGINE VARIABLES ---
    let avCtx, avCanvas, avW, avH, avAnimId;
    let avPoints = [];
    // Bezier Control Points
    let avP0, avP1, avP2, avP3; 

    // --- TERMINAL LOADER ---
    const logs = [
        "boot_sequence_init...",
        "loading_neural_modules_v28...", // Legacy Core
        "patching_security_protocols...",
        "connecting_to_1xbet_socket...",
        "bypassing_firewall_l7...",
        "injecting_sql_payload...",
        "v29_core_ready."
    ];
    let logIdx = 0;

    function runTerminal() {
        const div = document.createElement('div');
        div.style.marginBottom = "5px";
        div.innerText = "> " + logs[logIdx];
        document.getElementById('preloader').appendChild(div);
        logIdx++;
        if(logIdx < logs.length) {
            setTimeout(runTerminal, 300);
        } else {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hidden');
                document.getElementById('id-modal').classList.remove('hidden');
            }, 500);
        }
    }
    window.onload = runTerminal;

    // --- LOGIN SYSTEM ---
    function attemptLogin() {
        const key = document.getElementById('access-key').value.trim().toUpperCase();
        const err = document.getElementById('login-error');
        
        if(VALID_KEYS.includes(key)) {
            document.getElementById('id-modal').classList.add('hidden');
            document.getElementById('screen-menu').classList.remove('hidden');
            updateCounts();
        } else {
            err.innerText = "ACCESS DENIED: INVALID KEY";
        }
    }

    function updateCounts() {
        document.getElementById('sig-count-menu').innerText = signalsLeft;
        document.getElementById('sig-count-game').innerText = signalsLeft;
    }

    // --- NAVIGATION ---
    function openGame(game) {
        currentGame = game;
        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        document.getElementById('game-name').innerText = game.toUpperCase();
        
        const area = document.getElementById('game-content-area');
        area.innerHTML = ''; // Clear

        if(game === 'aviator') {
            area.innerHTML = `
                <div class="aviator-wrapper">
                    <canvas id="aviator-canvas"></canvas>
                    <div id="coef-text" class="coef-display">1.00x</div>
                </div>
            `;
            initAviator();
        } else if (game === 'mines' || game === 'chicken') {
            let grid = '<div class="grid-game">';
            for(let i=0; i<25; i++) grid += `<div class="cell" id="c-${i}"></div>`;
            grid += '</div>';
            area.innerHTML = grid;
        } else if (game === 'penalty') {
            area.innerHTML = `
                <div style="border:4px solid white; border-bottom:none; width:300px; height:160px; position:relative; display:flex; justify-content:center; align-items:flex-end;">
                    <div id="ball" style="width:25px; height:25px; background:red; border-radius:50%; box-shadow:0 0 10px red; display:none; position:absolute;"></div>
                    <div style="width:100%; border-bottom:1px solid rgba(255,255,255,0.2); position:absolute; bottom:0;"></div>
                </div>
            `;
        }
    }

    function backToMenu() {
        if(avAnimId) cancelAnimationFrame(avAnimId); // Stop Aviator
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-menu').classList.remove('hidden');
    }

    // --- MAIN SIGNAL LOGIC ---
    function getSignal() {
        if(signalsLeft <= 0) return;

        const btn = document.getElementById('signal-btn');
        btn.disabled = true;
        btn.innerText = "ANALYZING...";

        setTimeout(() => {
            if(currentGame === 'aviator') playAviatorAnim();
            else if(currentGame === 'mines') showMines();
            else if(currentGame === 'chicken') showChicken();
            else if(currentGame === 'penalty') showPenalty();

            signalsLeft--;
            updateCounts();

            // Re-enable
            setTimeout(() => {
                btn.innerText = "GET SIGNAL";
                btn.disabled = false;
                if(signalsLeft === 0) {
                    setTimeout(() => { document.getElementById('lock-modal').classList.remove('hidden'); }, 1500);
                }
            }, 3000); // 3s cooldown
        }, 1000); // 1s fake delay
    }

    // --- V28 AVIATOR ENGINE (BEZIER CURVES) ---
    function initAviator() {
        avCanvas = document.getElementById('aviator-canvas');
        avCtx = avCanvas.getContext('2d');
        avW = avCanvas.offsetWidth;
        avH = avCanvas.offsetHeight;
        avCanvas.width = avW;
        avCanvas.height = avH;

        // Points from v28 Logic
        avP0 = {x:0, y:avH};
        avP1 = {x:avW*0.4, y:avH}; 
        avP2 = {x:avW*0.7, y:avH}; 
        avP3 = {x:avW*1.2, y:-avH*0.5};

        drawAviatorStatic();
    }

    function drawAviatorStatic() {
        avCtx.clearRect(0,0,avW,avH);
        avCtx.fillStyle = '#1a253a'; // Bg placeholder
        avCtx.fillRect(0,0,avW,avH);
        // Grid lines
        avCtx.strokeStyle = 'rgba(255,255,255,0.05)';
        avCtx.beginPath(); avCtx.moveTo(0, avH/2); avCtx.lineTo(avW, avH/2); avCtx.stroke();
    }

    function playAviatorAnim() {
        // WEIGHTED RANDOM from v28
        let outcome; const r = Math.random();
        if(r < 0.45) outcome = (Math.random()*(2.00-1.10)+1.10);
        else if(r < 0.85) outcome = (Math.random()*(10.00-2.00)+2.00);
        else if(r < 0.97) outcome = (Math.random()*(50.00-10.00)+10.00);
        else outcome = (Math.random()*(255.00-50.00)+50.00);
        
        const finalCoef = parseFloat(outcome.toFixed(2));
        const txt = document.getElementById('coef-text');
        txt.classList.add('visible');

        let start = null;
        const duration = 2500; 
        avPoints = [];

        function step(timestamp) {
            if(!start) start = timestamp;
            const progress = (timestamp - start) / duration;
            
            if(progress <= 1) {
                // Draw Bezier
                avCtx.clearRect(0,0,avW,avH);
                
                // Math from v28 (Cubic Bezier)
                const t = progress;
                const u = 1 - t; const tt = t*t; const uu = u*u; const uuu = uu*u; const ttt = tt*t;
                
                let x = uuu * avP0.x + 3 * uu * t * avP1.x + 3 * u * tt * avP2.x + ttt * avP3.x;
                let y = uuu * avP0.y + 3 * uu * t * avP1.y + 3 * u * tt * avP2.y + ttt * avP3.y;
                
                avPoints.push({x, y});

                // Fill
                avCtx.beginPath();
                avCtx.moveTo(0, avH);
                for(let p of avPoints) avCtx.lineTo(p.x, p.y);
                avCtx.lineTo(x, avH);
                avCtx.fillStyle = 'rgba(255, 51, 75, 0.3)';
                avCtx.fill();

                // Stroke
                avCtx.beginPath();
                avCtx.moveTo(0, avH);
                for(let p of avPoints) avCtx.lineTo(p.x, p.y);
                avCtx.strokeStyle = '#ff334b';
                avCtx.lineWidth = 4;
                avCtx.stroke();

                // Number Logic
                let currentVal = 1.00 + (finalCoef - 1.00) * (progress * progress); // Ease in
                if(currentVal > finalCoef) currentVal = finalCoef;
                txt.innerText = currentVal.toFixed(2) + "x";

                avAnimId = requestAnimationFrame(step);
            } else {
                txt.innerText = finalCoef.toFixed(2) + "x";
            }
        }
        avAnimId = requestAnimationFrame(step);
    }

    // --- OTHER GAMES LOGIC ---
    function showMines() {
        document.querySelectorAll('.cell').forEach(c => {c.innerHTML=''; c.className='cell'});
        for(let k=0; k<3; k++) {
            let r = Math.floor(Math.random()*25);
            let el = document.getElementById(`c-${r}`);
            el.classList.add('active');
            el.innerHTML = '⭐';
        }
    }
    
    function showChicken() {
        document.querySelectorAll('.cell').forEach(c => {c.innerHTML=''; c.className='cell'});
        for(let k=0; k<5; k++) {
            let r = Math.floor(Math.random()*25);
            let el = document.getElementById(`c-${r}`);
            el.classList.add('chicken');
            el.innerHTML = '🍗';
        }
    }

    function showPenalty() {
        const ball = document.getElementById('ball');
        ball.style.display = 'block';
        ball.style.left = Math.floor(Math.random()*260) + "px";
        ball.style.bottom = Math.floor(Math.random()*120) + "px";
    }

</script>
</body>
</html>
