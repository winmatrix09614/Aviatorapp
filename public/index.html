<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI PREDICTOR v29.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-cyan: #00f2ea; 
            --brand-green: #00ff41; 
            --brand-red: #ff334b; 
            --glass-panel: rgba(20, 20, 30, 0.6);
            --mines-bg: #272749; 
            --mines-tile: #2b2e55;
        }

        /* --- ANIMATED DEEP NEURAL BACKGROUND --- */
        body { 
            margin: 0; padding: 0; overflow: hidden; user-select: none; height: 100vh; 
            display: flex; justify-content: center; align-items: flex-start;
            font-family: 'Poppins', sans-serif; color: white;
            background: linear-gradient(-45deg, #050010, #130f40, #000000, #0b1021);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #app-wrapper { width:100%; max-width:450px; height:100%; position:relative; display:flex; flex-direction:column; overflow:hidden; }
        body.lang-ar { font-family:'Cairo',sans-serif; direction:rtl; } body.lang-ar .hud-bar { direction:ltr; } /* HUD always LTR */

        /* --- HEADER (HUD) --- */
        .hud-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; 
            padding: 10px 20px; box-sizing: border-box; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 50; pointer-events: none;
        }
        .hud-left { display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
        .online-box { font-family: 'Orbitron'; font-size: 10px; color: rgba(255,255,255,0.8); display: flex; align-items: center; }
        .status-dot { width: 6px; height: 6px; background: var(--brand-green); border-radius: 50%; box-shadow: 0 0 5px var(--brand-green); margin-right: 5px; }
        .online-count { color: var(--accent-cyan); font-weight: bold; margin-left: 3px; }
        .time-box { font-family: 'Orbitron'; font-size: 10px; color: #bbb; margin-top: 2px; margin-left: 11px; } 
        
        .hud-right { display: flex; align-items: center; pointer-events: all; }
        .limit-box { 
            font-family: 'Orbitron'; font-size: 11px; font-weight: bold; 
            color: var(--brand-red); border: 1px solid var(--brand-red); 
            padding: 4px 8px; border-radius: 6px; background: rgba(0,0,0,0.3);
            text-shadow: 0 0 5px var(--brand-red);
        }

        /* --- PRELOADER --- */
        #preloader { position:absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .terminal-text { color:var(--accent-cyan); font-family:'Orbitron',monospace; font-size:12px; line-height:1.6; text-align:left; width:80%; }

        /* --- LANG SWITCHER & SESSION ID (Improved Visibility) --- */
        .lang-container { 
            position: absolute; top: 60px; right: 20px; z-index: 60; 
            display: flex; flex-direction: column; align-items: flex-end;
        }
        .lang-container.ar-pos { right: auto; left: 20px; align-items: flex-start; }
        
        select { 
            background: rgba(0,0,0,0.6); color: #fff; 
            border: 1px solid var(--accent-cyan); padding: 4px 8px; 
            border-radius: 6px; font-family: 'Orbitron', sans-serif; font-size: 10px; 
            outline: none; cursor: pointer;
        }
        option { background: #000; color: white; }
        
        #session-id { 
            font-family: 'Orbitron'; font-size: 9px; 
            color: var(--accent-cyan); /* Bright Color */
            margin-top: 4px; letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 242, 234, 0.5);
        }

        /* --- SCREENS --- */
        .screen { display:none; flex-direction:column; align-items:center; justify-content:center; height:100%; width:100%; position:relative; z-index:10; padding-bottom:80px; box-sizing:border-box; } .screen.active { display:flex; }
        .main-logo { text-align:center; margin-bottom:20px; margin-top: 40px; }
        .logo-title { font-family:'Orbitron'; font-weight:900; font-size:26px; color:#fff; text-shadow:0 0 20px rgba(0,242,234,0.3); letter-spacing:1px; }
        .brand-sub { font-size:10px; color:#888; letter-spacing:1px; margin-top:5px; }

        .menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; width:90%; max-width:360px; }
        .game-card { background:var(--glass-panel); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:15px; text-align:center; cursor:pointer; transition:0.3s; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height: 110px; }
        .game-card:active { transform:scale(0.96); border-color:var(--accent-cyan); }
        .game-card.soon { opacity:0.5; cursor:default; border-color:transparent; }
        .game-img { width:50px; height:50px; margin-bottom:10px; border-radius:10px; object-fit:cover; }
        .game-title { font-family:'Orbitron'; font-size:11px; font-weight:bold; }
        .soon-text { font-family:'Orbitron'; font-size:14px; color:#555; font-weight:bold; }

        /* --- LOGIN MODAL (Strict ID) --- */
        .modal-overlay { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; justify-content:center; align-items:center; flex-direction:column; backdrop-filter:blur(5px); }
        .id-box { background:#111; border:1px solid var(--accent-cyan); padding:30px; border-radius:16px; width:85%; max-width:300px; text-align:center; box-shadow:0 0 30px rgba(0,242,234,0.1); }
        .id-input { width:100%; padding:14px; margin:10px 0; background:#1a1a1a; border:1px solid #333; color:#fff; box-sizing:border-box; font-family:'Orbitron'; text-align:center; font-size:16px; border-radius:10px; outline:none; }
        .id-input:focus { border-color:var(--accent-cyan); }
        .id-btn { background:linear-gradient(90deg, #00f2ea, #0080ff); color:#000; border:none; width:100%; padding:14px; margin-top:10px; font-family:'Orbitron'; font-weight:900; cursor:pointer; border-radius:10px; }
        .error-msg { color: var(--brand-red); font-size: 10px; margin-top: 10px; min-height: 15px; font-family: 'Poppins'; }

        /* --- GAME UI --- */
        .game-header { display:flex; flex-direction:column; align-items:center; margin-bottom:10px; width:100%; }
        .telegram-link { font-family:'Orbitron'; color:var(--accent-cyan); text-decoration:none; font-size:12px; border:1px solid rgba(0,242,234,0.3); padding:5px 15px; border-radius:20px; background:rgba(0,0,0,0.5); margin-bottom:10px; }
        .game-logo-hero { width:70px; margin-bottom:10px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

        .btn-signal { background:linear-gradient(90deg, #d6002a, #8a001a); border:none; width:85%; max-width:320px; padding:16px; border-radius:12px; color:white; font-family:'Orbitron'; font-size:16px; font-weight:bold; cursor:pointer; box-shadow:0 5px 20px rgba(214,0,42,0.3); margin-top:10px; border:1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .btn-signal:active { transform:scale(0.98); } .btn-signal:disabled { opacity:0.7; cursor:not-allowed; background:#222; color:#555; box-shadow:none; }
        
        .btn-reset-game { 
            background: linear-gradient(90deg, #ffd700, #ffaa00); 
            color: #000; font-family:'Orbitron'; font-weight:900; font-size:14px;
            width: 60%; padding: 12px; border:none; border-radius: 10px; 
            margin-top: 10px; cursor: pointer; display: none; /* Hidden by default */
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        .btn-reset-game.visible { display: block; animation: popIn 0.3s; }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn-back { background:transparent; border:1px solid #444; color:#888; padding:8px 25px; border-radius:20px; font-size:10px; margin-top:15px; cursor:pointer; font-family:'Orbitron'; }

        /* --- GAME ENGINES --- */
        /* AVIATOR */
        .aviator-wrapper { position:relative; width:100%; height:200px; margin-bottom:10px; border-top:1px solid rgba(255,255,255,0.1); border-bottom:1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); }
        #aviator-canvas { width:100%; height:100%; }
        .coef-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Orbitron'; font-size:48px; font-weight:bold; color:white; opacity:0; } .coef-text.visible { opacity:1; }
        
        /* PENALTY */
        .penalty-container { position:relative; width:300px; height:190px; margin-bottom:10px; background:url('img/penalty_bg.png') center/cover; border-radius:12px; border:1px solid rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .target-zone { position:absolute; width:45px; height:45px; border-radius:50%; display:flex; justify-content:center; align-items:center; transition:0.2s; }
        .z1 { top:20px; left:21px; } .z2 { top:20px; right:18px; } .z3 { top:18px; left:50%; transform:translateX(-50%); } .z4 { bottom:28%; left:16px; } .z5 { bottom:28%; right:13px; }
        .target-effect { width:100%; height:100%; border-radius:50%; border:3px solid var(--accent-cyan); background:radial-gradient(circle, rgba(0,242,234,0.5), transparent); opacity:0; transform:scale(0.5); transition:0.3s; box-shadow: 0 0 15px var(--accent-cyan); }
        .target-zone.active .target-effect { opacity:1; transform:scale(1); }
        
        .penalty-strategy { display:flex; gap:5px; margin-bottom:10px; }
        .step-badge { width:20px; height:20px; background:#333; border-radius:4px; color:#777; font-size:10px; display:flex; justify-content:center; align-items:center; font-family:'Orbitron'; transition:0.3s; }
        .step-badge.active { background:var(--accent-cyan); color:#000; font-weight:bold; box-shadow:0 0 10px var(--accent-cyan); }

        /* MINES */
        .mines-wrapper { width:90%; max-width:320px; }
        .mines-controls { display:flex; gap:10px; margin-bottom:15px; width:100%; }
        .mines-btn { flex:1; background:#222; border:1px solid #444; color:#fff; padding:10px; border-radius:8px; font-family:'Orbitron'; font-size:10px; cursor:pointer; transition:0.3s; text-align:center; }
        .mines-btn.active { background:var(--brand-green); color:#000; border-color:var(--brand-green); font-weight:bold; box-shadow:0 0 10px var(--brand-green); }
        .mines-btn.risk.active { background:var(--brand-red); border-color:var(--brand-red); box-shadow:0 0 10px var(--brand-red); color:#fff; }
        
        .mines-board { display:grid; gap:8px; background:var(--mines-bg); padding:10px; border-radius:10px; border:2px solid #3d3d5c; }
        .mine-tile { background:var(--mines-tile); aspect-ratio:1; border-radius:6px; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden; }
        .mine-tile.reveal { background:#004d13; box-shadow:inset 0 0 15px var(--brand-green); } 
        .mine-tile img { width:70%; display:none; animation:pop 0.3s; } .mine-tile.reveal img { display:block; }
        @keyframes pop { 0%{transform:scale(0);} 100%{transform:scale(1);} }

        /* CHICKEN */
        .chicken-wrapper { width:100%; overflow:hidden; margin-bottom:20px; }
        .chicken-scroll { display:flex; overflow-x:auto; gap:15px; padding:10px 20px; scroll-behavior:smooth; -ms-overflow-style:none; scrollbar-width:none; } .chicken-scroll::-webkit-scrollbar { display:none; }
        .chicken-step { min-width:60px; height:60px; background:#222; border-radius:50%; border:2px solid #444; display:flex; justify-content:center; align-items:center; font-family:'Orbitron'; font-size:12px; color:#fff; transition:0.3s; position:relative; }
        .chicken-step.win { background:#004d13; border-color:var(--brand-green); transform:scale(1.1); box-shadow:0 0 15px var(--brand-green); }
        .diff-select { margin-bottom:10px; background:#222; color:#fff; border:1px solid #444; padding:5px 15px; border-radius:20px; font-family:'Orbitron'; font-size:10px; }

        /* --- LIVE WINS & LOCK --- */
        .live-sheet { position:absolute; bottom:0; left:0; width:100%; max-height:40px; background:#111; border-radius:15px 15px 0 0; z-index:100; transition:0.4s; overflow:hidden; border-top:1px solid #333; }
        .live-sheet.open { max-height:50vh; border-color:var(--accent-cyan); }
        .live-head { padding:10px 20px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-family:'Orbitron'; font-size:11px; color:#aaa; }
        .live-list { padding:10px; overflow-y:auto; height:100%; }
        .win-item { display:flex; justify-content:space-between; padding:8px; margin-bottom:5px; background:rgba(255,255,255,0.05); border-radius:6px; font-family:'Orbitron'; font-size:10px; border-left:2px solid var(--brand-green); }

        #lock-screen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:3000; display:flex; flex-direction:column; justify-content:center; align-items:center; color:var(--brand-red); }
        .lock-icon { font-size:50px; margin-bottom:10px; animation:pulse 1s infinite; }
        @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.1);} 100%{transform:scale(1);} }
    </style>
</head>

<script>
    // --- CONFIG ---
    const VALID_KEYS = ['START-777', 'WIN-2024', 'VIP-EGYPT', 'BOSS-LEVEL', 'FINAL-GLITCH'];
    let attempts = 5;
    let activeGame = null;
    let lang = 'en';
    
    // --- TRANSLATIONS (FIXED: ARABIC KEEPS ENGLISH GAME NAMES) ---
    const TRANSLATIONS = {
        en: { aviator: "AVIATOR", penalty: "PENALTY", mines: "MINES", chicken: "CHICKEN", get_signal: "GET SIGNAL", exit: "EXIT", soon: "SOON" },
        es: { aviator: "AVIATOR", penalty: "PENALTI", mines: "MINAS", chicken: "POLLO", get_signal: "OBTENER SEÑAL", exit: "SALIR", soon: "PRONTO" },
        ar: { aviator: "AVIATOR", penalty: "PENALTY", mines: "MINES", chicken: "CHICKEN", get_signal: "احصل على إشارة", exit: "خروج", soon: "قريباً" }
    };

    // --- INIT ---
    window.onload = function() {
        runTerminal();
        setInterval(updateTime, 1000);
        setInterval(fakeOnline, 3000);
        setInterval(addFakeWin, 4000);
        for(let i=0; i<10; i++) addFakeWin();
        const sid = "SID-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('session-id').innerText = sid;
    };

    function runTerminal() {
        const text = document.getElementById('term-text');
        const lines = ["BOOT_SEQUENCE_INIT...", "LOADING_V29_CORE...", "BYPASSING_FIREWALL...", "READY."];
        let i = 0;
        function step() {
            if(i < lines.length) { text.innerText = lines[i++]; setTimeout(step, 400); }
            else { 
                setTimeout(() => {
                    document.getElementById('preloader').style.display='none';
                    document.getElementById('id-modal').style.display='flex';
                }, 500); 
            }
        }
        step();
    }

    // --- LOGIC: LOGIN ---
    function checkLogin() {
        const id = document.getElementById('user-id').value;
        const key = document.getElementById('user-key').value.trim().toUpperCase();
        const msg = document.getElementById('login-msg');

        // 1. Check ID (10 digits, starts with 155+)
        if (id.length !== 10 || parseInt(id.substring(0,3)) < 155) {
            msg.innerText = "ERROR: INVALID ID FORMAT (Must start with 155+, 10 digits)";
            return;
        }

        // 2. Check Key
        if (!VALID_KEYS.includes(key)) {
            msg.innerText = "ERROR: ACCESS KEY DENIED";
            return;
        }

        // Success
        msg.style.color = '#00ff41';
        msg.innerText = "ACCESS GRANTED";
        setTimeout(() => {
            document.getElementById('id-modal').style.display = 'none';
            document.getElementById('main-interface').style.display = 'flex'; 
            document.querySelector('.screen').classList.add('active'); 
        }, 1000);
    }

    // --- LOGIC: GLOBAL LIMIT ---
    function reduceAttempt() {
        attempts--;
        document.getElementById('attempts-display').innerText = attempts;
        if(attempts <= 0) {
            setTimeout(() => {
                document.getElementById('lock-screen').style.display = 'flex';
                document.getElementById('main-interface').style.display = 'none';
            }, 1500); 
        }
    }

    // --- NAVIGATION ---
    function navTo(game) {
        activeGame = game;
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'flex';
        document.getElementById('game-logo').src = `img/menu_${game}.png`;
        if(game === 'aviator') document.getElementById('game-logo').src = 'img/aviator_logo.png';

        // Reset UI
        document.getElementById('btn-signal').style.display = 'block';
        document.getElementById('btn-signal').disabled = false;
        document.getElementById('btn-signal').innerText = TRANSLATIONS[lang].get_signal;
        document.getElementById('btn-reset').classList.remove('visible');

        // Hide all game containers
        ['g-aviator', 'g-penalty', 'g-mines', 'g-chicken'].forEach(id => document.getElementById(id).style.display='none');
        
        // Init Game
        if(game === 'aviator') {
            document.getElementById('g-aviator').style.display='block';
            initAviator();
        }
        if(game === 'penalty') {
            document.getElementById('g-penalty').style.display='flex';
            resetPenaltyVisuals();
        }
        if(game === 'mines') {
            document.getElementById('g-mines').style.display='flex';
            setMinesSize(3);
        }
        if(game === 'chicken') {
            document.getElementById('g-chicken').style.display='flex';
            renderChicken();
        }
    }

    function goHome() {
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('menu-view').style.display = 'flex';
    }

    // --- SIGNAL HANDLER ---
    function getSignal() {
        if(attempts <= 0) return;
        const btn = document.getElementById('btn-signal');
        
        // PENALTY EXCEPTION (Don't reduce yet)
        if(activeGame === 'penalty') {
            playPenaltyRound(btn);
            return; 
        }

        // OTHERS: Reduce immediately
        reduceAttempt();
        btn.disabled = true;
        btn.innerText = "ANALYZING...";

        setTimeout(() => {
            btn.innerText = TRANSLATIONS[lang].get_signal;
            btn.disabled = false;
            if(activeGame === 'aviator') playAviator();
            if(activeGame === 'mines') playMines();
            if(activeGame === 'chicken') playChicken();
        }, 1500);
    }

    // --- GAME: PENALTY (Special Logic) ---
    let penStep = 0;
    function resetPenaltyVisuals() {
        penStep = 0;
        document.querySelectorAll('.target-zone').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.step-badge').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-reset').classList.remove('visible');
        document.getElementById('btn-signal').style.display = 'block';
    }

    function playPenaltyRound(btn) {
        btn.disabled = true;
        btn.innerText = "...";
        
        setTimeout(() => {
            // Visualize Step
            document.querySelectorAll('.target-zone').forEach(el => el.classList.remove('active'));
            const r = Math.floor(Math.random() * 5); // 0-4
            document.querySelectorAll('.target-zone')[r].classList.add('active');
            
            // Update Badge
            const badges = document.querySelectorAll('.step-badge');
            if(penStep < badges.length) badges[penStep].classList.add('active');
            
            penStep++;
            btn.disabled = false;
            btn.innerText = "NEXT STEP";

            if(penStep >= 5) {
                // End of round
                btn.style.display = 'none';
                document.getElementById('btn-reset').classList.add('visible');
            }
        }, 500);
    }

    function resetPenalty() {
        reduceAttempt(); // BURN ATTEMPT HERE
        resetPenaltyVisuals();
        document.getElementById('btn-signal').innerText = TRANSLATIONS[lang].get_signal;
    }

    // --- GAME: AVIATOR (Canvas) ---
    function initAviator() {
        const c = document.getElementById('av-canvas');
        const ctx = c.getContext('2d');
        c.width = c.parentElement.offsetWidth; c.height = 200;
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,c.width,c.height);
        document.getElementById('av-text').classList.remove('visible');
    }
    function playAviator() {
        const c = document.getElementById('av-canvas');
        const ctx = c.getContext('2d');
        const w = c.width, h = c.height;
        let t = 0;
        
        const endX = (Math.random() * 5 + 1.2).toFixed(2);
        const txt = document.getElementById('av-text');
        txt.innerText = endX + "x";
        txt.classList.add('visible');

        const loop = setInterval(() => {
            t += 0.05;
            ctx.clearRect(0,0,w,h);
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0,0,w,h);
            ctx.beginPath();
            ctx.moveTo(0, h);
            ctx.quadraticCurveTo(w/2, h, w * t, h - (h*0.8 * t));
            ctx.strokeStyle = '#ff334b'; ctx.lineWidth = 4; ctx.stroke();
            if(t >= 1) clearInterval(loop);
        }, 30);
    }

    // --- GAME: MINES ---
    let minesGrid = 3; 
    let minesRisk = false;
    function setMinesSize(s) {
        minesGrid = s;
        document.getElementById('m-3').classList.toggle('active', s===3);
        document.getElementById('m-5').classList.toggle('active', s===5);
        renderMinesGrid();
    }
    function setMinesMode(m) {
        minesRisk = (m === 'risk');
        document.getElementById('m-safe').classList.toggle('active', !minesRisk);
        document.getElementById('m-risk').classList.toggle('active', minesRisk);
    }
    function renderMinesGrid() {
        const b = document.getElementById('mines-grid');
        b.innerHTML = '';
        b.style.gridTemplateColumns = `repeat(${minesGrid}, 1fr)`;
        for(let i=0; i<minesGrid*minesGrid; i++) {
            const d = document.createElement('div');
            d.className = 'mine-tile';
            d.id = `mt-${i}`;
            d.innerHTML = '<img src="img/mines_star.png">';
            b.appendChild(d);
        }
    }
    function playMines() {
        renderMinesGrid(); // Reset
        const count = minesRisk ? 2 : Math.floor(Math.random() * 3) + 3;
        const total = minesGrid * minesGrid;
        let arr = [];
        while(arr.length < count) {
            let r = Math.floor(Math.random() * total);
            if(arr.indexOf(r) === -1) arr.push(r);
        }
        arr.forEach((idx, i) => {
            setTimeout(() => {
                document.getElementById(`mt-${idx}`).classList.add('reveal');
            }, i * 300);
        });
    }

    // --- GAME: CHICKEN ---
    function renderChicken() {
        const c = document.getElementById('ch-scroll');
        c.innerHTML = '';
        const coefs = ["1.12x","1.28x","1.47x","1.70x","1.98x","2.33x","2.76x","3.32x","4.03x","4.96x"];
        coefs.forEach((x, i) => {
            const d = document.createElement('div');
            d.className = 'chicken-step';
            d.id = `ch-${i}`;
            d.innerText = x;
            c.appendChild(d);
        });
    }
    function playChicken() {
        renderChicken();
        const steps = Math.floor(Math.random() * 4) + 2;
        for(let i=0; i<steps; i++) {
            setTimeout(() => {
                document.getElementById(`ch-${i}`).classList.add('win');
                document.getElementById('ch-scroll').scrollLeft += 50;
            }, i * 400);
        }
    }

    // --- UTILS ---
    function updateTime() {
        const d = new Date();
        const h = d.getHours().toString().padStart(2, '0');
        const m = d.getMinutes().toString().padStart(2, '0');
        document.getElementById('local-time').innerText = `${h}:${m}`;
    }
    function fakeOnline() {
        let n = parseInt(document.getElementById('online-num').innerText);
        document.getElementById('online-num').innerText = n + Math.floor(Math.random()*5) - 2;
    }
    function toggleLive() {
        document.getElementById('live-sheet').classList.toggle('open');
    }
    function addFakeWin() {
        const list = document.getElementById('live-ul');
        const id = "155" + Math.floor(Math.random()*9000000);
        const amt = Math.floor(Math.random()*1500) + 200;
        const div = document.createElement('div');
        div.className = 'win-item';
        div.innerHTML = `<span>User ${id.substring(0,6)}**</span> <span style="color:#00ff41">+${amt} EGP</span>`;
        list.prepend(div);
        if(list.children.length > 10) list.lastElementChild.remove();
    }
    function setLang(l) {
        lang = l;
        document.body.className = (l === 'ar') ? 'lang-ar' : '';
        document.getElementById('lang-box').className = (l === 'ar') ? 'lang-container ar-pos' : 'lang-container';
        
        document.querySelectorAll('[data-tr]').forEach(el => {
            const k = el.getAttribute('data-tr');
            if(TRANSLATIONS[l][k]) el.innerText = TRANSLATIONS[l][k];
        });
        
        // Update Signal Button if visible
        const btn = document.getElementById('btn-signal');
        if(btn.style.display !== 'none' && !btn.disabled) {
            btn.innerText = TRANSLATIONS[l].get_signal;
        }
    }
</script>
</body>
