<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Signal Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f121b;
            --card-bg: #1e222d;
            --primary: #007aff;
            --aviator-red: #e50b20;
            --penalty-yellow: #ffcc00;
            --mines-green: #00e700;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none; /* Защита от выделения текста */
        }

        /* Убираем стрелочки в поле ввода цифр */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        /* Экраны */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease-in-out;
        }

        .screen.active { display: flex; }

        /* Меню */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .game-card:active { transform: scale(0.95); background-color: #2a3040; }
        .game-icon { font-size: 35px; margin-bottom: 10px; }
        .game-title { font-weight: bold; font-size: 14px; letter-spacing: 1px; }

        /* Интерфейс игры */
        h2 { margin-bottom: 20px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: #888; }

        /* КРУГ (Для Aviator и Penalty) */
        .circle-display {
            width: 200px;
            height: 200px;
            border: 4px solid var(--aviator-red);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 0 40px rgba(229, 11, 32, 0.2);
            margin: 20px 0;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 70%);
            text-align: center;
            line-height: 1.2;
        }

        /* СЕТКА МИН (Новое!) */
        .mines-grid-container {
            display: none; /* Скрыто по умолчанию */
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: #151921;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .mine-cell {
            width: 45px;
            height: 45px;
            background-color: #2a3040;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.2s, background 0.3s;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
        }

        .mine-cell.active {
            background-color: #00e700;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 231, 0, 0.5);
        }

        .penalty-text { font-size: 24px; color: var(--penalty-yellow); }

        /* Инпуты */
        .input-group {
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
            max-width: 300px;
        }
        
        .hidden { display: none !important; } /* Важно: скрывать элементы */

        .input-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #666; }

        .history-input {
            background: var(--card-bg);
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            text-align: center;
            font-size: 20px;
            outline: none;
            box-sizing: border-box;
        }
        
        .history-input:focus { border-color: var(--primary); }

        /* Кнопки */
        .btn {
            background: linear-gradient(90deg, #007aff, #00b4ff);
            border: none;
            padding: 18px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 122, 255, 0.2);
            width: 100%;
            max-width: 300px;
            margin-top: 10px;
        }
        
        .btn-back {
            background: transparent;
            border: none;
            padding: 15px;
            margin-top: 5px;
            color: #555;
            font-size: 14px;
            cursor: pointer;
        }

        /* Загрузка */
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 50px 0; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <!-- МЕНЮ -->
    <div id="screen-menu" class="screen active">
        <h2 style="color: white;">CHOOSE GAME</h2>
        <div class="menu-grid">
            
            <div class="game-card" onclick="openGame('aviator')">
                <div class="game-icon">✈️</div>
                <div class="game-title">AVIATOR</div>
            </div>

            <div class="game-card" onclick="openGame('penalty')">
                <div class="game-icon">⚽</div>
                <div class="game-title">PENALTY</div>
            </div>

            <div class="game-card" onclick="openGame('mines')">
                <div class="game-icon">💣</div>
                <div class="game-title">MINES</div>
            </div>
            
            <div class="game-card" style="opacity: 0.5;">
                <div class="game-icon">🔒</div>
                <div class="game-title">SOON...</div>
            </div>

        </div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="screen-game" class="screen">
        <h2 id="game-title">GAME</h2>
        
        <!-- Инпут (только для Авиатора) -->
        <div class="input-group" id="input-block">
            <label>ENTER LAST COEFFICIENT</label>
            <input type="number" id="last-coef" class="history-input" placeholder="1.00" step="0.01">
        </div>

        <!-- КРУГ (Aviator / Penalty) -->
        <div class="circle-display" id="result-display">
            START
        </div>

        <!-- СЕТКА МИН (Mines) - Генерируется автоматически -->
        <div class="mines-grid-container" id="mines-grid">
            <!-- Клетки создаются скриптом -->
        </div>

        <div class="loader" id="loader"></div>

        <button class="btn" onclick="makePrediction()">GET SIGNAL</button>
        <button class="btn-back" onclick="backToMenu()">BACK TO MENU</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        let currentGame = '';

        // Создаем сетку мин при запуске
        function createMinesGrid() {
            const grid = document.getElementById('mines-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                let cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.id = 'cell-' + i;
                grid.appendChild(cell);
            }
        }
        createMinesGrid();

        function openGame(gameType) {
            currentGame = gameType;
            
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');

            const title = document.getElementById('game-title');
            const circle = document.getElementById('result-display');
            const minesGrid = document.getElementById('mines-grid');
            const inputBlock = document.getElementById('input-block');

            // Сброс всех экранов
            circle.style.display = 'flex'; // По умолчанию показываем круг
            minesGrid.style.display = 'none'; // Скрываем сетку
            inputBlock.classList.add('hidden'); // Скрываем инпут
            document.getElementById('last-coef').value = '';
            
            // Очистка сетки мин (убираем звезды)
            const cells = document.querySelectorAll('.mine-cell');
            cells.forEach(c => {
                c.classList.remove('active');
                c.innerHTML = '';
            });

            // Настройка под игру
            if (gameType === 'aviator') {
                title.innerText = 'AVIATOR';
                circle.style.borderColor = '#e50b20';
                circle.style.boxShadow = '0 0 40px rgba(229, 11, 32, 0.2)';
                circle.innerHTML = "START";
                circle.style.fontSize = "40px";
                inputBlock.classList.remove('hidden'); // Показываем инпут
            } 
            else if (gameType === 'penalty') {
                title.innerText = 'PENALTY';
                circle.style.borderColor = '#ffcc00';
                circle.style.boxShadow = '0 0 40px rgba(255, 204, 0, 0.2)';
                circle.innerHTML = "READY?";
            } 
            else if (gameType === 'mines') {
                title.innerText = 'MINES';
                circle.style.display = 'none'; // Прячем круг
                minesGrid.style.display = 'grid'; // Показываем сетку
            }
        }

        function backToMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }

        function makePrediction() {
            const circle = document.getElementById('result-display');
            const minesGrid = document.getElementById('mines-grid');
            const loader = document.getElementById('loader');
            const btn = document.querySelector('.btn');
            const lastCoef = document.getElementById('last-coef').value;

            // Проверка для Авиатора
            if (currentGame === 'aviator' && !lastCoef) {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                circle.innerText = "INPUT!";
                return;
            }

            // Анимация загрузки
            if(currentGame !== 'mines') circle.style.display = 'none';
            if(currentGame === 'mines') minesGrid.style.opacity = '0.5';
            
            loader.style.display = 'block';
            btn.disabled = true;
            btn.style.opacity = '0.5';

            setTimeout(() => {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                
                // === ЛОГИКА ===
                
                if (currentGame === 'aviator') {
                    circle.style.display = 'flex';
                    let prediction;
                    if (Math.random() > 0.85) {
                        prediction = (Math.random() * (5.00 - 2.00) + 2.00).toFixed(2);
                    } else {
                        prediction = (Math.random() * (1.90 - 1.10) + 1.10).toFixed(2);
                    }
                    circle.innerText = prediction + "x";
                } 
                
                else if (currentGame === 'penalty') {
                    circle.style.display = 'flex';
                    const zones = ["↖️<br>LEFT UP", "↗️<br>RIGHT UP", "↙️<br>LEFT DOWN", "↘️<br>RIGHT DOWN", "⬆️<br>TOP"];
                    const randomZone = zones[Math.floor(Math.random() * zones.length)];
                    circle.innerHTML = `<span class="penalty-text">${randomZone}</span>`;
                }
                
                else if (currentGame === 'mines') {
                    minesGrid.style.opacity = '1';
                    // Очистка
                    const cells = document.querySelectorAll('.mine-cell');
                    cells.forEach(c => {
                        c.classList.remove('active');
                        c.innerHTML = '';
                    });

                    // Выбираем 4 случайные клетки
                    let safeSpots = [];
                    while(safeSpots.length < 4) {
                        let r = Math.floor(Math.random() * 25);
                        if(safeSpots.indexOf(r) === -1) safeSpots.push(r);
                    }

                    // Показываем звезды
                    safeSpots.forEach(index => {
                        const cell = document.getElementById('cell-' + index);
                        cell.classList.add('active');
                        cell.innerHTML = '⭐️';
                    });
                }

                loader.style.display = 'none';
                btn.disabled = false;
                btn.style.opacity = '1';

            }, 1000); 
        }
    </script>
</body>
</html>
