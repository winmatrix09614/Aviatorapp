<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Signal Bot Ultimate v14.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050010;
            --accent-cyan: #00f2ea;
            --text-color: #ffffff;
            --brand-green: #00ff41;
            --brand-red: #ff334b;
            --glass-panel: rgba(20, 20, 30, 0.7);
            --mines-bg: #272749;
            --mines-tile: #2b2e55;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0; overflow: hidden; user-select: none; height: 100vh;
            /* Center on PC */
            display: flex; justify-content: center; align-items: flex-start;
        }

        /* --- MOBILE WRAPPER FOR PC --- */
        #app-wrapper {
            width: 100%;
            max-width: 450px; /* Limits width on PC */
            height: 100%;
            position: relative;
            background: transparent;
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* ARABIC FONT SUPPORT */
        body.lang-ar { font-family: 'Cairo', sans-serif; direction: rtl; }
        body.lang-ar .hud-bar { direction: ltr; }

        /* --- PRELOADER --- */
        #preloader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .terminal-text {
            color: var(--accent-cyan); font-family: 'Orbitron', monospace; 
            font-size: 12px; line-height: 1.6; text-align: left; width: 80%;
        }

        /* --- BACKGROUND --- */
        .cyber-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #020005 0%, #10002b 100%);
            z-index: -2;
        }

        /* --- HUD --- */
        .hud-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px; padding: 0 20px; box-sizing: border-box;
            display: flex; align-items: center; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 10px; color: rgba(255, 255, 255, 0.5); z-index: 50; pointer-events: none;
        }
        .status-dot { width: 6px; height: 6px; background: var(--brand-green); border-radius: 50%; box-shadow: 0 0 5px var(--brand-green); display: inline-block; margin-right: 5px; }
        .online-count { color: var(--accent-cyan); font-weight: bold; margin-left: 5px; }

        /* --- ID MODAL --- */
        .modal-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column;
            backdrop-filter: blur(10px);
        }
        .id-box {
            background: #111; border: 1px solid var(--accent-cyan); padding: 30px 20px; border-radius: 16px; width: 85%; max-width: 300px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 234, 0.15);
        }
        .id-input {
            width: 100%; padding: 14px; margin: 20px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; box-sizing: border-box;
            font-family: 'Orbitron'; text-align: center; font-size: 18px; border-radius: 10px; outline: none; transition: 0.3s;
        }
        .id-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0,242,234,0.2); }
        .id-btn {
            background: linear-gradient(90deg, #00f2ea 0%, #0080ff 100%); color: #000; border: none; width: 100%; padding: 14px; 
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 14px; text-transform: uppercase;
        }
        .sync-log {
            font-family: 'Orbitron'; font-size: 10px; color: #00ff41; margin-top: 15px; min-height: 15px; text-align: left; width: 100%; display: none;
        }

        /* --- LANG --- */
        .lang-container { position: absolute; top: 50px; right: 20px; z-index: 60; }
        .lang-container.ar-pos { right: auto; left: 20px; }
        select {
            background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 10px; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 12px; outline: none;
        }
        option { background: #000; }

        /* --- SCREENS --- */
        .screen { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            height: 100%; width: 100%; position: relative; z-index: 10; 
            padding-bottom: 120px; /* Space for Live Wins + Buttons */
            box-sizing: border-box;
        }
        .screen.active { display: flex; }

        /* --- MENU --- */
        .main-logo { text-align: center; margin-bottom: 20px; }
        .logo-title {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 26px; color: #fff;
            text-shadow: 0 0 20px rgba(58, 134, 255, 0.6); letter-spacing: 1px;
        }
        .brand-sub { font-size: 10px; color: #888; letter-spacing: 1px; margin-top: 5px; font-family: 'Poppins'; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 360px; }
        .game-card {
            background: var(--glass-panel); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px;
            text-align: center; cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden;
            min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .game-card:hover, .game-card:active {
            transform: translateY(-5px); border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.3);
        }
        
        /* SOON BLOCKS */
        .game-card.soon {
            cursor: default; opacity: 0.5; border-color: rgba(255,255,255,0.05);
        }
        .game-card.soon:hover, .game-card.soon:active {
            transform: none; box-shadow: none; border-color: rgba(255,255,255,0.05);
        }
        .soon-text {
            font-family: 'Orbitron'; font-size: 18px; font-weight: bold; color: #666; letter-spacing: 2px;
        }

        .game-img { width: 60px; height: 60px; margin-bottom: 8px; border-radius: 12px; object-fit: cover; }
        .game-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 12px; color: #fff; }

        /* --- GAME UI --- */
        .game-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; width: 100%; }
        .telegram-link {
            text-decoration: none; font-family: 'Orbitron', sans-serif; color: var(--accent-cyan);
            border: 1px solid rgba(0, 242, 234, 0.3); padding: 8px 16px; border-radius: 20px;
            font-size: 12px; letter-spacing: 1px; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px); margin-bottom: 10px; display: inline-block;
        }
        .game-logo-hero {
            width: 80px; height: auto; display: block; 
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
            animation: floatLogo 4s infinite ease-in-out; margin-bottom: 10px;
        }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .btn-signal {
            background: linear-gradient(90deg, #d6002a 0%, #8a001a 100%);
            border: none; width: 85%; max-width: 320px; padding: 16px; border-radius: 14px;
            color: white; font-family: 'Orbitron', sans-serif; font-size: 16px; letter-spacing: 1px;
            cursor: pointer; box-shadow: 0 5px 20px rgba(214, 0, 42, 0.25);
            text-transform: uppercase; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden; transition: 0.3s;
            z-index: 100;
        }
        .btn-signal:active { transform: scale(0.98); }
        .btn-signal:disabled { opacity: 0.8; cursor: not-allowed; background: #333; color: #888; box-shadow: none; }
        
        .btn-back { margin-top: 15px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #888; padding: 8px 25px; border-radius: 20px; font-size: 10px; font-family: 'Orbitron'; cursor: pointer; z-index: 100; }

        /* --- AVIATOR (FIXED) --- */
        .aviator-wrapper {
            position: relative; width: 100%; height: 200px; margin-bottom: 10px;
            overflow: hidden;
        }
        .aviator-graph-svg {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0; transition: opacity 0.5s;
            mask-image: linear-gradient(to right, black 70%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 70%, transparent 100%);
        }
        .aviator-graph-svg.active { opacity: 1; }
        .aviator-plane-img {
            position: absolute; width: 60px; height: auto; z-index: 5; opacity: 0;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            offset-path: path("M20,200 Q300,100 800,-100"); 
            offset-rotate: auto;
        }
        .aviator-plane-img.taking-off { opacity: 1; animation: flyOffScreen 3s forwards ease-in; }
        @keyframes flyOffScreen { 
            0% { offset-distance: 0%; transform: scale(0.6); } 
            100% { offset-distance: 100%; transform: scale(1.2); } 
        }
        .coef-text { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Orbitron'; font-size: 48px; font-weight: 900; color: #fff; z-index: 10; 
            text-shadow: 0 0 20px rgba(0,0,0,1); opacity: 0; transition: opacity 0.3s;
        }
        .coef-text.visible { opacity: 1; }

        /* --- PENALTY (FINAL FIX) --- */
        .penalty-container {
            position: relative; width: 300px; height: 190px; margin-bottom: 10px;
            background-image: url('img/penalty_bg.png'); background-size: cover; background-position: center;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .target-zone { position: absolute; width: 45px; height: 45px; border-radius: 50%; transition: 0.1s; display: flex; justify-content: center; align-items: center; }
        
        .z1 { top: 20px; left: 20px; } 
        .z2 { top: 20px; right: 20px; } 
        .z3 { top: 20px; left: 50%; transform: translateX(-50%); } 
        /* WIDER AND HIGHER */
        .z4 { bottom: 25%; left: 5px; } 
        .z5 { bottom: 25%; right: 5px; }
        
        .target-effect {
            width: 100%; height: 100%; border-radius: 50%;
            border: 3px solid var(--accent-cyan);
            background: radial-gradient(circle, rgba(0,242,234,0.6) 0%, transparent 70%);
            box-shadow: 0 0 20px var(--accent-cyan);
            transform: scale(0); opacity: 0; transition: 0.3s;
        }
        .target-zone.scanning { border: 2px dashed rgba(255, 255, 255, 0.6); background: rgba(255,255,255,0.1); }
        .target-zone.winner .target-effect { transform: scale(1.1); opacity: 1; animation: pulseTarget 1s infinite; }
        @keyframes pulseTarget { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* --- MINES (FIXED) --- */
        .mines-wrapper { width: 90%; max-width: 320px; margin-bottom: 20px; }
        .mines-mode-switch { display: flex; background: #222; border-radius: 20px; padding: 4px; margin-bottom: 15px; border: 1px solid #444; position: relative; }
        .mode-opt { flex: 1; text-align: center; padding: 8px; font-family: 'Orbitron'; font-size: 11px; z-index: 2; cursor: pointer; color: #888; transition: 0.3s; }
        .mode-opt.active { color: #000; font-weight: bold; text-shadow: none; }
        .mode-bg { position: absolute; top: 4px; left: 4px; width: 50%; height: calc(100% - 8px); background: var(--brand-green); border-radius: 16px; transition: 0.3s; z-index: 1; box-shadow: 0 0 10px var(--brand-green); }
        .mines-mode-switch[data-mode="risk"] .mode-bg { left: 50%; background: var(--brand-red); width: calc(50% - 4px); box-shadow: 0 0 10px var(--brand-red); }
        .mines-grid-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .mines-btn-grid { flex: 1; background: #333; border: 1px solid #555; color: #fff; padding: 12px 0; border-radius: 8px; font-family: 'Orbitron'; font-size: 12px; cursor: pointer; text-align: center; transition: 0.2s; }
        .mines-btn-grid.active { background: var(--brand-green); color: #000; border-color: var(--brand-green); font-weight: 900; box-shadow: 0 0 15px rgba(0, 255, 65, 0.3); }
        .mines-stepper { display: flex; align-items: center; justify-content: space-between; background: #222; border-radius: 12px; border: 1px solid #444; padding: 5px; margin-bottom: 15px; }
        .step-btn { width: 45px; height: 45px; background: #333; border: none; border-radius: 8px; color: #fff; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .step-btn:active { background: var(--brand-green); color: #000; }
        .mines-count-display { font-family: 'Orbitron'; font-size: 20px; font-weight: bold; color: #fff; }
        .mines-label-sm { font-size: 10px; color: #888; font-family: 'Poppins'; }
        .mines-board { background: var(--mines-bg); padding: 10px; border-radius: 10px; display: grid; gap: 6px; border: 2px solid #3d3d5c; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); transition: all 0.3s; }
        .mine-tile { background-color: var(--mines-tile); border-radius: 6px; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .mine-tile img { width: 70%; height: 70%; object-fit: contain; display: none; position: relative; z-index: 20; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .mine-tile.reveal { background-color: #004d13; box-shadow: inset 0 0 10px #00ff41; }
        .mines-wrapper.risk-mode .mine-tile.reveal { background-color: #4a1a25; box-shadow: inset 0 0 10px #ff334b; }
        .mine-tile.reveal img { display: block; }
        
        /* --- CHICKEN ROAD (REDESIGN v14) --- */
        .chicken-wrapper { width: 95%; max-width: 360px; margin-bottom: 20px; flex-direction: column; align-items: center; position: relative; }
        
        /* HORIZONTAL SCROLL CONTAINER */
        .chicken-road-horizontal {
            width: 100%;
            height: 180px;
            background: #2b2b2b;
            border-radius: 12px;
            border: 2px dashed #444;
            box-shadow: inset 0 0 20px #000;
            overflow-x: auto; /* ENABLE HORIZONTAL SCROLL */
            overflow-y: hidden;
            white-space: nowrap; /* KEEP ITEMS IN LINE */
            padding: 20px 10px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            /* Hide scrollbar for cleaner look */
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .chicken-road-horizontal::-webkit-scrollbar { display: none; } /* Chrome, Safari, Opera */

        .road-step-wrapper {
            display: inline-flex;
            align-items: center;
            position: relative;
        }

        .road-step {
            width: 60px; height: 60px;
            background: #1a1a1a; border: 3px solid #333; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; transition: 0.3s;
            box-shadow: 0 4px 5px rgba(0,0,0,0.5);
            flex-shrink: 0; /* Prevent shrinking */
        }

        .step-coef { font-family: 'Orbitron'; font-size: 11px; color: #fff; font-weight: bold; }
        .step-label { font-family: 'Poppins'; font-size: 8px; color: #666; }

        /* SAFE STATE */
        .road-step.safe {
            border-color: var(--brand-green);
            background: radial-gradient(circle, #004d13 0%, #002209 100%);
            box-shadow: 0 0 15px var(--brand-green);
            transform: scale(1.1); z-index: 2;
        }
        .road-step.safe .step-coef { text-shadow: 0 0 5px var(--brand-green); }

        /* CONNECTOR LINE */
        .road-connector {
            width: 30px; height: 4px;
            background: repeating-linear-gradient(90deg, #444, #444 5px, transparent 5px, transparent 10px);
            flex-shrink: 0;
        }
        .road-step.safe + .road-connector {
             background: repeating-linear-gradient(90deg, var(--brand-green), var(--brand-green) 5px, transparent 5px, transparent 10px);
             box-shadow: 0 0 5px var(--brand-green);
        }

        /* CASHOUT LABEL */
        .cashout-label {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            background: var(--brand-green); color: #000; font-family: 'Orbitron'; font-weight: 900;
            font-size: 12px; padding: 4px 10px; border-radius: 12px;
            box-shadow: 0 0 15px var(--brand-green);
            opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .road-step.safe.final .cashout-label { opacity: 1; top: -45px; }


        /* --- LIVE WINS LIST --- */
        .live-wins-list {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 160px;
            background: linear-gradient(to top, #000 20%, transparent 100%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 20px; box-sizing: border-box;
            z-index: 50; overflow: hidden; pointer-events: none;
        }
        .win-row {
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Orbitron'; font-size: 11px; color: #ccc;
            margin-bottom: 6px; opacity: 0; transform: translateY(20px);
            animation: slideUp 0.5s forwards;
            background: rgba(0, 0, 0, 0.5); padding: 4px 8px; border-radius: 4px; border-left: 2px solid var(--brand-green);
        }
        .win-row.out { animation: fadeOut 0.5s forwards; }
        .win-row.big-win { border-left: 2px solid #ff9d00; background: rgba(255, 157, 0, 0.2); }
        @keyframes slideUp { 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { 100% { opacity: 0; transform: translateY(-10px); } }
        .win-name { color: #fff; font-weight: bold; font-family: 'Orbitron'; letter-spacing: 1px; }
        .win-amt { color: var(--brand-green); text-shadow: 0 0 5px rgba(0,255,65,0.5); }
        .win-game { font-size: 9px; color: #888; margin-right: auto; margin-left: 10px; }

    </style>
</head>
<body class="lang-en">

    <div class="cyber-wrapper"></div>
    
    <div id="app-wrapper">
        
        <div id="preloader"><div class="terminal-text" id="term-text"></div></div>

        <div class="hud-bar">
            <div><span class="status-dot"></span>ONLINE <span id="online-users" class="online-count">1420</span></div>
            <div id="session-id">SID: ...</div>
        </div>
        
        <div class="lang-container" id="lang-cont">
            <select onchange="changeLang(this.value)" id="lang-select">
                <option value="en">🇬🇧 EN</option>
                <option value="es">🇪🇸 ES</option>
                <option value="ar">🇦🇪 AR</option>
            </select>
        </div>

        <div id="screen-menu" class="screen">
            <div class="main-logo">
                <div class="logo-title">AI PREDICTOR</div>
                <div style="font-size:9px; color:#00f2ea; letter-spacing:2px; font-weight:bold; margin-top:5px;">NEURAL v14.0</div>
                <div class="brand-sub">powered by Omar</div>
            </div>
            <div class="menu-grid">
                <div class="game-card" onclick="openGame('aviator')"><img src="img/menu_aviator.png" class="game-img"><div class="game-title" data-tr="aviator">AVIATOR</div></div>
                <div class="game-card" onclick="openGame('penalty')"><img src="img/menu_penalty.png" class="game-img"><div class="game-title" data-tr="penalty">PENALTY</div></div>

                <h3 style="color:#00f2ea; font-family:'Orbitron'; margin-bottom:5px;">AUTHORIZATION</h3>

                <input type="tel" id="user-id-input" class="id-input" placeholder="Account ID" maxlength="12">
                <button id="btn-connect" class="id-btn" onclick="validateAndConnect()">CONNECT ACCOUNT</button>

                <div id="sync-log" class="sync-log"></div>
            </div>
        </div>

        <div id="screen-game" class="screen">

                <div class="game-header">
                    <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>
                    <img src="img/aviator_logo.png" class="game-logo-hero">
                </div>
                <div class="aviator-wrapper">
                    <svg class="aviator-graph-svg" id="aviator-graph" viewBox="0 0 350 200" preserveAspectRatio="none">

                        <path d="M0,200 Q150,150 350,20" fill="none" stroke="#ff334b" stroke-width="4" />
                    </svg>

                </div>
            </div>

            <div id="penalty-view" style="display:none; width:100%; display:flex; flex-direction:column; align-items:center;">
                <div class="game-header">
                    <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>
                    <img src="img/menu_penalty.png" class="game-logo-hero" style="width:60px; height:60px; border-radius:12px;">
                </div>
                <div class="penalty-container">
                    <div class="target-zone z1" id="pz1"><div class="target-effect"></div></div>
                    <div class="target-zone z2" id="pz2"><div class="target-effect"></div></div>
                    <div class="target-zone z3" id="pz3"><div class="target-effect"></div></div>
                    <div class="target-zone z4" id="pz4"><div class="target-effect"></div></div>
                    <div class="target-zone z5" id="pz5"><div class="target-effect"></div></div>
                </div>
            </div>

            <div id="mines-view" style="display:none; width:100%; display:flex; flex-direction:column; align-items:center;">
                <div class="game-header">
                    <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>
                    <img src="img/menu_mines.png" class="game-logo-hero" style="width:60px; height:60px; border-radius:12px;">
                </div>
                <div class="mines-wrapper" id="mines-wrap">
                    <div class="mines-mode-switch" id="mines-mode" data-mode="safe">
                        <div class="mode-bg"></div>
                        <div class="mode-opt active" onclick="setMinesMode('safe')">SAFE</div>
                        <div class="mode-opt" onclick="setMinesMode('risk')">HIGH RISK</div>
                    </div>
                    <div class="mines-grid-select">
                        <div class="mines-btn-grid active" id="btn-3" onclick="setMinesGrid(3)">3x3</div>
                        <div class="mines-btn-grid" id="btn-5" onclick="setMinesGrid(5)">5x5</div>
                    </div>
                    <div class="mines-stepper">
                        <div style="display:flex; flex-direction:column; padding-left:5px;">
                            <span class="mines-count-display" id="mines-val">3</span>
                            <span class="mines-label-sm">TRAPS</span>
                        </div>
                        <div style="display:flex; gap:5px;">
                            <button class="step-btn" onclick="stepMines(-1)">−</button>
                            <button class="step-btn" onclick="stepMines(1)">+</button>
                        </div>
                    </div>
                    <div id="mines-board" class="mines-board"></div>
                </div>
            </div>

            <div id="chicken-view" style="display:none; width:100%; display:flex; flex-direction:column; align-items:center;">
                <div class="game-header">
                    <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>
                    <img src="img/menu_chicken.png" class="game-logo-hero" style="width:60px; height:60px; border-radius:12px;">
                </div>
                <div class="chicken-wrapper">
                    <div style="width:100%; text-align:right; margin-bottom:10px;">
                        <select id="chicken-diff" onchange="renderChickenRoad()" style="padding: 8px 15px;">
                            <option value="easy">EASY</option>
                            <option value="medium" selected>MEDIUM</option>
                            <option value="hard">HARD</option>
                            <option value="hardcore">HARDCORE</option>
                        </select>
                    </div>
                    <div class="chicken-road-horizontal" id="chicken-road-container">
                        </div>
                </div>
            </div>

            <button id="signal-btn" class="btn-signal" onclick="getSignal()" data-tr="get_signal">GET SIGNAL</button>
            <button class="btn-back" onclick="backMenu()" data-tr="exit">EXIT</button>
        </div>

        <div id="live-list" class="live-wins-list"></div>

    </div>

    <div style="display:none;">
        <img src="img/menu_aviator.png"><img src="img/menu_penalty.png">
        <img src="img/menu_mines.png"><img src="img/menu_chicken.png">
        <img src="img/plane.png"><img src="img/penalty_bg.png">
        <img src="img/aviator_logo.png"><img src="img/mines_star.png">
    </div>

    <script>
        // --- LOCALIZATION DATA ---
        const trans = {
            en: { get_signal: "GET SIGNAL", exit: "EXIT", aviator: "AVIATOR", penalty: "PENALTY", soon: "SOON" },
            es: { get_signal: "OBTENER SEÑAL", exit: "SALIR", aviator: "AVIATOR", penalty: "PENALTI", soon: "PRONTO" },
            ar: { get_signal: "احصل على إشارة", exit: "خروج", aviator: "طيار", penalty: "ضربة جزاء", soon: "قريباً" }
        };
        const currData = { en: "$", es: "€", ar: "EGP" };
        let curLang = 'en';

        // --- CHICKEN ROAD DATA (PROVIDED) ---
        const CHICKEN_DATA = {
            easy: ["1.03x", "1.07x", "1.12x", "1.17x", "1.23x", "1.29x", "1.36x", "1.44x", "1.53x", "1.63x", "1.75x", "1.88x", "2.04x", "2.22x", "2.45x", "2.72x", "3.06x", "3.50x", "4.08x", "4.90x", "6.13x", "6.61x", "9.81x", "19.44x"],
            medium: ["1.12x", "1.28x", "1.47x", "1.70x", "1.98x", "2.33x", "2.76x", "3.32x", "4.03x", "4.96x", "6.20x", "6.91x", "8.90x", "11.76x", "15.99x", "22.61x", "33.58x", "53.20x", "92.17x", "182.51x", "451.71x", "1778.80x"],
            hard: ["1.23x", "1.55x", "1.98x", "2.56x", "3.36x", "4.49x", "5.49x", "7.53x", "10.56x", "15.21x", "22.59x", "34.79x", "55.97x", "94.99x", "172.42x", "341.40x", "760.46x", "2007.63x", "6956.47x", "41321.43x"],
            hardcore: ["1.63x", "2.80x", "4.95x", "9.08x", "15.21x", "30.12x", "62.96x", "140.24x", "337.19x", "890.19x", "2643.89x", "9161.08x", "39301.05x", "233448.29x", "254112.51x"]
        };

        // --- BOOT ---
        const termLines = ["INITIALIZING...", "CHECKING RESOURCES...", "ESTABLISHING SECURE TUNNEL...", "READY."];
        let lineIdx = 0;
        
        window.onload = function() {
            const savedId = localStorage.getItem('user_id');
            if(savedId) document.getElementById('user-id-input').value = savedId;
            
            setInterval(() => {
                let c = parseInt(document.getElementById('online-users').innerText);
                c += Math.floor(Math.random() * 5) - 2;
                document.getElementById('online-users').innerText = c;
            }, 3000);

            addLiveWinItem(); 
            setInterval(addLiveWinItem, 3500);

            const term = document.getElementById('term-text');
            function typeLine() {
                if(lineIdx < termLines.length) {
                    term.innerText = termLines[lineIdx++];
                    setTimeout(typeLine, 300);
                } else {
                    setTimeout(() => { 
                        document.getElementById('preloader').style.display='none'; 
                        document.getElementById('id-modal').style.display='flex';
                    }, 500);
                }
            }
            typeLine();
        };

        const sid = "SID-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('session-id').innerText = sid;

        // --- AUTH ---
        function validateAndConnect() {
            const val = document.getElementById('user-id-input').value;
            const err = document.getElementById('id-error');
            const btn = document.getElementById('btn-connect');
            const log = document.getElementById('sync-log');

            if (val.length < 5) { err.innerText = "ERROR: INVALID ID"; return; }
            localStorage.setItem('user_id', val);

            err.innerText = ""; btn.disabled = true; btn.style.background = "#333"; btn.innerText = "CONNECTING..."; log.style.display = "block";
            
            setTimeout(() => { log.innerText = "> Handshake established..."; }, 600);
            setTimeout(() => { log.innerText = "> Verifying hash tokens..."; }, 1200);
            setTimeout(() => { log.innerText = "> Downloading betting history..."; }, 2000);
            setTimeout(() => { 
                log.innerText = "> SYNCHRONIZATION COMPLETE"; 
                btn.innerText = "SUCCESS"; btn.style.background = "#00f2ea"; btn.style.color = "#000"; 
            }, 2800);
            setTimeout(() => { 
                document.getElementById('id-modal').style.display = 'none'; 
                document.getElementById('screen-menu').classList.add('active'); 
            }, 3500);
        }

        // --- TRANS ---
        function changeLang(l) {
            curLang = l;
            document.body.className = "lang-" + l;
            const cont = document.getElementById('lang-cont');
            if(l === 'ar') cont.classList.add('ar-pos'); else cont.classList.remove('ar-pos');

            document.querySelectorAll('[data-tr]').forEach(el => {
                const k = el.getAttribute('data-tr');
                if(trans[l][k]) el.innerText = trans[l][k];
            });
        }

        // --- LIVE WINS LIST LOGIC ---
        function addLiveWinItem() {
            const list = document.getElementById('live-list');
            const prefixes = ['155', '156', '157', '158', '159', '160'];
            const p = prefixes[Math.floor(Math.random()*prefixes.length)];
            const id = `${p}****${Math.floor(Math.random()*90)+10}`;

            let amt = Math.floor(Math.random() * 290) + 10;
            let isBigWin = false;
            if(Math.random() > 0.95) {
                amt = Math.floor(Math.random() * 2000) + 1000;
                isBigWin = true;
            }

            const games = ["Aviator", "Mines", "Penalty"];
            const game = games[Math.floor(Math.random()*games.length)];
            
            const div = document.createElement('div');
            div.className = 'win-row';
            if(isBigWin) div.classList.add('big-win');

            div.innerHTML = `<div><span class="win-name">${id}</span> <span class="win-game">${game}</span></div> <div class="win-amt">+${amt}${currData[curLang]}</div>`;
            list.prepend(div);
            if(list.children.length > 5) {
                const last = list.lastElementChild; last.classList.add('out');
                setTimeout(() => last.remove(), 500);
            }
        }

        // --- GAME LOGIC ---
        let activeGame = null;
        let minesSize = 3;
        let minesCount = 3;
        let minesMode = 'safe';

        function openGame(g) {
            activeGame = g;
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            ['aviator', 'penalty', 'mines', 'chicken'].forEach(id => document.getElementById(id+'-view').style.display = 'none');
            
            document.getElementById('signal-btn').disabled = false;
            document.getElementById('signal-btn').innerText = trans[curLang].get_signal;
            document.getElementById(g+'-view').style.display = 'flex';

            // Reset States
            if(g === 'aviator') { 
                const plane = document.getElementById('aviator-plane');
                plane.classList.remove('taking-off');
                document.getElementById('coef-text').classList.remove('visible');
            }
            if(g === 'penalty') {
                document.querySelectorAll('.target-zone').forEach(el=>el.classList.remove('winner','scanning'));
            }
            if(g === 'mines') setMinesGrid(3);
            if(g === 'chicken') renderChickenRoad();
        }

        function backMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }

        // --- MINES FUNCTIONS ---
        function setMinesGrid(s) {
            minesSize = s;
            const b = document.getElementById('mines-board');
            b.style.gridTemplateColumns = `repeat(${s}, 1fr)`; b.innerHTML = "";
            document.getElementById('btn-3').classList.remove('active');
            document.getElementById('btn-5').classList.remove('active');
            document.getElementById(`btn-${s}`).classList.add('active');
            for(let i=0; i<s*s; i++) {
                const d = document.createElement('div'); d.className='mine-tile'; d.id='mt-'+i; 
                d.innerHTML='<img src="img/mines_star.png">'; b.appendChild(d);
            }
            minesCount = 3; document.getElementById('mines-val').innerText = minesCount;
        }
        function stepMines(d) {
            const max = (minesSize * minesSize) - 1;
            minesCount += d;
            if(minesCount < 1) minesCount = 1;
            if(minesCount > max) minesCount = max;
            document.getElementById('mines-val').innerText = minesCount;
        }
        function setMinesMode(m) {
            minesMode = m;
            const el = document.getElementById('mines-mode');
            const wrap = document.getElementById('mines-wrap');
            el.setAttribute('data-mode', m);
            document.querySelectorAll('.mode-opt').forEach(o => o.classList.remove('active'));
            if(m==='safe') { el.children[1].classList.add('active'); wrap.classList.remove('risk-mode'); }
            else { el.children[2].classList.add('active'); wrap.classList.add('risk-mode'); }
        }

        // --- CHICKEN ROAD RENDERER ---
        function renderChickenRoad() {
            const diff = document.getElementById('chicken-diff').value;
            const data = CHICKEN_DATA[diff];
            const container = document.getElementById('chicken-road-container');
            container.innerHTML = ""; // Clear
            container.scrollLeft = 0; // Reset scroll

            data.forEach((coef, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'road-step-wrapper';
                
                const step = document.createElement('div');
                step.className = 'road-step';
                step.id = 'road-step-' + index;
                step.innerHTML = `<span class="step-coef">${coef}</span><span class="step-label">STEP ${index+1}</span><div class="cashout-label">CASHOUT</div>`;
                
                wrapper.appendChild(step);

                // Add connector if not last
                if(index < data.length - 1) {
                    const connector = document.createElement('div');
                    connector.className = 'road-connector';
                    wrapper.appendChild(connector);
                }
                container.appendChild(wrapper);
            });
        }

        // --- SIGNAL LOGIC ---
        function getSignal() {
            const btn = document.getElementById('signal-btn');
            btn.disabled = true;

            // 1. HARD RESET VISUALS
            if(activeGame === 'aviator') {
                 const plane = document.getElementById('aviator-plane');
                 const graph = document.getElementById('aviator-graph');
                 plane.classList.remove('taking-off');
                 graph.classList.remove('active');
                 document.getElementById('coef-text').classList.remove('visible');
                 void plane.offsetWidth; 
            }
            if(activeGame === 'penalty') {
                 document.querySelectorAll('.target-zone').forEach(el=>el.classList.remove('winner', 'scanning'));
            }
            if(activeGame === 'mines') {
                 document.querySelectorAll('.mine-tile').forEach(el=>el.classList.remove('reveal'));
            }
            if(activeGame === 'chicken') {
                document.querySelectorAll('.road-step').forEach(el => el.classList.remove('safe', 'final'));
                document.getElementById('chicken-road-container').scrollLeft = 0;
            }

            // 2. WARMING SEQUENCE
            let steps = ["CONNECTING...", "ANALYZING ID...", "PREDICTING..."];
            if(curLang === 'ar') steps = ["جار الاتصال...", "تحليل...", "تنبؤ..."];
            
            let stepI = 0;
            btn.innerText = steps[0];
            
            const stepInt = setInterval(() => {
                stepI++;
                if(stepI < steps.length) {
                    btn.innerText = steps[stepI];
                } else {
                    clearInterval(stepInt);
                    showResult(btn);
                }
            }, 600);
        }

        function showResult(btn) {
            if(activeGame === 'aviator') {
                 const finalVal = (Math.random() * (5.0 - 1.2) + 1.2).toFixed(2);
                 const duration = 3000; 
                 const steps = duration / 50;
                 const increment = (finalVal - 1.00) / steps;
                 
                 const plane = document.getElementById('aviator-plane');
                 plane.classList.add('taking-off'); // START FLIGHT
                 
                 document.getElementById('aviator-graph').classList.add('active');
                 const textEl = document.getElementById('coef-text');
                 textEl.classList.add('visible');
                 
                 let currentVal = 1.00;
                 const int = setInterval(() => {
                    currentVal += increment;
                    if(currentVal >= finalVal) {
                        currentVal = finalVal;
                        clearInterval(int);
                        textEl.innerText = finalVal + "x";
                        cooldown(btn);
                    } else {
                        textEl.innerText = currentVal.toFixed(2) + "x";
                    }
                 }, 50);
            }
            else if(activeGame === 'penalty') {
                const targets = document.querySelectorAll('.target-zone');
                let scanSteps = 0;
                const scanInt = setInterval(() => {
                    targets.forEach(el => el.classList.remove('scanning'));
                    targets[Math.floor(Math.random()*5)].classList.add('scanning');
                    scanSteps++;
                    if(scanSteps > 10) {
                        clearInterval(scanInt);
                        targets.forEach(el => el.classList.remove('scanning'));
                        const r = Math.floor(Math.random()*5)+1;
                        document.getElementById('pz'+r).classList.add('winner');
                        cooldown(btn);
                    }
                }, 100);
            }
            else if(activeGame === 'mines') {
                const total = minesSize * minesSize;
                let toReveal = 0;
                if(minesMode === 'safe') toReveal = Math.floor(Math.random()*2)+3; // 3-4
                else toReveal = total - minesCount; // All safe cells
                let set = new Set();
                while(set.size < toReveal) { set.add(Math.floor(Math.random() * total)); }
                let arr = Array.from(set); let i=0;
                let int = setInterval(() => { 
                    if(i>=arr.length) { clearInterval(int); cooldown(btn); } 
                    else { document.getElementById('mt-'+arr[i]).classList.add('reveal'); i++; } 
                }, 100);
            }
            else if(activeGame === 'chicken') {
                const diff = document.getElementById('chicken-diff').value;
                const totalSteps = CHICKEN_DATA[diff].length;
                const container = document.getElementById('chicken-road-container');

                // Smart path logic
                let safeSteps = Math.floor(Math.random() * 4) + 3; // Default 3-6
                if(Math.random() > 0.8) safeSteps = Math.floor(Math.random() * 5) + 8; // Lucky 8-12
                if(safeSteps > totalSteps) safeSteps = totalSteps;

                let i = 0;
                const int = setInterval(() => {
                    if(i >= safeSteps) {
                        clearInterval(int);
                        if(i > 0) document.getElementById('road-step-' + (i-1)).classList.add('final'); // Mark last as cashout
                        cooldown(btn);
                    } else {
                        const stepEl = document.getElementById('road-step-' + i);
                        stepEl.classList.add('safe');
                        // Auto-scroll to center the active step
                        const scrollPos = stepEl.offsetLeft - container.clientWidth / 2 + stepEl.clientWidth / 2;
                        container.scrollTo({ left: scrollPos, behavior: 'smooth' });
                        i++;
                    }
                }, 600);
            }
        }

        function cooldown(btn) {
            let cd = 4;
            const t = setInterval(() => {
                btn.innerText = `WAIT ${cd}s`; cd--;
                if(cd < 0) { clearInterval(t); btn.innerText = trans[curLang].get_signal; btn.disabled = false; }
            }, 1000);
        }

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
