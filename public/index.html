<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Signal Bot Ultimate v7.9.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050010;
            --accent-cyan: #00f2ea;
            --text-color: #ffffff;
            --brand-green: #00ff41;
            --brand-red: #ff334b;
            --glass-panel: rgba(20, 20, 30, 0.6);
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0; overflow: hidden; user-select: none; height: 100vh;
            display: flex; flex-direction: column;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .terminal-text {
            color: var(--accent-cyan); font-family: 'Orbitron', monospace; 
            font-size: 12px; line-height: 1.6; text-align: left; width: 80%;
        }

        /* --- BACKGROUND --- */
        .cyber-wrapper {
            position: absolute; width: 100%; height: 100%; overflow: hidden;
            background: linear-gradient(to bottom, #020005 0%, #10002b 100%);
            z-index: -2;
        }

        /* --- HUD --- */
        .hud-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; padding: 0 20px; box-sizing: border-box;
            display: flex; align-items: center; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 11px; color: rgba(255, 255, 255, 0.5); z-index: 50;
        }
        .status-dot { width: 6px; height: 6px; background: var(--brand-green); border-radius: 50%; box-shadow: 0 0 5px var(--brand-green); display: inline-block; margin-right: 5px; }

        /* --- Sound Toggle --- */
        #sound-toggle {
            position: absolute; top: 18px; right: 20px; width: 24px; height: 24px; cursor: pointer; z-index: 100;
        }
        #sound-toggle img { width: 100%; height: 100%; filter: invert(50%); transition: filter 0.2s; }
        #sound-toggle:active img { filter: invert(80%); }

        /* --- ID MODAL --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column;
            backdrop-filter: blur(10px);
        }
        .id-box {
            background: #111; border: 1px solid var(--accent-cyan); padding: 30px 20px; border-radius: 16px; width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 234, 0.15);
        }
        .id-input {
            width: 100%; padding: 14px; margin: 20px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; box-sizing: border-box;
            font-family: 'Orbitron'; text-align: center; font-size: 18px; border-radius: 10px; outline: none; transition: 0.3s;
        }
        .id-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0,242,234,0.2); }
        .id-btn {
            background: linear-gradient(90deg, #00f2ea 0%, #0080ff 100%); color: #000; border: none; width: 100%; padding: 14px; 
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 14px; text-transform: uppercase;
        }
        .sync-log {
            font-family: 'Orbitron'; font-size: 10px; color: #00ff41; margin-top: 15px; min-height: 15px; text-align: left; width: 100%; display: none;
        }

        /* --- SCREENS --- */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: flex-start; height: 100%; width: 100%; position: absolute; z-index: 10; top: 0; left: 0; box-sizing: border-box; padding-top: 60px; }
        .screen.active { display: flex; }

        /* --- MENU --- */
        .main-menu-content {
             text-align:center; flex-grow:1; display:flex; flex-direction:column; justify-content:center; align-items:center; width: 100%;
        }
        .main-logo { text-align: center; margin-bottom: 20px; }
        .logo-title {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 26px; color: #fff;
            text-shadow: 0 0 20px rgba(58, 134, 255, 0.6); letter-spacing: 1px;
        }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 90%; max-width: 380px; }
        .game-card {
            background: var(--glass-panel); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px;
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .game-card:active { transform: scale(0.96); border-color: var(--accent-cyan); }
        .game-img { width: 60px; height: 60px; margin-bottom: 8px; border-radius: 12px; object-fit: cover; }
        .game-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 12px; color: #fff; }

        .game-card-soon {
            opacity: 0.5; cursor: not-allowed; pointer-events: none;
            display: flex; justify-content: center; align-items: center; min-height: 108px; box-sizing: border-box;
        }
        .soon-text { font-family: 'Orbitron'; font-size: 20px; color: #fff; letter-spacing: 2px; }

        /* --- LIVE FEED --- */
        #live-feed {
            width: 90%; max-width: 380px; margin-top: auto; margin-bottom: 15px; padding: 5px 10px; box-sizing: border-box;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;
            font-family: 'Orbitron', monospace; font-size: 10px;
        }
        .feed-title { color: #888; text-align: center; margin-bottom: 5px; letter-spacing: 1px; }
        .feed-list { list-style: none; margin: 0; padding: 0; height: 75px; overflow: hidden; position: relative; }
        .feed-item {
            display: flex; justify-content: space-between; padding: 2px 5px;
            color: #ccc; border-radius: 4px; transition: all 0.5s ease-out;
        }
        .feed-item span:first-child { color: var(--accent-cyan); min-width: 60px; }
        .feed-item span:nth-child(2) { color: #fff; flex-grow: 1; text-align: center; }
        .feed-item span:last-child { color: var(--brand-green); font-weight: bold; min-width: 70px; text-align: right; }

        .new-win { animation: newWinHighlight 2.5s ease-out; }
        @keyframes newWinHighlight {
            0% { background: rgba(0, 242, 234, 0.2); transform: translateY(-10px); opacity: 0; }
            30% { background: rgba(0, 242, 234, 0.2); transform: translateY(0); opacity: 1; }
            100% { background: transparent; }
        }

        /* --- GAME UI --- */
        #screen-game { justify-content: center; }
        .telegram-link {
            text-decoration: none; font-family: 'Orbitron', sans-serif; color: var(--accent-cyan);
            border: 1px solid rgba(0, 242, 234, 0.3); padding: 8px 16px; border-radius: 20px;
            font-size: 12px; letter-spacing: 1px; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px); margin-bottom: 20px; transition: 0.3s; display: inline-block;
        }
        .risk-block { width: 100%; display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; opacity: 0; transition: opacity 0.5s; }
        .risk-item { background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 6px; font-family: 'Orbitron'; font-size: 10px; color: #aaa; border: 1px solid rgba(255,255,255,0.1); }
        .risk-val { color: #fff; font-weight: bold; margin-left: 5px; }

        .btn-signal {
            background: linear-gradient(90deg, #d6002a 0%, #8a001a 100%);
            border: none; width: 80%; max-width: 300px; padding: 16px; border-radius: 12px;
            color: white; font-family: 'Orbitron', sans-serif; font-size: 16px; letter-spacing: 1px;
            cursor: pointer; box-shadow: 0 5px 20px rgba(214, 0, 42, 0.25);
            text-transform: uppercase; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-signal:disabled { opacity: 0.7; transform: scale(0.98); }
        .btn-back { margin-top: 20px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #888; padding: 8px 25px; border-radius: 20px; font-size: 10px; font-family: 'Orbitron'; }
        .loader-text { font-family: 'Orbitron'; font-size: 12px; color: var(--accent-cyan); margin-top: 15px; height: 20px; }

        /* --- AVIATOR --- */
        .aviator-logo-img { width: 140px; height: auto; display: block; margin: 0 auto 15px auto; filter: drop-shadow(0 0 10px rgba(255, 51, 75, 0.5)); animation: floatLogo 4s infinite ease-in-out; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .aviator-wrapper { display: none; position: relative; width: 300px; height: 200px; margin-bottom: 20px; background: radial-gradient(circle at center, rgba(40,10,20,0.6) 0%, rgba(5,5,10,0.2) 80%); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; box-shadow: 0 0 30px rgba(255, 51, 75, 0.05); }
        .aviator-graph-svg { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0; transition: opacity 0.5s; }
        .aviator-graph-svg.active { opacity: 1; }
        .aviator-plane-img { position: absolute; bottom: 10px; left: 10px; width: 50px; height: auto; z-index: 5; transition: opacity 0.3s; opacity: 0; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .aviator-plane-img.visible { opacity: 1; animation: hoverPlane 3s infinite ease-in-out; }
        .aviator-plane-img.taking-off { opacity: 1; animation: takeoff 2s forwards cubic-bezier(0.2, 0.6, 0.2, 1) !important; }
        .coef-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron'; font-size: 52px; font-weight: 900; color: #fff; z-index: 10; text-shadow: 0 0 20px rgba(0,0,0,1); opacity: 0; transition: opacity 0.3s; }
        .coef-text.visible { opacity: 1; }
        @keyframes hoverPlane { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes takeoff { 0% { bottom: 10px; left: 10px; transform: scale(1) rotate(0deg); } 100% { bottom: 150px; left: 240px; transform: scale(1.3) rotate(-15deg); } }
        
    </style>
</head>
<body>
    <div id="preloader"><div class="terminal-text" id="term-text"></div></div>
    <div class="cyber-wrapper"></div>
    <div class="hud-bar"><div><span class="status-dot"></span>ONLINE</div><div id="session-id">SID: ...</div></div>
    
    <div id="sound-toggle" onclick="toggleSound()">
        <img id="sound-icon" src="/img/icon_sound_on.svg">
    </div>

    <!-- MAIN MENU SCREEN -->
    <div id="screen-menu" class="screen">
        <div class="main-menu-content">
            <div class="main-logo">
                <div class="logo-title">AI PREDICTOR</div>
                <div style="font-size:9px; color:#00f2ea; letter-spacing:2px; font-weight:bold; margin-top:5px;">NEURAL V7.9.2</div>
            </div>
            <div class="menu-grid">
                <div class="game-card" onclick="openGame('aviator')"><img src="/img/menu_aviator.png" class="game-img"><div class="game-title">AVIATOR</div></div>
                <div class="game-card" onclick="openGame('penalty')"><img src="/img/menu_penalty.png" class="game-img"><div class="game-title">PENALTY</div></div>
                <div class="game-card" onclick="openGame('mines')"><img src="/img/menu_mines.png" class="game-img"><div class="game-title">MINES</div></div>
                <div class="game-card" onclick="openGame('chicken')"><img src="/img/menu_chicken.png" class="game-img"><div class="game-title">CHICKEN</div></div>
                <div class="game-card game-card-soon"><div class="soon-text">SOON</div></div>
                <div class="game-card game-card-soon"><div class="soon-text">SOON</div></div>
            </div>
        </div>
        <div id="live-feed">
            <div class="feed-title">🏆 LIVE WINS</div>
            <ul class="feed-list" id="feed-list-main"></ul>
        </div>
    </div>

    <!-- ID MODAL -->
    <div id="id-modal" class="modal-overlay">
        <div class="id-box">
            <h3 style="color:#00f2ea; font-family:'Orbitron'; margin-bottom:5px;">AUTHORIZATION</h3>
            <p style="font-size:11px; color:#aaa; margin-bottom:20px;">Secure connection to 1xBet Server</p>
            <input type="tel" id="user-id-input" class="id-input" placeholder="Account ID (10 digits)" maxlength="10">
            <button id="btn-connect" class="id-btn" onclick="validateAndConnect()">CONNECT ACCOUNT</button>
            <div id="id-error" style="color:#ff334b; font-size:10px; margin-top:10px; min-height:15px; font-weight:bold;"></div>
            <div id="sync-log" class="sync-log"></div>
        </div>
    </div>
    
    <!-- GAME SCREEN -->
    <div id="screen-game" class="screen">
        <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>

        <div id="aviator-logo-view" style="display:none;">
            <img src="/img/aviator_logo.png" class="aviator-logo-img">
        </div>

        <div id="aviator-view" class="aviator-wrapper">
            <svg class="aviator-graph-svg" id="aviator-graph" viewBox="0 0 300 200" preserveAspectRatio="none">
                <path d="M0,200 Q150,120 300,20 L300,200 Z" fill="rgba(255, 51, 75, 0.2)" />
                <path d="M0,200 Q150,120 300,20" fill="none" stroke="#ff334b" stroke-width="4" />
            </svg>
            <img src="/img/plane.png" id="aviator-plane" class="aviator-plane-img">
            <div class="coef-text" id="coef-text">0.00x</div>
        </div>

        <div class="risk-block" id="risk-block">
            <div class="risk-item">ACC: <span class="risk-val" id="acc-val">0%</span></div>
            <div class="risk-item">RISK: <span class="risk-val" id="risk-val">LOW</span></div>
        </div>

        <div id="loader-text" class="loader-text"></div>
        <button id="signal-btn" class="btn-signal" onclick="getSignal()">GET SIGNAL</button>
        <button class="btn-back" onclick="backMenu()">EXIT</button>
    </div>

    <script>
        // --- GLOBAL STATE & CONFIG ---
        let isMuted = false;
        const winSound = new Audio('/audio/win-blip.mp3');
        winSound.volume = 0.5;

        let activeGame = null;
        let minesSize = 3;

        // --- CORE FUNCTIONS (BOOT, SOUND, NAVIGATION) ---
        window.onload = function() {
            const term = document.getElementById('term-text');
            const termLines = ["INITIALIZING...", "CHECKING RESOURCES...", "ESTABLISHING SECURE TUNNEL...", "READY."];
            let lineIdx = 0;
            function typeLine() {
                if(lineIdx < termLines.length) {
                    term.innerText = termLines[lineIdx++];
                    setTimeout(typeLine, 400);
                } else {
                    setTimeout(() => { 
                        document.getElementById('preloader').style.display='none'; 
                        document.getElementById('id-modal').style.display='flex';
                    }, 500);
                }
            }
            typeLine();

            const sid = "SID-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            document.getElementById('session-id').innerText = sid;
            
            if (localStorage.getItem('isMuted') === 'true') {
                isMuted = true;
                document.getElementById('sound-icon').src = '/img/icon_sound_off.svg';
            }
            
            runLiveFeed();
        };
        
        function validateAndConnect() {
            const val = document.getElementById('user-id-input').value;
            const err = document.getElementById('id-error');
            const btn = document.getElementById('btn-connect');
            const log = document.getElementById('sync-log');

            if (val.length !== 10 || isNaN(val)) { err.innerText = "ERROR: ID MUST BE 10 DIGITS"; return; }
            if (parseInt(val.substring(0, 3)) < 155) { err.innerText = "ERROR: ID NOT FOUND IN DATABASE"; return; }

            err.innerText = ""; btn.disabled = true; btn.style.background = "#333"; btn.innerText = "CONNECTING..."; log.style.display = "block";
            setTimeout(() => { log.innerText = "> Handshake established..."; }, 500);
            setTimeout(() => { log.innerText = "> Verifying hash tokens..."; }, 1500);
            setTimeout(() => { log.innerText = "> Downloading betting history..."; }, 2500);
            setTimeout(() => { log.innerText = "> SYNCHRONIZATION COMPLETE"; btn.innerText = "SUCCESS"; btn.style.background = "#00f2ea"; btn.style.color = "#000"; }, 3500);
            setTimeout(() => { document.getElementById('id-modal').style.display = 'none'; document.getElementById('screen-menu').classList.add('active'); }, 4200);
        }

        function toggleSound() {
            isMuted = !isMuted;
            localStorage.setItem('isMuted', isMuted);
            document.getElementById('sound-icon').src = isMuted ? '/img/icon_sound_off.svg' : '/img/icon_sound_on.svg';
        }

        function playSound(sound) {
            if (!isMuted) {
                sound.currentTime = 0;
                sound.play().catch(e => console.error("Sound play failed:", e));
            }
        }
        
        function backMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }

        function openGame(g) {
            activeGame = g;
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            
            ['aviator-logo-view', 'aviator-view'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = 'none';
            });
            
            if (g === 'aviator') {
                document.getElementById('aviator-logo-view').style.display = 'block';
                document.getElementById('aviator-view').style.display = 'block';
                const plane = document.getElementById('aviator-plane');
                plane.classList.remove('visible', 'taking-off');
                document.getElementById('coef-text').innerText="0.00x";
                document.getElementById('coef-text').classList.remove('visible');
                document.getElementById('aviator-graph').classList.remove('active');
            }
        }

        // --- LIVE FEED LOGIC ---
        function generateFakeWin() {
            const games = [ { name: 'AVIATOR', weight: 4 }, { name: 'PENALTY', weight: 2 }, { name: 'MINES', weight: 2 }, { name: 'CHICKEN', weight: 2 }];
            const weightedGames = games.flatMap(game => Array(game.weight).fill(game.name));
            const gameName = weightedGames[Math.floor(Math.random() * weightedGames.length)];

            let coef, bet;

            if (gameName === 'AVIATOR') {
                coef = parseFloat((Math.random() * (15 - 1.2) + 1.2).toFixed(2));
                bet = Math.floor(Math.random() * (2000 - 50) + 50);
            } else if (gameName === 'PENALTY') {
                coef = 5.88;
                bet = Math.floor(Math.random() * (3000 - 100) + 100);
            } else {
                coef = parseFloat((Math.random() * (8 - 2) + 2).toFixed(2));
                bet = Math.floor(Math.random() * (1000 - 100) + 100);
            }

            const winAmount = (coef * bet).toLocaleString('ru-RU', { style: 'currency', currency: 'RUB', minimumFractionDigits: 0, maximumFractionDigits: 0 });
            
            return { game: gameName, coef: coef.toFixed(2) + 'x', win: winAmount };
        }

        function updateLiveFeed() {
            const list = document.getElementById('feed-list-main');
            if (!list || !document.getElementById('screen-menu').classList.contains('active')) return;

            const winData = generateFakeWin();
            
            const item = document.createElement('li');
            item.className = 'feed-item new-win';
            item.innerHTML = `<span>${winData.game}</span> <span>${winData.coef}</span> <span>${winData.win}</span>`;

            list.prepend(item);
            if (list.children.length > 5) {
                list.lastChild.remove();
            }

            playSound(winSound);
            setTimeout(() => item.classList.remove('new-win'), 2500);
        }

        function runLiveFeed() {
            const randomInterval = Math.random() * (20000 - 10000) + 10000;
            setTimeout(() => {
                if (document.getElementById('screen-menu').classList.contains('active')) {
                    updateLiveFeed();
                }
                runLiveFeed();
            }, randomInterval);
        }
        
        // --- SIGNAL GENERATION LOGIC ---
        function getSignal() {
            const btn = document.getElementById('signal-btn');
            const loader = document.getElementById('loader-text');
            btn.disabled = true; loader.innerText = "ANALYZING...";
            document.getElementById('risk-block').style.opacity = '0';
            
            if(activeGame === 'aviator') {
                 const plane = document.getElementById('aviator-plane');
                 plane.classList.remove('taking-off', 'visible');
                 void plane.offsetWidth; 
                 runAviatorAnimation(loader, btn);
            }
        }
        
        function finishSignal(loader, btn) {
            loader.innerText = "";
            const acc = (Math.random()*(99-92)+92).toFixed(1);
            document.getElementById('acc-val').innerText = acc + "%";
            document.getElementById('risk-block').style.opacity = '1';
            let cd = 5;
            const t = setInterval(() => {
                btn.innerText = `WAIT ${cd}s`; cd--;
                if(cd < 0) { clearInterval(t); btn.innerText = "GET SIGNAL"; btn.disabled = false; }
            }, 1000);
        }

        function runAviatorAnimation(loader, btn) {
            document.getElementById('aviator-plane').classList.add('visible', 'taking-off');
            document.getElementById('aviator-graph').classList.add('active');
            
            const textEl = document.getElementById('coef-text');
            textEl.classList.add('visible');
            
            const finalVal = parseFloat((Math.random()*(5.0-1.2)+1.2).toFixed(2));
            let currentVal = 1.00;
            
            const int = setInterval(() => {
                currentVal += 0.05;
                if (currentVal >= finalVal) {
                    clearInterval(int);
                    textEl.innerText = finalVal.toFixed(2) + "x";
                    loader.innerText = "";
                    finishSignal(loader, btn);
                } else {
                    textEl.innerText = currentVal.toFixed(2) + "x";
                }
            }, 50); 
        }

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
