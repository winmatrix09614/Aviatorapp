<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Signal Bot Ultimate v9.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050010;
            --accent-cyan: #00f2ea;
            --text-color: #ffffff;
            --brand-green: #00ff41;
            --brand-red: #ff334b;
            --brand-orange: #ff9d00;
            --glass-panel: rgba(20, 20, 30, 0.6);
            --mines-bg: #272749;
            --mines-tile: #2b2e55;
            --mines-active: #094e67;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0; overflow: hidden; user-select: none; height: 100vh;
        }

        /* ARABIC FONT SUPPORT */
        body.lang-ar { font-family: 'Cairo', sans-serif; direction: rtl; }
        body.lang-ar .hud-bar { direction: ltr; } /* Keep HUD LTR for aesthetics */

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .terminal-text {
            color: var(--accent-cyan); font-family: 'Orbitron', monospace; 
            font-size: 12px; line-height: 1.6; text-align: left; width: 80%;
        }

        /* --- BACKGROUND --- */
        .cyber-wrapper {
            position: absolute; width: 100%; height: 100%; overflow: hidden;
            background: linear-gradient(to bottom, #020005 0%, #10002b 100%);
            z-index: -2;
        }

        /* --- HUD --- */
        .hud-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; padding: 0 20px; box-sizing: border-box;
            display: flex; align-items: center; justify-content: space-between;
            font-family: 'Orbitron', sans-serif; font-size: 10px; color: rgba(255, 255, 255, 0.5); z-index: 50; pointer-events: none;
        }
        .status-dot { width: 6px; height: 6px; background: var(--brand-green); border-radius: 50%; box-shadow: 0 0 5px var(--brand-green); display: inline-block; margin-right: 5px; }
        .online-count { color: var(--accent-cyan); font-weight: bold; margin-left: 5px; }

        /* --- ID MODAL --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column;
            backdrop-filter: blur(10px);
        }
        .id-box {
            background: #111; border: 1px solid var(--accent-cyan); padding: 30px 20px; border-radius: 16px; width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 234, 0.15);
        }
        .id-input {
            width: 100%; padding: 14px; margin: 20px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; box-sizing: border-box;
            font-family: 'Orbitron'; text-align: center; font-size: 18px; border-radius: 10px; outline: none; transition: 0.3s;
        }
        .id-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0,242,234,0.2); }
        .id-btn {
            background: linear-gradient(90deg, #00f2ea 0%, #0080ff 100%); color: #000; border: none; width: 100%; padding: 14px; 
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 10px; font-size: 14px; text-transform: uppercase;
        }
        .sync-log {
            font-family: 'Orbitron'; font-size: 10px; color: #00ff41; margin-top: 15px; min-height: 15px; text-align: left; width: 100%; display: none;
        }

        /* --- LANG --- */
        .lang-container { position: absolute; top: 50px; right: 20px; z-index: 60; }
        .lang-container.ar-pos { right: auto; left: 20px; } /* Flip for AR */
        select {
            background: rgba(0, 0, 0, 0.6); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 10px; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 12px; outline: none;
        }
        option { background: #000; }

        /* --- SCREENS --- */
        .screen { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; width: 100%; position: relative; z-index: 10; 
            padding-bottom: 60px; box-sizing: border-box;
        }
        .screen.active { display: flex; }

        /* --- MENU --- */
        .main-logo { text-align: center; margin-bottom: 20px; }
        .logo-title {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 26px; color: #fff;
            text-shadow: 0 0 20px rgba(58, 134, 255, 0.6); letter-spacing: 1px;
        }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 380px; }
        .game-card {
            background: var(--glass-panel); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px;
            text-align: center; cursor: pointer; transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .game-card:hover, .game-card:active {
            transform: translateY(-5px); border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.3);
        }
        .game-img { width: 60px; height: 60px; margin-bottom: 8px; border-radius: 12px; object-fit: cover; }
        .game-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 12px; color: #fff; }

        /* --- GAME UI COMMON --- */
        .game-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; width: 100%; }
        .telegram-link {
            text-decoration: none; font-family: 'Orbitron', sans-serif; color: var(--accent-cyan);
            border: 1px solid rgba(0, 242, 234, 0.3); padding: 8px 16px; border-radius: 20px;
            font-size: 12px; letter-spacing: 1px; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px); margin-bottom: 10px; display: inline-block;
        }
        .game-logo-hero {
            width: 100px; height: auto; display: block; 
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
            animation: floatLogo 4s infinite ease-in-out; margin-bottom: 10px;
        }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .btn-signal {
            background: linear-gradient(90deg, #d6002a 0%, #8a001a 100%);
            border: none; width: 85%; max-width: 320px; padding: 18px; border-radius: 14px;
            color: white; font-family: 'Orbitron', sans-serif; font-size: 16px; letter-spacing: 1px;
            cursor: pointer; box-shadow: 0 5px 20px rgba(214, 0, 42, 0.25);
            text-transform: uppercase; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .btn-signal:active { transform: scale(0.98); }
        .btn-signal:disabled { opacity: 0.8; cursor: not-allowed; background: #333; color: #888; box-shadow: none; }
        
        .btn-back { margin-top: 15px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #888; padding: 8px 25px; border-radius: 20px; font-size: 10px; font-family: 'Orbitron'; cursor: pointer; }

        /* --- AVIATOR SEAMLESS --- */
        .aviator-wrapper {
            position: relative; width: 100%; height: 220px; margin-bottom: 10px;
            overflow: hidden; /* Only hide vertical overflow if needed, but we want seamless horizontal */
        }
        .aviator-graph-svg {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0; transition: opacity 0.5s;
            mask-image: linear-gradient(to right, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
        }
        .aviator-graph-svg.active { opacity: 1; }
        .aviator-plane-img {
            position: absolute; width: 60px; height: auto; z-index: 5; opacity: 0;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            offset-path: path("M20,200 Q150,150 350,20"); /* Path goes off screen */
            offset-rotate: auto;
        }
        .aviator-plane-img.taking-off { opacity: 1; animation: flySeamless 2.5s forwards cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes flySeamless { 0% { offset-distance: 0%; transform: scale(0.8); } 100% { offset-distance: 100%; transform: scale(1.2); } }
        .coef-text { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Orbitron'; font-size: 52px; font-weight: 900; color: #fff; z-index: 10; 
            text-shadow: 0 0 20px rgba(0,0,0,1); opacity: 0; transition: opacity 0.3s;
        }
        .coef-text.visible { opacity: 1; }

        /* --- PENALTY PRO --- */
        .penalty-container {
            position: relative; width: 320px; height: 210px; margin-bottom: 10px;
            background-image: url('/img/penalty_bg.png'); background-size: cover; background-position: center;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .history-dots {
            display: flex; gap: 5px; justify-content: center; margin-bottom: 10px; width: 100%;
        }
        .h-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; box-shadow: 0 0 2px #000; }
        .h-dot.win { background: #00ff41; box-shadow: 0 0 5px #00ff41; }
        .h-dot.lose { background: #ff334b; }

        .target-zone { position: absolute; width: 45px; height: 45px; border-radius: 50%; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .z1 { top: 25px; left: 25px; } .z2 { top: 25px; right: 25px; } 
        .z3 { top: 25px; left: 50%; transform: translateX(-50%); } 
        .z4 { bottom: 25px; left: 25px; } .z5 { bottom: 25px; right: 25px; }
        
        .target-effect {
            width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            background: radial-gradient(circle, rgba(0,242,234,0.6) 0%, transparent 70%);
            box-shadow: 0 0 15px var(--accent-cyan);
            transform: scale(0); opacity: 0; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .target-zone.winner .target-effect { transform: scale(1.2); opacity: 1; }

        /* --- MINES 2.0 --- */
        .mines-wrapper { width: 90%; max-width: 340px; margin-bottom: 20px; }
        
        /* New Mode Switch */
        .mines-mode-switch {
            display: flex; background: #222; border-radius: 20px; padding: 4px; margin-bottom: 15px; border: 1px solid #444; position: relative;
        }
        .mode-opt { flex: 1; text-align: center; padding: 8px; font-family: 'Orbitron'; font-size: 11px; z-index: 2; cursor: pointer; color: #888; transition: 0.3s; }
        .mode-opt.active { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .mode-bg { 
            position: absolute; top: 4px; left: 4px; width: 50%; height: calc(100% - 8px); 
            background: var(--brand-green); border-radius: 16px; transition: 0.3s; z-index: 1; opacity: 0.8;
        }
        .mines-mode-switch[data-mode="risk"] .mode-bg { left: 50%; background: var(--brand-red); width: calc(50% - 4px); }

        /* Grid Select */
        .mines-grid-select { display: flex; gap: 10px; margin-bottom: 15px; }
        .mines-btn-grid { 
            flex: 1; background: #333; border: 1px solid #555; color: #fff; padding: 12px 0; border-radius: 8px; 
            font-family: 'Orbitron'; font-size: 12px; cursor: pointer; text-align: center; transition: 0.2s; 
        }
        .mines-btn-grid.active { background: var(--accent-cyan); color: #000; border-color: var(--accent-cyan); font-weight: 900; box-shadow: 0 0 10px rgba(0,242,234,0.2); }

        /* Custom Stepper */
        .mines-stepper { display: flex; align-items: center; justify-content: space-between; background: #222; border-radius: 12px; border: 1px solid #444; padding: 5px; margin-bottom: 15px; }
        .step-btn {
            width: 45px; height: 45px; background: #333; border: none; border-radius: 8px; color: #fff; font-size: 20px; cursor: pointer; transition: 0.2s;
        }
        .step-btn:active { background: var(--accent-cyan); color: #000; }
        .mines-count-display { font-family: 'Orbitron'; font-size: 20px; font-weight: bold; color: #fff; }
        .mines-label-sm { font-size: 10px; color: #888; font-family: 'Poppins'; }

        .mines-board { background: var(--mines-bg); padding: 10px; border-radius: 10px; display: grid; gap: 6px; border: 2px solid #3d3d5c; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); transition: all 0.3s; }
        .mine-tile { background-color: var(--mines-tile); border-radius: 6px; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .mine-tile img { width: 70%; height: 70%; object-fit: contain; display: none; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .mine-tile.reveal { background-color: var(--mines-active); }
        .mine-tile.reveal img { display: block; }
        /* Risk Mode Color */
        .mines-wrapper.risk-mode .mine-tile.reveal { background-color: #4a1a25; } 
        
        /* --- CHICKEN (FIXED) --- */
        .chicken-wrapper { width: 90%; max-width: 340px; margin-bottom: 20px; flex-direction: column; align-items: center; }
        .chicken-road-grid { 
            width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; 
            background: #2b2b2b; border-radius: 12px; border: 2px dashed #444; box-shadow: inset 0 0 20px #000; box-sizing: border-box;
        }
        .chicken-step { 
            width: 100%; aspect-ratio: 1; background: #1a1a1a; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            border: 2px solid #333; position: relative; transition: 0.3s; box-shadow: 0 4px 5px rgba(0,0,0,0.5); 
            font-family: 'Orbitron'; font-size: 10px; color: #444; 
        }
        .chicken-step.safe { 
            border-color: #00ff41; background: radial-gradient(circle, #004d13 0%, #002209 100%); 
            box-shadow: 0 0 10px #00ff41; transform: scale(1.05); color: transparent; 
        }

        /* --- LIVE WINS --- */
        .live-wins-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.9); border-top: 1px solid #333;
            display: flex; align-items: center; overflow: hidden; white-space: nowrap; padding-left: 10px; z-index: 100;
        }
        .win-item {
            display: inline-flex; align-items: center; font-family: 'Orbitron'; font-size: 10px; color: #aaa; margin-right: 20px; opacity: 0.8;
            animation: slideLeft 10s linear infinite;
        }
        @keyframes slideLeft { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .win-name { color: #fff; font-weight: bold; margin-right: 5px; }
        .win-amt { color: var(--brand-green); margin-left: 5px; }

        @media (min-width: 768px) { .penalty-container { transform: scale(1.2); margin-bottom: 40px; } }
    </style>
</head>
<body class="lang-en">

    <div id="preloader"><div class="terminal-text" id="term-text"></div></div>
    <div class="cyber-wrapper"></div>
    <div class="hud-bar">
        <div><span class="status-dot"></span>ONLINE <span id="online-users" class="online-count">1420</span></div>
        <div id="session-id">SID: ...</div>

    <div class="lang-container" id="lang-cont">

        </select>
    </div>

    <div id="screen-menu" class="screen">
        <div class="main-logo">
            <div class="logo-title">AI PREDICTOR</div>
            <div style="font-size:9px; color:#00f2ea; letter-spacing:2px; font-weight:bold; margin-top:5px;">NEURAL v9.0</div>
        </div>
        <div class="menu-grid">
            <div class="game-card" onclick="openGame('aviator')"><img src="/img/menu_aviator.png" class="game-img"><div class="game-title" data-tr="aviator">AVIATOR</div></div>
            <div class="game-card" onclick="openGame('penalty')"><img src="/img/menu_penalty.png" class="game-img"><div class="game-title" data-tr="penalty">PENALTY</div></div>
            <div class="game-card" onclick="openGame('mines')"><img src="/img/menu_mines.png" class="game-img"><div class="game-title">MINES</div></div>

    <div id="id-modal" class="modal-overlay">
        <div class="id-box">

            <input type="tel" id="user-id-input" class="id-input" placeholder="Account ID" maxlength="12">
            <button id="btn-connect" class="id-btn" onclick="validateAndConnect()">CONNECT ACCOUNT</button>
            <div id="id-error" style="color:#ff334b; font-size:10px; margin-top:10px; min-height:15px; font-weight:bold;"></div>
            <div id="sync-log" class="sync-log"></div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        
        <div id="aviator-view" style="display:none; width:100%; display:flex; flex-direction:column; align-items:center;">
            <div class="game-header">
                <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>
                <img src="/img/aviator_logo.png" class="game-logo-hero">
            </div>
            <div class="aviator-wrapper">
                <svg class="aviator-graph-svg" id="aviator-graph" viewBox="0 0 350 200" preserveAspectRatio="none">

                    <path d="M0,200 Q150,150 350,20" fill="none" stroke="#ff334b" stroke-width="4" />
                </svg>

                <div class="coef-text" id="coef-text">0.00x</div>
            </div>
        </div>

        <div id="penalty-view" style="display:none; width:100%; display:flex; flex-direction:column; align-items:center;">
            <div class="game-header">
                <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>

    <script>
        // --- LOCALIZATION DATA ---
        const trans = {
            en: { get_signal: "GET SIGNAL", exit: "EXIT", aviator: "AVIATOR", penalty: "PENALTY" },
            es: { get_signal: "OBTENER SEÑAL", exit: "SALIR", aviator: "AVIATOR", penalty: "PENALTI" },
            ar: { get_signal: "احصل على إشارة", exit: "خروج", aviator: "طيار", penalty: "ضربة جزاء" }
        };
        const namesData = {
            en: ["John", "Mike", "Alex", "David", "Chris", "Sarah", "James"],
            es: ["Carlos", "Juan", "Pedro", "Luis", "Miguel", "Maria", "Jose"],
            ar: ["Ahmed", "Ali", "Mohamed", "Omar", "Youssef", "Ibrahim", "Hassan"]
        };
        const currData = { en: "$", es: "€", ar: "EGP" };
        let curLang = 'en';

        // --- BOOT ---
        const termLines = ["INITIALIZING...", "CHECKING RESOURCES...", "ESTABLISHING SECURE TUNNEL...", "READY."];
        let lineIdx = 0;
        
        window.onload = function() {
            const savedId = localStorage.getItem('user_id');
            if(savedId) document.getElementById('user-id-input').value = savedId;
            
            // Random User Count loop
            setInterval(() => {
                let c = parseInt(document.getElementById('online-users').innerText);
                c += Math.floor(Math.random() * 5) - 2;
                document.getElementById('online-users').innerText = c;
            }, 3000);

            // Live Wins Loop
            updateLiveWins();
            setInterval(updateLiveWins, 4000);

            const term = document.getElementById('term-text');
            function typeLine() {
                if(lineIdx < termLines.length) {
                    term.innerText = termLines[lineIdx++];
                    setTimeout(typeLine, 300);
                } else {
                    setTimeout(() => { 
                        document.getElementById('preloader').style.display='none'; 
                        document.getElementById('id-modal').style.display='flex';
                    }, 500);
                }
            }
            typeLine();
        };

        const sid = "SID-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('session-id').innerText = sid;

        // --- AUTH ---
        function validateAndConnect() {
            const val = document.getElementById('user-id-input').value;
            const err = document.getElementById('id-error');
            const btn = document.getElementById('btn-connect');
            const log = document.getElementById('sync-log');

            if (val.length < 5) { err.innerText = "ERROR: INVALID ID"; return; }
            localStorage.setItem('user_id', val);

            err.innerText = ""; btn.disabled = true; btn.style.background = "#333"; btn.innerText = "CONNECTING..."; log.style.display = "block";
            
            setTimeout(() => { log.innerText = "> Handshake established..."; }, 600);
            setTimeout(() => { log.innerText = "> Verifying hash tokens..."; }, 1200);
            setTimeout(() => { log.innerText = "> Downloading betting history..."; }, 2000);
            setTimeout(() => { 
                log.innerText = "> SYNCHRONIZATION COMPLETE"; 
                btn.innerText = "SUCCESS"; btn.style.background = "#00f2ea"; btn.style.color = "#000"; 
            }, 2800);
            setTimeout(() => { 
                document.getElementById('id-modal').style.display = 'none'; 
                document.getElementById('screen-menu').classList.add('active'); 
            }, 3500);
        }

        // --- TRANS ---
        function changeLang(l) {
            curLang = l;
            document.body.className = "lang-" + l;
            
            const cont = document.getElementById('lang-cont');
            if(l === 'ar') cont.classList.add('ar-pos'); else cont.classList.remove('ar-pos');

            document.querySelectorAll('[data-tr]').forEach(el => {
                const k = el.getAttribute('data-tr');
                if(trans[l][k]) el.innerText = trans[l][k];
            });
        }

        // --- LIVE WINS LOGIC ---
        function updateLiveWins() {
            const ticker = document.getElementById('win-ticker');
            const nList = namesData[curLang];
            const name = nList[Math.floor(Math.random() * nList.length)];
            const amt = Math.floor(Math.random() * 5000) + 500;
            const games = ["Aviator", "Mines", "Penalty"];
            const game = games[Math.floor(Math.random()*games.length)];
            
            // Build String
            let txt = `<span class="win-name">${name}</span> just won <span class="win-amt">${amt}${currData[curLang]}</span> in ${game}`;
            if(curLang === 'ar') txt = `<span class="win-name">${name}</span> فاز بـ <span class="win-amt">${amt}${currData[curLang]}</span> في ${game}`;
            
            ticker.innerHTML = txt;
            
            // Reset Animation trigger
            ticker.style.animation = 'none';
            ticker.offsetHeight; /* trigger reflow */
            ticker.style.animation = 'slideLeft 10s linear infinite';
        }

        // --- GAME LOGIC ---
        let activeGame = null;
        let minesSize = 3;
        let minesCount = 3;
        let minesMode = 'safe';

        function openGame(g) {
            activeGame = g;
            document.getElementById('screen-menu').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            ['aviator', 'penalty', 'mines', 'chicken'].forEach(id => document.getElementById(id+'-view').style.display = 'none');
            
            document.getElementById('signal-btn').disabled = false;
            document.getElementById('signal-btn').innerText = trans[curLang].get_signal;
            document.getElementById(g+'-view').style.display = 'flex';

            // Reset
            if(g === 'aviator') { 
                document.getElementById('coef-text').classList.remove('visible');
                document.getElementById('aviator-plane').classList.remove('taking-off');
            }
            if(g === 'penalty') {
                document.querySelectorAll('.target-zone').forEach(el=>el.classList.remove('winner'));
                // Fill random history
                const h = document.getElementById('pen-history'); h.innerHTML = "";
                for(let i=0;i<5;i++) {
                    const d = document.createElement('div'); d.className = Math.random()>0.3?'h-dot win':'h-dot lose';
                    h.appendChild(d);
                }
            }
            if(g === 'mines') setMinesGrid(3);
            if(g === 'chicken') updateChickenGrid();
        }

        function backMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }

        // --- MINES FUNCTIONS ---
        function setMinesGrid(s) {
            minesSize = s;
            const b = document.getElementById('mines-board');
            b.style.gridTemplateColumns = `repeat(${s}, 1fr)`; b.innerHTML = "";
            document.getElementById('btn-3').classList.remove('active');
            document.getElementById('btn-5').classList.remove('active');
            document.getElementById(`btn-${s}`).classList.add('active');
            
            for(let i=0; i<s*s; i++) {
                const d = document.createElement('div'); d.className='mine-tile'; d.id='mt-'+i; 
                d.innerHTML='<img src="/img/mines_star.png">'; 
                b.appendChild(d);
            }
            minesCount = 3; document.getElementById('mines-val').innerText = minesCount;
        }
        function stepMines(d) {
            const max = (minesSize * minesSize) - 1;
            minesCount += d;
            if(minesCount < 1) minesCount = 1;
            if(minesCount > max) minesCount = max;
            document.getElementById('mines-val').innerText = minesCount;
        }
        function setMinesMode(m) {
            minesMode = m;
            const el = document.getElementById('mines-mode');
            const wrap = document.getElementById('mines-wrap');
            el.setAttribute('data-mode', m);
            document.querySelectorAll('.mode-opt').forEach(o => o.classList.remove('active'));
            if(m==='safe') { el.children[1].classList.add('active'); wrap.classList.remove('risk-mode'); }
            else { el.children[2].classList.add('active'); wrap.classList.add('risk-mode'); }
        }

        // --- SIGNAL LOGIC (SMART ANALYSIS) ---
        function getSignal() {
            const btn = document.getElementById('signal-btn');
            btn.disabled = true;

            // WARMING SEQUENCE
            let steps = ["CONNECTING...", "ANALYZING ID...", "PREDICTING..."];
            if(curLang === 'ar') steps = ["جار الاتصال...", "تحليل...", "تنبؤ..."];
            
            let stepI = 0;
            btn.innerText = steps[0];
            
            const stepInt = setInterval(() => {
                stepI++;
                if(stepI < steps.length) {
                    btn.innerText = steps[stepI];
                } else {
                    clearInterval(stepInt);
                    showResult(btn);
                }
            }, 600);
        }

        function showResult(btn) {
            if(activeGame === 'aviator') {
                 const plane = document.getElementById('aviator-plane');
                 plane.classList.remove('taking-off'); void plane.offsetWidth;
                 plane.classList.add('taking-off');
                 document.getElementById('aviator-graph').classList.add('active');
                 const textEl = document.getElementById('coef-text');
                 textEl.classList.add('visible');
                 
                 let val = 1.00;
                 const int = setInterval(() => { val += 0.05; textEl.innerText = val.toFixed(2) + "x"; }, 50);
                 setTimeout(() => { clearInterval(int); textEl.innerText = (Math.random()*(5.0-1.2)+1.2).toFixed(2) + "x"; cooldown(btn); }, 2500);
            }
            else if(activeGame === 'penalty') {
                document.querySelectorAll('.target-zone').forEach(el=>el.classList.remove('winner'));
                setTimeout(() => {
                    const r = Math.floor(Math.random()*5)+1;
                    document.getElementById('pz'+r).classList.add('winner');
                    cooldown(btn);
                }, 500);
            }
            else if(activeGame === 'mines') {
                document.querySelectorAll('.mine-tile').forEach(el=>el.classList.remove('reveal'));
                const total = minesSize * minesSize;
                let toReveal = 0;
                
                if(minesMode === 'safe') toReveal = Math.floor(Math.random()*2)+3; // 3-4
                else toReveal = total - minesCount; // All safe cells

                let set = new Set();
                while(set.size < toReveal) { set.add(Math.floor(Math.random() * total)); }
                let arr = Array.from(set); let i=0;
                
                let int = setInterval(() => { 
                    if(i>=arr.length) { clearInterval(int); cooldown(btn); } 
                    else { document.getElementById('mt-'+arr[i]).classList.add('reveal'); i++; } 
                }, 100); // Faster reveal
            }
            else if(activeGame === 'chicken') {
                document.querySelectorAll('.chicken-step').forEach(el => { el.classList.remove('safe'); el.style.transform = "scale(1)"; });
                let limit = document.getElementById('chicken-diff').value === 'easy' ? 10 : 6;
                let path = Math.floor(Math.random() * (limit - 2) + 2);
                let i=1; 
                let int = setInterval(() => { 
                    if(i > path) { clearInterval(int); cooldown(btn); }
                    else { document.getElementById('ch'+i).classList.add('safe'); i++; } 
                }, 200);
            }
        }

        function cooldown(btn) {
            let cd = 4;
            const t = setInterval(() => {
                btn.innerText = `WAIT ${cd}s`; cd--;
                if(cd < 0) { clearInterval(t); btn.innerText = trans[curLang].get_signal; btn.disabled = false; }
            }, 1000);
        }

        function updateChickenGrid() {
            const val = document.getElementById('chicken-diff').value;
            const grid = document.getElementById('chicken-grid');
            grid.innerHTML = "";
            let count = 15; if(val === 'easy') count = 25; if(val === 'hard') count = 10;
            for(let i=1; i<=count; i++) {
                const step = document.createElement('div'); step.className = 'chicken-step'; step.id = 'ch' + i; step.innerText = i; grid.appendChild(step);
            }
        }

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
