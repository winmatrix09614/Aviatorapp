<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Signal Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем Orbitron для цифр и Cairo для Арабского языка -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;500&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111;
            --neon-blue: #00f3ff;
            --neon-red: #ff003c;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
        }

        /* ФОН С ЧАСТИЦАМИ */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 10;
        }
        .screen.active { display: flex; }

        /* --- ЯЗЫКОВОЙ СЕЛЕКТОР --- */
        .lang-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
        }

        select {
            background: rgba(0, 0, 0, 0.6);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            outline: none;
            backdrop-filter: blur(5px);
            cursor: pointer;
            text-transform: uppercase;
        }
        
        option {
            background: #000;
            color: white;
        }

        /* --- МЕНЮ --- */
        .menu-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .game-card:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.1); }
        .game-icon { font-size: 32px; margin-bottom: 10px; }
        .game-title { font-weight: 600; font-size: 14px; letter-spacing: 1px; }

        /* --- AVIATOR INTERFACE --- */
        
        /* Ссылка на Telegram */
        .telegram-link {
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 16px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            margin-bottom: 40px;
            text-shadow: 0 0 5px var(--neon-blue);
            background: rgba(0, 243, 255, 0.05);
            transition: 0.3s;
            display: inline-block;
        }
        .telegram-link:active {
            transform: scale(0.95);
            background: rgba(0, 243, 255, 0.15);
        }

        /* КРУГОВОЙ ИНДИКАТОР */
        .circle-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .progress-ring { transform: rotate(-90deg); }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s ease-in-out;
            transform-origin: 50% 50%;
            filter: drop-shadow(0 0 10px var(--neon-red));
        }

        .coef-text {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 0, 60, 0.6);
            z-index: 2;
        }

        /* КНОПКА СИГНАЛА */
        .btn-signal {
            background: linear-gradient(90deg, #1cb5e0 0%, #000851 100%);
            border: none;
            width: 80%;
            max-width: 300px;
            padding: 18px;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(28, 181, 224, 0.4);
            transition: 0.3s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }
        .btn-signal:active { transform: scale(0.98); }
        .btn-signal:disabled { filter: grayscale(1); cursor: not-allowed; }
        
        .btn-signal::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn-signal:hover::before { left: 100%; }

        /* ПРОГРЕСС БАР */
        .loader-bar-container {
            width: 80%;
            max-width: 300px;
            height: 6px;
            background: #222;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .loader-bar {
            height: 100%;
            width: 0%;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 0.1s linear;
        }
        .loader-text {
            font-size: 12px; color: #aaa; margin-top: 8px; font-family: 'Orbitron', sans-serif;
            display: none; letter-spacing: 1px;
        }

        .btn-back {
            margin-top: 30px;
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }
        .btn-back:hover { border-color: #666; color: #fff; }

        /* Адаптация под Арабский язык */
        body.rtl {
            font-family: 'Cairo', sans-serif !important;
            direction: rtl;
        }
        body.rtl .menu-header, 
        body.rtl .btn-signal, 
        body.rtl .loader-text, 
        body.rtl .btn-back,
        body.rtl select {
            font-family: 'Cairo', sans-serif !important;
            font-weight: 700;
        }
        body.rtl .coef-text {
            font-family: 'Orbitron', sans-serif !important; /* Цифры всегда Orbitron */
            direction: ltr; /* Цифры всегда слева направо */
        }

    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <!-- СЕЛЕКТОР ЯЗЫКА (ВСЕГДА ВИДЕН) -->
    <div class="lang-container">
        <select id="language-select" onchange="changeLanguage()">
            <option value="en">🇬🇧 EN</option>
            <option value="es">🇪🇸 ES</option>
            <option value="ms">🇲🇾 MS</option>
            <option value="ar">🇸🇦 AR</option>
        </select>
    </div>

    <!-- МЕНЮ -->
    <div id="screen-menu" class="screen active">
        <div class="menu-header" data-translate="choose_game">CHOOSE GAME</div>
        <div class="menu-grid">
            <div class="game-card" onclick="openGame('aviator')">
                <div class="game-icon">✈️</div>
                <div class="game-title">AVIATOR</div>
            </div>
            <div class="game-card" onclick="openGame('penalty')">
                <div class="game-icon">⚽</div>
                <div class="game-title">PENALTY</div>
            </div>
            <div class="game-card" style="opacity: 0.5;">
                <div class="game-icon">💣</div>
                <div class="game-title">MINES</div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="screen-game" class="screen">
        
        <!-- КЛИКАБЕЛЬНАЯ ССЫЛКА -->
        <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>

        <!-- Круговой индикатор -->
        <div class="circle-container">
            <svg class="progress-ring" width="260" height="260">
                <circle class="progress-ring__circle-bg" stroke="#1a1a1a" stroke-width="8" fill="transparent" r="110" cx="130" cy="130"/>
                <circle class="progress-ring__circle" stroke="#ff003c" stroke-width="8" fill="transparent" r="110" cx="130" cy="130"
                        style="stroke-dasharray: 691; stroke-dashoffset: 691; stroke-linecap: round;"/>
            </svg>
            <div class="coef-text" id="coef-text">0.00x</div>
        </div>

        <button class="btn-signal" id="signal-btn" onclick="getAviatorSignal()" data-translate="get_signal">GET SIGNAL</button>
        
        <div class="loader-bar-container" id="loader-bar-container">
            <div class="loader-bar" id="loader-bar"></div>
        </div>
        <div class="loader-text" id="loader-text">...</div>

        <button class="btn-back" onclick="backToMenu()" data-translate="exit">EXIT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // --- ЛОКАЛИЗАЦИЯ (ЯЗЫКИ) ---
        const translations = {
            en: {
                choose_game: "CHOOSE GAME",
                get_signal: "GET SIGNAL",
                exit: "EXIT",
                connecting: "Connecting to server...",
                analyzing: "Analyzing data...",
                predicting: "Predicting...",
                wait: "NEXT SIGNAL IN",
                seconds: "s"
            },
            es: {
                choose_game: "ELIGE JUEGO",
                get_signal: "OBTENER SEÑAL",
                exit: "SALIR",
                connecting: "Conectando al servidor...",
                analyzing: "Analizando datos...",
                predicting: "Prediciendo...",
                wait: "SIGUIENTE EN",
                seconds: "s"
            },
            ms: {
                choose_game: "PILIH PERMAINAN",
                get_signal: "DAPATKAN SIGNAL",
                exit: "KELUAR",
                connecting: "Menyambung ke pelayan...",
                analyzing: "Menganalisis data...",
                predicting: "Meramal...",
                wait: "SIGNAL SETERUSNYA",
                seconds: "s"
            },
            ar: {
                choose_game: "اختر اللعبة",
                get_signal: "احصل على إشارة",
                exit: "خروج",
                connecting: "الاتصال بالخادم...",
                analyzing: "تحليل البيانات...",
                predicting: "جار التنبؤ...",
                wait: "الإشارة التالية في",
                seconds: "ث"
            }
        };

        let currentLang = 'en';

        function changeLanguage() {
            const selector = document.getElementById('language-select');
            currentLang = selector.value;
            
            // RTL для Арабского
            if (currentLang === 'ar') document.body.classList.add('rtl');
            else document.body.classList.remove('rtl');

            // Обновляем все статические тексты
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (translations[currentLang][key]) {
                    el.innerText = translations[currentLang][key];
                }
            });
        }

        // --- ЛОГИКА ЧАСТИЦ (ФОН) ---
        const canvas = document.getElementById("particles-canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.directionX = (Math.random() * 0.4) - 0.2;
                this.directionY = (Math.random() * 0.4) - 0.2;
                this.size = Math.random() * 2;
                this.color = '#00f3ff';
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }
        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) particlesArray.push(new Particle());
        }
        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) particlesArray[i].update();
            connectParticles();
        }
        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(0, 243, 255,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });
        initParticles();
        animateParticles();


        // --- ИГРОВАЯ ЛОГИКА ---
        const circle = document.querySelector('.progress-ring__circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;

        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;

        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function openGame(game) {
            // Пока открываем только Авиатор и Пенальти, остальное заглушки
            if(game === 'aviator' || game === 'penalty') {
                document.getElementById('screen-menu').classList.remove('active');
                document.getElementById('screen-game').classList.add('active');
            }
        }

        function backToMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }

        function getAviatorSignal() {
            const btn = document.getElementById('signal-btn');
            const textElement = document.getElementById('coef-text');
            const loaderBar = document.getElementById('loader-bar');
            const loaderContainer = document.getElementById('loader-bar-container');
            const loaderText = document.getElementById('loader-text');
            const t = translations[currentLang]; // Берем текущий перевод

            if (btn.disabled) return;
            btn.disabled = true;

            loaderContainer.style.display = 'block';
            loaderText.style.display = 'block';
            loaderText.innerText = t.connecting; // Перевод
            loaderBar.style.width = '0%';
            
            textElement.innerText = "0.00x";
            setProgress(0);
            
            let progress = 0;
            let interval = setInterval(() => {
                progress += Math.random() * 10;
                if(progress > 100) progress = 100;
                loaderBar.style.width = progress + '%';
                
                if (progress > 30) loaderText.innerText = t.analyzing; // Перевод
                if (progress > 70) loaderText.innerText = t.predicting; // Перевод

                if (progress >= 100) {
                    clearInterval(interval);
                    showResult();
                }
            }, 150);

            function showResult() {
                loaderText.style.display = 'none';
                
                let result;
                if (Math.random() > 0.6) result = (Math.random() * (4.00 - 1.20) + 1.20).toFixed(2);
                else result = (Math.random() * (15.00 - 4.00) + 4.00).toFixed(2);

                animateValue(textElement, 1.00, parseFloat(result), 1000);
                setProgress(100); 

                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                
                // Таймер
                let cooldown = 5;
                const updateTimerBtn = () => {
                    btn.innerHTML = `${t.wait} ${cooldown}${t.seconds}`;
                }
                updateTimerBtn();
                
                let cooldownTimer = setInterval(() => {
                    cooldown--;
                    updateTimerBtn();
                    if (cooldown <= 0) {
                        clearInterval(cooldownTimer);
                        btn.innerHTML = t.get_signal; // Возвращаем текст на нужном языке
                        btn.disabled = false;
                        setProgress(0);
                        loaderContainer.style.display = 'none';
                    }
                }, 1000);
            }
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = (progress * (end - start) + start).toFixed(2) + "x";
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

    </script>
</body>
</html>
