<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1xBet Signal Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f121b;
            --card-bg: #1e222d;
            --primary: #007aff;
            --aviator-red: #e50b20;
            --penalty-yellow: #ffcc00;
            --mines-green: #00e700;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.3s ease-in-out;
        }

        .screen.active { display: flex; }

        /* МЕНЮ */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .game-card:active { transform: scale(0.95); background-color: #2a3040; }
        .game-icon { font-size: 35px; margin-bottom: 10px; }
        .game-title { font-weight: bold; font-size: 14px; letter-spacing: 1px; }

        h2 { margin-bottom: 15px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: #888; font-size: 14px; }

        .input-group { width: 100%; max-width: 300px; margin-bottom: 15px; text-align: center;}
        .hidden { display: none !important; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #666; }
        .history-input {
            background: var(--card-bg); border: 1px solid #333; color: white;
            padding: 12px; border-radius: 10px; width: 100%; text-align: center;
            font-size: 18px; outline: none; box-sizing: border-box;
        }
        .history-input:focus { border-color: var(--primary); }

        .btn {
            background: linear-gradient(90deg, #007aff, #00b4ff); border: none;
            padding: 16px; color: white; font-size: 16px; font-weight: bold;
            border-radius: 12px; cursor: pointer; width: 100%; max-width: 300px;
            margin-top: 15px; box-shadow: 0 5px 20px rgba(0, 122, 255, 0.2);
        }
        .btn-back { background: transparent; border: none; padding: 15px; color: #555; font-size: 14px; cursor: pointer; }

        /* MINES */
        .mines-grid-container {
            display: none; grid-template-columns: repeat(5, 1fr); gap: 8px;
            background: #151921; padding: 10px; border-radius: 10px; margin-bottom: 10px;
        }
        .mine-cell {
            width: 45px; height: 45px; background-color: #2a3040; border-radius: 5px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .mine-cell.active { background-color: #00e700; transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 231, 0, 0.5); }

        /* AVIATOR */
        .aviator-stage {
            display: none; width: 100%; max-width: 320px; height: 200px;
            background: linear-gradient(to bottom, #1a1d29, #0f121b);
            border-radius: 20px; border: 1px solid #333; position: relative;
            overflow: hidden; margin-bottom: 20px;
            align-items: center; justify-content: center;
        }
        .fly-curve {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            stroke: var(--aviator-red); stroke-width: 4; fill: none;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
        }
        .plane-img {
            position: absolute; width: 80px; bottom: 10px; left: 10px;
            transition: transform 0.1s; opacity: 0;
            filter: drop-shadow(0 0 10px rgba(229, 11, 32, 0.5));
            z-index: 20;
        }
        .plane-img.flying { opacity: 1; animation: flyMove 2s forwards ease-out; }
        .aviator-big-text {
            font-size: 48px; font-weight: 800; color: white; z-index: 10;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        @keyframes flyMove { 
            0% { bottom: 10px; left: 10px; transform: rotate(0deg); }
            100% { bottom: 130px; left: 230px; transform: rotate(15deg); }
        }

        /* --- PENALTY STAGE --- */
        .penalty-stage {
            display: none; 
            width: 100%; 
            max-width: 360px;
            height: 240px;
            position: relative; 
            margin-bottom: 20px;
            background-image: url('/img/gate.png'); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid #444;
            box-shadow: 0 0 40px rgba(0, 122, 255, 0.1), inset 0 0 50px rgba(0,0,0,0.8);
        }

        .keeper-img {
            position: absolute; 
            bottom: 10px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 140px; 
            height: auto; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8));
            /* Ускорили анимацию для резкости */
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 5;
            /* Точка вращения - низ по центру (ноги) */
            transform-origin: bottom center;
        }
        
        /* МОЩНЫЙ ПРЫЖОК ВЛЕВО */
        .keeper-img.jump-left { 
            transform: translate(-140px, 10px) rotate(-65deg); 
        }
        /* МОЩНЫЙ ПРЫЖОК ВПРАВО */
        .keeper-img.jump-right { 
            transform: translate(140px, 10px) rotate(65deg); 
        }

        /* Мячи-цели */
        .target-ball {
            position: absolute; 
            width: 30px; 
            height: 30px;
            background: rgba(255,255,255,0.1); 
            border: 3px solid rgba(255,255,255,0.6); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
            z-index: 10;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); 
        }
        
        .pos-tl { top: 35px; left: 35px; } 
        .pos-tr { top: 35px; right: 35px; } 
        .pos-bl { bottom: 35px; left: 35px; } 
        .pos-br { bottom: 35px; right: 35px; } 
        .pos-tc { top: 25px; left: 50%; transform: translateX(-50%); } 

        /* АКТИВНЫЙ МЯЧ (ОГРОМНЫЙ) */
        .target-ball.active {
            width: 60px;  /* Увеличили с 45 до 60 */
            height: 60px;
            background-color: white; /* Белая подложка */
            background-image: url('/img/ball.png');
            background-size: cover;
            background-repeat: no-repeat;
            border: 2px solid white;
            /* Мощное свечение */
            box-shadow: 0 0 40px rgba(255, 255, 255, 1); 
            transform: scale(1.1);
            animation: pulseBall 0.4s infinite alternate;
            z-index: 20; /* Поверх всего */
        }
        
        @keyframes pulseBall { from { transform: scale(1.0); } to { transform: scale(1.2); } }

        /* LOADER */
        .loader {
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin
