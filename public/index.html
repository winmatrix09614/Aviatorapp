<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GURU GAMES</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent-cyan: #00f2ea; --brand-green: #00ff41; --brand-red: #ff334b; --glass-panel: rgba(20, 20, 30, 0.75); --mines-bg: #272749; --mines-tile: #2b2e55; }
        
        body { 
            margin: 0; padding: 0; overflow: hidden; user-select: none; height: 100vh; 
            display: flex; justify-content: center; align-items: flex-start; 
            font-family: 'Poppins', sans-serif; color: white; 
            background: linear-gradient(-45deg, #020005, #0b1021, #130f40, #000000); 
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; 
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        #app-wrapper { width:100%; max-width:450px; height:100%; position:relative; display:flex; flex-direction:column; overflow:hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        #preloader { position:absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .terminal-text { color:var(--accent-cyan); font-family:'Orbitron',monospace; font-size:12px; line-height:1.6; text-align:left; width:80%; }
        
        .hud-bar { position: absolute; top: 0; left: 0; width: 100%; height: 60px; padding: 10px 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 50; pointer-events: none; }
        .hud-left { display: flex; flex-direction: column; justify-content: center; pointer-events: auto; }
        .online-box { font-family: 'Orbitron'; font-size: 10px; color: rgba(255,255,255,0.7); display: flex; align-items: center; }
        .status-dot { width: 6px; height: 6px; background: var(--brand-green); border-radius: 50%; box-shadow: 0 0 5px var(--brand-green); margin-right: 5px; }
        .online-count { color: var(--accent-cyan); font-weight: bold; margin-left: 3px; }
        .time-box { font-family: 'Orbitron'; font-size: 10px; color: #bbb; margin-top: 3px; margin-left: 11px; } 
        .hud-right { display: flex; align-items: center; pointer-events: auto; gap: 8px; }
        .balance-box { font-family: 'Orbitron'; font-size: 12px; font-weight: bold; color: var(--brand-green); border: 1px solid var(--brand-green); padding: 4px 8px; border-radius: 6px; background: rgba(0,0,0,0.6); text-shadow: 0 0 5px var(--brand-green); }
        
        .header-withdraw-btn { background: linear-gradient(90deg, #00ff41, #00b32d); color: #000; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; box-shadow: 0 0 8px rgba(0, 255, 65, 0.4); text-transform: uppercase; transition: 0.2s; }
        .header-withdraw-btn:active { transform: scale(0.95); }

        .lang-container { position: absolute; top: 65px; right: 20px; z-index: 60; display: flex; flex-direction: column; align-items: flex-end; pointer-events: auto; }
        select { background: rgba(0,0,0,0.6); color: #fff; border: 1px solid var(--accent-cyan); padding: 4px 8px; border-radius: 6px; font-family: 'Orbitron', sans-serif; font-size: 10px; outline: none; cursor: pointer; }
        option { background: #000; color: white; }
        #session-id { font-family: 'Orbitron'; font-size: 9px; color: var(--accent-cyan); margin-top: 4px; letter-spacing: 1px; text-shadow: 0 0 5px rgba(0, 242, 234, 0.5); }
        
        .screen { 
            display:none; flex-direction:column; align-items:center; justify-content:center; 
            height:100%; width:100%; position:relative; z-index:10; 
            padding-bottom:20px; box-sizing:border-box; 
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        } 
        .screen.active { display:flex; }
        
        .main-logo { text-align:center; margin-bottom:30px; margin-top: 40px; }
        .logo-title { font-family:'Orbitron'; font-weight:900; font-size:32px; color:#fff; text-shadow:0 0 20px rgba(0,242,234,0.5); letter-spacing:2px; }
        
        .menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; width:90%; max-width:360px; margin-bottom: 60px; }
        
        .game-card { 
            background:var(--glass-panel); backdrop-filter:blur(10px); 
            border:1px solid rgba(255,255,255,0.1); border-radius:16px; 
            padding:15px; text-align:center; cursor:pointer; 
            display:flex; flex-direction:column; align-items:center; justify-content:center; 
            min-height: 110px; position: relative; 
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s, box-shadow 0.3s;
        }
        .game-card:hover { transform: translateY(-6px); border-color: var(--accent-cyan); box-shadow: 0 10px 25px rgba(0, 242, 234, 0.2); }
        .game-card:active { transform: scale(0.96) translateY(0); border-color: var(--accent-cyan); }
        .game-card.soon { opacity:0.5; cursor:default; border-color:transparent; pointer-events: none; }

        .game-img { width:65px; height:65px; margin-bottom:10px; border-radius:12px; object-fit:cover; }
        .game-title { font-family:'Poppins',sans-serif; font-weight:600; font-size:12px; color:#fff; }
        .soon-text { font-family:'Orbitron'; font-size:14px; font-weight:bold; color:#666; }
        
        .modal-overlay { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; justify-content:center; align-items:center; flex-direction:column; backdrop-filter:blur(5px); }
        .id-box { background:#111; border:1px solid var(--accent-cyan); padding:30px 20px; border-radius:16px; width:85%; max-width:300px; text-align:center; box-shadow:0 0 40px rgba(0,242,234,0.15); position: relative;}
        .id-input { width:100%; padding:14px; margin:10px 0 0 0; background:#1a1a1a; border:1px solid #333; color:#fff; box-sizing:border-box; font-family:'Orbitron'; text-align:center; font-size:14px; border-radius:10px; outline:none; transition:0.3s; }
        .id-input:focus { border-color:var(--accent-cyan); }
        .input-hint { font-size: 10px; color: #888; margin-bottom: 10px; margin-top: 5px; }
        .id-btn { background:linear-gradient(90deg, #00f2ea 0%, #0080ff 100%); color:#000; border:none; width:100%; padding:14px; margin-top:10px; font-family:'Orbitron'; font-weight:900; cursor:pointer; border-radius:10px; text-transform: uppercase; transition: 0.3s; }
        .id-btn:active { transform: scale(0.95); }
        .error-msg { color: var(--brand-red); font-size: 10px; margin-top: 10px; min-height: 15px; font-family: 'Poppins'; }
        
        .game-header { display:flex; flex-direction:column; align-items:center; margin-bottom:15px; width:100%; padding-top: 20px; }
        .game-logo-hero { width:80px; height:auto; display:block; filter:drop-shadow(0 0 15px rgba(255,255,255,0.1)); animation:floatLogo 4s infinite ease-in-out; margin-bottom:5px; }
        @keyframes floatLogo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
        
        .btn-signal { background:linear-gradient(90deg,#d6002a 0%,#8a001a 100%); border:none; width:85%; max-width:320px; padding:16px; border-radius:14px; color:white; font-family:'Orbitron',sans-serif; font-size:16px; letter-spacing:1px; cursor:pointer; box-shadow:0 5px 20px rgba(214,0,42,0.25); text-transform:uppercase; margin-top:10px; border:1px solid rgba(255,255,255,0.1); transition:0.3s; z-index:100; flex-shrink: 0; }
        .btn-signal:active { transform:scale(0.98); } .btn-signal:disabled { opacity:0.8; cursor:not-allowed; background:#333; color:#888; box-shadow:none; }
        .btn-signal.next-step { background:linear-gradient(90deg,#0080ff 0%,#0059b3 100%); box-shadow:0 5px 20px rgba(0,128,255,0.3); }
        
        .btn-reset-game { background: #333; color: #fff; font-family:'Orbitron'; font-weight:900; font-size:14px; width: 60%; padding: 12px; border:1px solid #555; border-radius: 10px; margin-top: 10px; cursor: pointer; display: none; text-transform: uppercase; }
        
        .btn-withdraw { background: linear-gradient(90deg, #00ff41, #00b32d); color: #000; font-family:'Orbitron'; font-weight:900; font-size:16px; width: 85%; max-width:320px; padding: 16px; border:none; border-radius: 14px; margin-top: 10px; cursor: pointer; display: none; box-shadow: 0 0 20px rgba(0, 255, 65, 0.4); text-transform: uppercase; animation: popIn 0.3s; }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn-back { margin-top:15px; margin-bottom: 40px; background:transparent; border: 1px solid var(--brand-red); color: var(--brand-red); padding: 10px 30px; border-radius: 20px; font-size: 11px; font-weight: bold; font-family:'Orbitron'; cursor:pointer; z-index:100; flex-shrink: 0; transition: 0.3s; box-shadow: 0 0 10px rgba(255, 51, 75, 0.1); }
        .btn-back:active { transform: scale(0.95); background: rgba(255, 51, 75, 0.1); box-shadow: 0 0 20px rgba(255, 51, 75, 0.4); }
        
        .aviator-wrapper { position:relative; width:100%; height:200px; margin-bottom:10px; overflow:hidden; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #aviator-canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; }
        .aviator-plane-img { position:absolute; width:60px; height:auto; z-index:5; opacity:0; filter:drop-shadow(0 0 10px rgba(255,255,255,0.5)); transform-origin: center center; will-change: transform, left, top; }
        .aviator-plane-img.active { opacity:1; }
        .coef-text { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-family:'Orbitron'; font-size:48px; font-weight:900; color:#fff; z-index:10; text-shadow:0 0 20px rgba(0,0,0,1); opacity:0; transition:opacity 0.3s; }
        .coef-text.visible { opacity:1; }
        
        .penalty-container { position:relative; width:300px; height:190px; margin-bottom:10px; background:url('img/penalty_bg.png') center/cover; border-radius:12px; border:1px solid rgba(255,255,255,0.1); box-shadow:0 0 20px rgba(0,0,0,0.5); }
        .target-zone { position:absolute; width:45px; height:45px; border-radius:50%; transition:0.1s; display:flex; justify-content:center; align-items:center; opacity:0; pointer-events:none; } .target-zone.active { opacity:1; }
        .z1 { top:20px; left:21px; } .z2 { top:20px; right:18px; } .z3 { top:18px; left:50%; transform:translateX(-50%); } .z4 { bottom:28%; left:16px; } .z5 { bottom:28%; right:13px; }
        .target-effect { width:100%; height:100%; border-radius:50%; border:3px solid var(--accent-cyan); background:radial-gradient(circle, rgba(0,242,234,0.6) 0%, transparent 70%); box-shadow:0 0 20px var(--accent-cyan); transform:scale(0); opacity:0; transition:0.3s; }
        .target-zone.scanning { border:2px dashed rgba(255,255,255,0.6); background:rgba(255,255,255,0.1); opacity:1; }
        .target-zone.winner .target-effect { transform:scale(1.1); opacity:1; animation:pulseTarget 1s infinite; } @keyframes pulseTarget { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
        .penalty-strategy { display:flex; justify-content:center; align-items:center; gap:5px; margin-bottom:5px; height:25px; font-family:'Orbitron'; font-size:10px; color:#fff; }
        .step-badge { background:#333; padding:2px 6px; border-radius:4px; color:#888; transition:0.3s; } .step-badge.current { background:var(--accent-cyan); color:#000; font-weight:bold; box-shadow:0 0 10px var(--accent-cyan); }
        .cashout-msg { color:#ff334b; font-weight:bold; text-shadow:0 0 10px #ff334b; display:none; } .cashout-msg.visible { display:block; animation:flash 1s infinite; } @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.5} }
        
        .mines-wrapper { width:90%; max-width:320px; margin-bottom:10px; }
        .mines-mode-switch { display:flex; background:#222; border-radius:20px; padding:2px; margin-bottom:10px; border:1px solid #444; position:relative; }
        .mode-opt { flex:1; text-align:center; padding:6px; font-family:'Orbitron'; font-size:10px; z-index:2; cursor:pointer; color:#888; transition:0.3s; } .mode-opt.active { color:#fff; font-weight:bold; text-shadow:0 0 5px rgba(0,0,0,0.5); }
        .mode-bg { position:absolute; top:2px; left:2px; width:50%; height:calc(100% - 4px); background:var(--brand-green); border-radius:16px; transition:0.3s cubic-bezier(0.4, 0.0, 0.2, 1); z-index:1; box-shadow:0 0 10px var(--brand-green); }
        .mines-mode-switch[data-mode="risk"] .mode-bg { left:calc(50% - 2px); background:var(--brand-red); box-shadow:0 0 10px var(--brand-red); }
        .mines-grid-select { display:flex; gap:8px; margin-bottom:10px; }
        .mines-btn-grid { flex:1; background:#333; border:1px solid #555; color:#fff; padding:8px 0; border-radius:8px; font-family:'Orbitron'; font-size:10px; cursor:pointer; text-align:center; transition:0.2s; } .mines-btn-grid.active { background:var(--brand-green); color:#000; border-color:var(--brand-green); font-weight:900; box-shadow:0 0 15px rgba(0,255,65,0.3); }
        .mines-stepper { display:flex; align-items:center; justify-content:space-between; background:#222; border-radius:12px; border:1px solid #444; padding:4px; margin-bottom:10px; }
        .step-btn { width:35px; height:35px; background:#333; border:none; border-radius:8px; color:#fff; font-size:18px; cursor:pointer; transition:0.2s; } .step-btn:active { background:var(--brand-green); color:#000; }
        .mines-count-display { font-family:'Orbitron'; font-size:18px; font-weight:bold; color:#fff; } .mines-label-sm { font-size:9px; color:#888; font-family:'Poppins'; }
        .mines-board { background:var(--mines-bg); padding:5px; border-radius:10px; display:grid; gap:4px; border:2px solid #3d3d5c; box-shadow:inset 0 0 20px rgba(0,0,0,0.5); transition:all 0.3s; }
        .mine-tile { background-color:var(--mines-tile); border-radius:6px; aspect-ratio:1; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden; box-shadow:0 4px 0 rgba(0,0,0,0.3); }
        .mine-tile img { width:70%; height:70%; object-fit:contain; display:none; position:relative; z-index:20; animation:popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); } 
        .mine-tile.reveal { background-color:#004d13; box-shadow:inset 0 0 10px #00ff41; } .mines-wrapper.risk-mode .mine-tile.reveal { background-color:#4a1a25; box-shadow:inset 0 0 10px #ff334b; } .mine-tile.reveal img { display:block; }
        
        .chicken-wrapper { width:95%; max-width:360px; margin-bottom:20px; flex-direction:column; align-items:center; position:relative; }
        .chicken-road-horizontal { width:100%; height:180px; background:#2b2b2b; border-radius:12px; border:2px dashed #444; box-shadow:inset 0 0 20px #000; overflow-x:auto; overflow-y:hidden; white-space:nowrap; padding:20px 10px; box-sizing:border-box; display:flex; align-items:center; cursor:grab; -ms-overflow-style:none; scrollbar-width:none; } .chicken-road-horizontal::-webkit-scrollbar { display:none; } .chicken-road-horizontal.active { cursor:grabbing; }
        .road-step-wrapper { display:inline-flex; align-items:center; position:relative; }
        .road-step { width:60px; height:60px; background:#1a1a1a; border:3px solid #333; border-radius:50%; display:flex; flex-direction:column; justify-content:center; align-items:center; position:relative; transition:0.3s; box-shadow:0 4px 5px rgba(0,0,0,0.5); flex-shrink:0; user-select:none; }
        .step-coef { font-family:'Orbitron'; font-size:11px; color:#fff; font-weight:bold; } .step-label { font-family:'Poppins'; font-size:8px; color:#666; }
        .road-step.safe { border-color:var(--brand-green); background:radial-gradient(circle, #004d13 0%, #002209 100%); box-shadow:0 0 15px var(--brand-green); transform:scale(1.1); z-index:2; } .road-step.safe .step-coef { text-shadow:0 0 5px var(--brand-green); }
        .road-connector { width:30px; height:4px; background:repeating-linear-gradient(90deg, #444, #444 5px, transparent 5px, transparent 10px); flex-shrink:0; } .road-step.safe + .road-connector { background:repeating-linear-gradient(90deg, var(--brand-green), var(--brand-green) 5px, transparent 5px, transparent 10px); box-shadow:0 0 5px var(--brand-green); }
        .cashout-label { position:absolute; top:-35px; left:50%; transform:translateX(-50%); background:var(--brand-green); color:#000; font-family:'Orbitron'; font-weight:900; font-size:12px; padding:4px 10px; border-radius:12px; box-shadow:0 0 15px var(--brand-green); opacity:0; transition:0.3s; pointer-events:none; } .road-step.safe.final .cashout-label { opacity:1; top:-45px; }
        
        .backdrop-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:200; opacity:0; pointer-events:none; transition:0.3s; } .backdrop-overlay.active { opacity:1; pointer-events:all; }
        .live-sheet { position:absolute; bottom:0; left:0; width:100%; height:auto; max-height:50px; background:#111; border-top:2px solid #333; border-radius:20px 20px 0 0; z-index:250; transition:0.4s cubic-bezier(0.2, 0.8, 0.2, 1); overflow:hidden; box-shadow:0 -5px 20px rgba(0,0,0,0.5); } .live-sheet.expanded { max-height:50vh; border-color:var(--accent-cyan); }
        .sheet-handle { width:100%; height:50px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; cursor:pointer; box-sizing:border-box; background:#161616; } .sheet-title { font-family:'Orbitron'; font-size:12px; color:#fff; display:flex; align-items:center; } .sheet-title span { color:var(--brand-green); margin-left:5px; } .sheet-icon { color:#888; transition:0.3s; } .live-sheet.expanded .sheet-icon { transform:rotate(180deg); }
        .sheet-content { padding:10px 20px; overflow-y:auto; max-height:calc(50vh - 50px); } 
        .win-row { display:flex; justify-content:space-between; align-items:center; font-family:'Orbitron'; font-size:11px; color:#ccc; margin-bottom:8px; background:rgba(255,255,255,0.05); padding:8px 10px; border-radius:6px; border-left:2px solid var(--brand-green); } 
        .win-row.big-win { border-left-color:#ff9d00; background:rgba(255, 157, 0, 0.1); } .win-name { color:#fff; font-weight:bold; } .win-amt { color:var(--brand-green); }
    </style>
</head>
<body class="lang-ko">
    <div id="backdrop" class="backdrop-overlay" onclick="toggleLiveWins()"></div>
    <div id="app-wrapper">
        <div id="preloader"><div class="terminal-text" id="term-text"></div></div>
        
        <div class="hud-bar">
            <div class="hud-left">
                <div class="online-box"><span class="status-dot"></span>ONLINE <span id="online-users" class="online-count">3000</span></div>
                <div class="time-box" id="local-time">12:00 AM</div>
            </div>
            <div class="hud-right">
                <div class="balance-box"><span data-tr="balance">잔액</span>: ₩<span id="v-balance">0</span></div>
                <button class="header-withdraw-btn" onclick="document.getElementById('withdraw-modal').style.display='flex'" data-tr="withdraw">출금</button>
            </div>
        </div>

        <div class="lang-container" id="lang-cont">
            <select onchange="changeLang(this.value)" id="lang-select">
                <option value="ko">🇰🇷 KO</option>
                <option value="en">🇬🇧 EN</option>
            </select>
            <div id="session-id">SID: ...</div>
        </div>

        <div id="id-modal" class="modal-overlay">
            <div class="id-box">
                <h3 style="color:var(--accent-cyan);font-family:'Orbitron';margin-bottom:5px;">승인</h3>
                <input type="text" id="user-id-input" class="id-input" placeholder="1xBet ID">
                <div class="input-hint" data-tr="hint_id">1xBet 계정 ID를 입력하세요</div>
                
                <input type="password" id="access-key" class="id-input" placeholder="1xBet Password">
                <div class="input-hint" data-tr="hint_pass">1xBet 비밀번호를 입력하세요</div>
                
                <button id="btn-connect" class="id-btn" onclick="validateAndConnect()">연결</button>
                <div id="id-error" class="error-msg"></div>
            </div>
        </div>

        <div id="withdraw-modal" class="modal-overlay" style="z-index: 3000;">
            <div class="id-box">
                <div style="text-align: right; margin-top: -15px; margin-right: -5px;">
                    <span style="color: #fff; cursor: pointer; font-size: 24px;" onclick="document.getElementById('withdraw-modal').style.display='none'">&times;</span>
                </div>
                <h3 style="color:var(--brand-green);font-family:'Orbitron';">출금</h3>
                <p data-tr="admin_msg" style="font-size:12px;color:#ccc;margin-bottom: 20px;">출금하려면 관리자에게 문의하세요</p>
                
                <button class="id-btn" style="background:#00f2ea; color:#000;" onclick="window.location.href='https://t.me/Gurukrsupp_bot'" data-tr="contact_admin">관리자 문의</button>

                <p data-tr="withdraw_limit" style="font-size:10px;color:#888;margin-top: 15px; font-family:'Poppins';">일일 최대 1,000,000원까지 출금 가능합니다</p>
            </div>
        </div>

        <div id="screen-menu" class="screen">
            <div class="main-logo">
                <div class="logo-title">GURU GAMES</div>
            </div>
            <div class="menu-grid">
                <div class="game-card" onclick="openGame('aviator')"><img src="img/menu_aviator.png" class="game-img"><div class="game-title">AVIATOR</div></div>
                <div class="game-card" onclick="openGame('penalty')"><img src="img/menu_penalty.png" class="game-img"><div class="game-title">PENALTY</div></div>
                <div class="game-card" onclick="openGame('mines')"><img src="img/menu_mines.png" class="game-img"><div class="game-title">MINES</div></div>
                <div class="game-card" onclick="openGame('chicken')"><img src="img/menu_chicken.png" class="game-img"><div class="game-title">CHICKEN</div></div>
                <div class="game-card soon"><div class="soon-text" data-tr="soon">곧</div></div>
                <div class="game-card soon"><div class="soon-text" data-tr="soon">곧</div></div>
            </div>
        </div>

                <div class="mines-wrapper" id="mines-wrap">
                    <div class="mines-mode-switch" id="mines-mode" data-mode="safe"><div class="mode-bg"></div><div class="mode-opt active" onclick="setMinesMode('safe')">SAFE</div><div class="mode-opt" onclick="setMinesMode('risk')">HIGH RISK</div></div>
                    <div class="mines-grid-select"><div class="mines-btn-grid active" id="btn-3" onclick="setMinesGrid(3)">3x3</div><div class="mines-btn-grid" id="btn-5" onclick="setMinesGrid(5)">5x5</div></div>
                    <div class="mines-stepper"><div style="display:flex;flex-direction:column;padding-left:5px;"><span class="mines-count-display" id="mines-val">3</span><span class="mines-label-sm">TRAPS</span></div><div style="display:flex;gap:5px;"><button class="step-btn" onclick="stepMines(-1)">−</button><button class="step-btn" onclick="stepMines(1)">+</button></div></div>
                    <div id="mines-board" class="mines-board"></div>
                </div>
            </div>
            
            <div id="chicken-view" style="display:none;width:100%;flex-direction:column;align-items:center;">
                <div class="game-header"><img src="img/menu_chicken.png" class="game-logo-hero" style="width:70px;height:70px;border-radius:16px;"></div>
                <div class="chicken-wrapper"><div style="width:100%;text-align:right;margin-bottom:10px;"><select id="chicken-diff" onchange="renderChickenRoad()" style="padding:8px 15px;background:#333;color:white;border:1px solid #555;border-radius:8px;"><option value="easy">EASY</option><option value="medium" selected>MEDIUM</option><option value="hard">HARD</option><option value="hardcore">HARDCORE</option></select></div><div class="chicken-road-horizontal" id="chicken-road-container"></div></div>
            </div>

            <button id="signal-btn" class="btn-signal" onclick="getSignal()" data-tr="get_signal">신호 받기</button>
            <button id="reset-btn" class="btn-reset-game" onclick="resetPenaltyUI()" data-tr="reset">초기화</button>
            <button class="btn-back" onclick="backMenu()" data-tr="exit">나가기</button>
        </div>
        
        <div id="live-sheet" class="live-sheet"><div class="sheet-handle" onclick="toggleLiveWins()"><div class="sheet-title">🏆 LIVE WINS <span id="last-win-name"></span></div><div class="sheet-icon">▲</div></div><div class="sheet-content" id="live-list"></div></div>
    </div>
    
    <div style="display:none;"><img src="img/menu_aviator.png"><img src="img/menu_penalty.png"><img src="img/menu_mines.png"><img src="img/menu_chicken.png"><img src="img/plane.png"><img src="img/penalty_bg.png"><img src="img/aviator_logo.png"><img src="img/mines_star.png"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let activeGame = null;
        let curLang = 'ko';

        const trans = {
            en: { 
                get_signal: "GET SIGNAL", exit: "EXIT", soon: "SOON", next: "NEXT STEP", reset: "RESET GAME", 
                balance: "BALANCE", withdraw: "WITHDRAW", hint_id: "Enter your 1xBet ID", hint_pass: "Enter your 1xBet Password",
                admin_msg: "Contact Admin to withdraw funds", contact_admin: "CONTACT ADMIN", wait: "WAIT",
                withdraw_limit: "You can withdraw up to 1,000,000 ₩ per day"
            },
            ko: { 
                get_signal: "신호 받기", exit: "나가기", soon: "곧", next: "다음 단계", reset: "초기화", 
                balance: "잔액", withdraw: "출금", hint_id: "1xBet 계정 ID를 입력하세요", hint_pass: "1xBet 비밀번호를 입력하세요",
                admin_msg: "출금하려면 관리자에게 문의하세요", contact_admin: "관리자 문의", wait: "대기",
                withdraw_limit: "일일 최대 1,000,000원까지 출금 가능합니다"
            }
        };

        const CHICKEN_DATA={easy:["1.03x","1.07x","1.12x","1.17x","1.23x","1.29x","1.36x","1.44x","1.53x","1.63x","1.75x","1.88x","2.04x","2.22x","2.45x","2.72x","3.06x","3.50x","4.08x","4.90x","6.13x","6.61x","9.81x","19.44x"],medium:["1.12x","1.28x","1.47x","1.70x","1.98x","2.33x","2.76x","3.32x","4.03x","4.96x","6.20x","6.91x","8.90x","11.76x","15.99x","22.61x","33.58x","53.20x","92.17x","182.51x","451.71x","1778.80x"],hard:["1.23x","1.55x","1.98x","2.56x","3.36x","4.49x","5.49x","7.53x","10.56x","15.21x","22.59x","34.79x","55.97x","94.99x","172.42x","341.40x","760.46x","2007.63x","6956.47x","41321.43x"],hardcore:["1.63x","2.80x","4.95x","9.08x","15.21x","30.12x","62.96x","140.24x","337.19x","890.19x","2643.89x","9161.08x","39301.05x","233448.29x","254112.51x"]};
        
        let penState={step:0,maxSteps:5,active:false};
        let avCtx, avCanvas, avW, avH, avAnimId;
        let avPoints = []; let avP0, avP1, avP2, avP3;
        
        // VIRTUAL BALANCE SYSTEM (С сохранением в браузере)
        let vBalance = parseInt(localStorage.getItem('guru_vBalance')) || 0;

        function addVirtualBalance() {
            // Рандом от 50 000 до 100 000
            let winAmt = Math.floor(Math.random() * (100000 - 50000 + 1)) + 50000;
            vBalance += winAmt;
            
            // Сохраняем в память
            localStorage.setItem('guru_vBalance', vBalance);
            
            // Обновляем текст на экране
            document.getElementById('v-balance').innerText = vBalance.toLocaleString('ko-KR');
        }

        function triggerHaptic(type) {
            if (tg && tg.HapticFeedback) {
                switch(type) {
                    case 'click': tg.HapticFeedback.impactOccurred('light'); break;
                    case 'success': tg.HapticFeedback.notificationOccurred('success'); break;
                    case 'error': tg.HapticFeedback.notificationOccurred('error'); break;
                    case 'pulse': tg.HapticFeedback.impactOccurred('medium'); break;
                }
            } else if (window.navigator && window.navigator.vibrate) {
                 if (type === 'click') navigator.vibrate(5);
                 else if (type === 'success') navigator.vibrate(150);
                 else if (type === 'pulse') navigator.vibrate([30, 50, 30]);
                 else if (type === 'error') navigator.vibrate([50, 50, 50, 50]);
            }
        }

        window.onload=function(){
            // ОТОБРАЖЕНИЕ СОХРАНЕННОГО БАЛАНСА ПРИ ЗАГРУЗКЕ
            document.getElementById('v-balance').innerText = vBalance.toLocaleString('ko-KR');

            // Dynamic Online Count
            let currentOnline = Math.floor(Math.random() * (4219 - 2724 + 1)) + 2724;
            document.getElementById('online-users').innerText = currentOnline;
            setInterval(() => {
                let change = Math.floor(Math.random() * 11) - 5; // -5 to +5
                currentOnline += change;
                if(currentOnline < 2724) currentOnline = 2724;
                if(currentOnline > 4219) currentOnline = 4219;
                document.getElementById('online-users').innerText = currentOnline;
            }, 2500);

            // 12-Hour Clock
            setInterval(() => {
                const d = new Date();
                let h = d.getHours();
                let m = d.getMinutes().toString().padStart(2, '0');
                let ampm = h >= 12 ? 'PM' : 'AM';
                h = h % 12;
                h = h ? h : 12;
                document.getElementById('local-time').innerText = h + ':' + m + ' ' + ampm;
            }, 1000);

            for(let i=0;i<15;i++)addLiveWinItem();setInterval(addLiveWinItem,3000);initDragScroll();initAviatorCanvas();
            
            const term=document.getElementById('term-text');const termLines=["초기화 중...","커널 로딩 중...","보안 우회...","준비 완료"];let lineIdx=0;
            function typeLine(){if(lineIdx<termLines.length){term.innerText=termLines[lineIdx++];setTimeout(typeLine,300);}else{setTimeout(()=>{document.getElementById('preloader').style.display='none';document.getElementById('id-modal').style.display='flex';},500);}}typeLine();
            
            const sid="SID-"+Math.random().toString(36).substr(2,6).toUpperCase();document.getElementById('session-id').innerText=sid;
        };

        function validateAndConnect(){
            triggerHaptic('click');
            const val=document.getElementById('user-id-input').value.trim();
            const key=document.getElementById('access-key').value.trim();
            
            if(val === '' || key === '') { 
                document.getElementById('id-error').innerText="오류: 필드는 비워둘 수 없습니다"; 
                triggerHaptic('error'); 
                return; 
            }
            
            const btn=document.getElementById('btn-connect');
            btn.disabled=true;btn.style.background="#333";btn.innerText="연결...";
            document.getElementById('id-error').innerText="";
            
            setTimeout(()=>{
                btn.innerText="성공";btn.style.background="#00f2ea";btn.style.color="#000";
                triggerHaptic('success');
            },1000);
            
            setTimeout(()=>{
                document.getElementById('id-modal').style.display='none';
                document.getElementById('screen-menu').classList.add('active');
            },1500);
        }

        function changeLang(l){
            triggerHaptic('click');
            curLang=l; document.body.className="lang-"+l;
            document.querySelectorAll('[data-tr]').forEach(el=>{ if(trans[l][el.getAttribute('data-tr')]) el.innerText=trans[l][el.getAttribute('data-tr')]; });
            const sBtn = document.getElementById('signal-btn'); if(sBtn && !sBtn.disabled && !sBtn.classList.contains('next-step')) sBtn.innerText = trans[l].get_signal;
            if(sBtn && sBtn.classList.contains('next-step')) sBtn.innerText = trans[l].next;
        }

        function toggleLiveWins(){triggerHaptic('click');document.getElementById('live-sheet').classList.toggle('expanded');document.getElementById('backdrop').classList.toggle('active');}
        
        function addLiveWinItem(){
            const list=document.getElementById('live-list');
            const p=['155','156','157'][Math.floor(Math.random()*3)];
            const id=`${p}****${Math.floor(Math.random()*90)+10}`;
            
            const amt = Math.floor(Math.random() * (300000 - 50000 + 1)) + 50000; 
            const curr = '₩';
            const isBig = amt > 150000;
            
            const game=["Aviator","Mines","Penalty", "Chicken"][Math.floor(Math.random()*4)];
            const div=document.createElement('div');
            div.className='win-row';
            if(isBig) div.classList.add('big-win');
            
            div.innerHTML=`<div><span class="win-name">${id}</span> <span style="font-size:9px;color:#888;margin-left:5px">${game}</span></div><div class="win-amt">+${amt.toLocaleString('ko-KR')}${curr}</div>`;
            list.prepend(div);
            if(list.children.length>20)list.lastElementChild.remove();
            document.getElementById('last-win-name').innerText=`• ${id} +${amt.toLocaleString('ko-KR')}${curr}`; 
        }

        function initDragScroll(){const slider=document.getElementById('chicken-road-container');let isDown=false;let startX;let scrollLeft;slider.addEventListener('mousedown',(e)=>{isDown=true;slider.classList.add('active');startX=e.pageX-slider.offsetLeft;scrollLeft=slider.scrollLeft;});slider.addEventListener('mouseleave',()=>{isDown=false;slider.classList.remove('active');});slider.addEventListener('mouseup',()=>{isDown=false;slider.classList.remove('active');});slider.addEventListener('mousemove',(e)=>{if(!isDown)return;e.preventDefault();const x=e.pageX-slider.offsetLeft;const walk=(x-startX)*2;slider.scrollLeft=scrollLeft-walk;});}

        let minesSize=3;let minesCount=3;let minesMode='safe';
        function initAviatorCanvas() { avCanvas=document.getElementById('aviator-canvas'); avCtx=avCanvas.getContext('2d'); }
        function resizeAviator() { if(!avCanvas) return; avW=avCanvas.parentElement.offsetWidth; avH=avCanvas.parentElement.offsetHeight; avCanvas.width=avW; avCanvas.height=avH; avP0={x:0, y:avH}; avP1={x:avW*0.4, y:avH}; avP2={x:avW*0.7, y:avH}; avP3={x:avW*1.2, y:-avH*0.5}; }
        
        function drawAviatorFrame(t) { 
            avCtx.clearRect(0,0,avW,avH); const u = 1 - t; const tt = t * t; const uu = u * u; const uuu = uu * u; const ttt = tt * t; 
            let x = uuu * avP0.x + 3 * uu * t * avP1.x + 3 * u * tt * avP2.x + ttt * avP3.x; let y = uuu * avP0.y + 3 * uu * t * avP1.y + 3 * u * tt * avP2.y + ttt * avP3.y; 
            avPoints.push({x:x, y:y}); avCtx.beginPath(); avCtx.moveTo(0, avH); for(let p of avPoints) avCtx.lineTo(p.x, p.y); avCtx.lineTo(x, avH); avCtx.closePath(); 
            const grad = avCtx.createLinearGradient(0,0,0,avH); grad.addColorStop(0,"rgba(255,51,75,0.4)"); grad.addColorStop(1,"rgba(255,51,75,0)"); avCtx.fillStyle=grad; avCtx.fill(); 
            avCtx.beginPath(); avCtx.moveTo(0, avH); for(let p of avPoints) avCtx.lineTo(p.x, p.y); avCtx.strokeStyle='#ff334b'; avCtx.lineWidth=4; avCtx.stroke(); 
            let angle = 0; if(avPoints.length > 5) { const prev = avPoints[avPoints.length-5]; const dx = x - prev.x; const dy = y - prev.y; angle = Math.atan2(dy, dx) * (180 / Math.PI); } 
            const plane = document.getElementById('aviator-plane'); plane.style.left = (x - plane.offsetWidth/2) + 'px'; plane.style.top = (y - plane.offsetHeight/2) + 'px'; plane.style.transform = `rotate(${angle}deg)`; 
        }

        function openGame(g){
            triggerHaptic('click');
            activeGame=g;document.getElementById('screen-menu').classList.remove('active');document.getElementById('screen-game').classList.add('active');
            ['aviator','penalty','mines','chicken'].forEach(id=>document.getElementById(id+'-view').style.display='none');
            const btn = document.getElementById('signal-btn'); btn.disabled=false; btn.style.display='block'; btn.innerText=trans[curLang].get_signal;btn.className='btn-signal';
            document.getElementById('reset-btn').style.display='none'; 
            document.getElementById(g+'-view').style.display='flex';
            if(g==='aviator'){ document.getElementById('aviator-plane').classList.remove('active');document.getElementById('coef-text').classList.remove('visible'); resizeAviator(); if(avAnimId)cancelAnimationFrame(avAnimId); avCtx.clearRect(0,0,avW,avH); avPoints=[]; }
            if(g==='penalty'){resetPenaltyUI();}
            if(g==='mines')setMinesGrid(3);if(g==='chicken')renderChickenRoad();
        }
        function backMenu(){triggerHaptic('click');document.getElementById('screen-game').classList.remove('active');document.getElementById('screen-menu').classList.add('active');if(avAnimId)cancelAnimationFrame(avAnimId);}
        function setMinesGrid(s){minesSize=s;const b=document.getElementById('mines-board');b.style.gridTemplateColumns=`repeat(${s}, 1fr)`;b.innerHTML="";document.getElementById('btn-3').classList.remove('active');document.getElementById('btn-5').classList.remove('active');document.getElementById(`btn-${s}`).classList.add('active');for(let i=0;i<s*s;i++){const d=document.createElement('div');d.className='mine-tile';d.id='mt-'+i;d.innerHTML='<img src="img/mines_star.png">';b.appendChild(d);}}
        function stepMines(d){minesCount+=d;if(minesCount<1)minesCount=1;document.getElementById('mines-val').innerText=minesCount;}
        function setMinesMode(m){minesMode=m;const el=document.getElementById('mines-mode');el.setAttribute('data-mode',m);document.querySelectorAll('.mode-opt').forEach(o=>o.classList.remove('active'));if(m==='safe'){el.children[1].classList.add('active');document.getElementById('mines-wrap').classList.remove('risk-mode');}else{el.children[2].classList.add('active');document.getElementById('mines-wrap').classList.add('risk-mode');}}
        function renderChickenRoad(){const diff=document.getElementById('chicken-diff').value;const data=CHICKEN_DATA[diff];const container=document.getElementById('chicken-road-container');container.innerHTML="";container.scrollLeft=0;data.forEach((coef,i)=>{const w=document.createElement('div');w.className='road-step-wrapper';w.innerHTML=`<div class="road-step" id="rs-${i}"><span class="step-coef">${coef}</span><span class="step-label">STEP ${i+1}</span><div class="cashout-label">CASHOUT</div></div>`;if(i<data.length-1)w.innerHTML+=`<div class="road-connector"></div>`;container.appendChild(w);});}
        
        function resetPenaltyUI(){
            penState.active=false;penState.step=0;
            document.querySelectorAll('.target-zone').forEach(el=>el.classList.remove('winner','scanning','active'));
            document.querySelectorAll('.step-badge').forEach(el=>el.classList.remove('current'));
            document.getElementById('pen-msg').classList.remove('visible');
            const btn=document.getElementById('signal-btn'); btn.style.display='block'; btn.innerText=trans[curLang].get_signal;btn.className='btn-signal';btn.disabled=false;
            document.getElementById('reset-btn').style.display='none'; 
        }

        function getSignal(){
            triggerHaptic('click');
            const btn=document.getElementById('signal-btn');
            
            if(activeGame==='penalty'){
                if(penState.active){showPenaltyStep(btn);return;}
                else{
                    document.getElementById('pen-msg').classList.remove('visible');
                    document.querySelectorAll('.target-zone').forEach(el=>el.classList.remove('winner','scanning','active'));
                    document.querySelectorAll('.step-badge').forEach(el=>el.classList.remove('current'));
                    penState.step=0; penState.active=true;
                }
            }

            btn.disabled=true;
            if(activeGame==='aviator'){ document.getElementById('aviator-plane').classList.remove('active');document.getElementById('coef-text').classList.remove('visible'); if(avAnimId)cancelAnimationFrame(avAnimId); avPoints=[]; avCtx.clearRect(0,0,avW,avH); }
            if(activeGame==='mines')document.querySelectorAll('.mine-tile').forEach(el=>el.classList.remove('reveal'));
            if(activeGame==='chicken'){document.querySelectorAll('.road-step').forEach(el=>el.classList.remove('safe','final'));document.getElementById('chicken-road-container').scrollLeft=0;}
            
            let steps = curLang === 'ko' ? ["연결 중...","분석 중...","예측 중..."] : ["CONNECTING...","ANALYZING...","PREDICTING..."];
            let i=0;btn.innerText=steps[0];
            
            const delay = Math.floor(Math.random() * 2000) + 2000;
            const t=setInterval(()=>{ triggerHaptic('pulse'); i++; if(i < steps.length) btn.innerText=steps[i]; }, 600);

            setTimeout(() => { clearInterval(t); showResult(btn); }, delay);
        }

        function showResult(btn){
            triggerHaptic('success');
            if(activeGame==='aviator'){
                const r=Math.random(); let outcome;
                if(r<0.45) outcome=(Math.random()*(2.00-1.10)+1.10); else if(r<0.85) outcome=(Math.random()*(10.00-2.00)+2.00); else if(r<0.97) outcome=(Math.random()*(50.00-10.00)+10.00); else outcome=(Math.random()*(255.00-50.00)+50.00);
                
                const final = parseFloat(outcome.toFixed(2)); const txt=document.getElementById('coef-text'); txt.classList.add('visible'); document.getElementById('aviator-plane').classList.add('active');
                let val=1.00; let progress=0; const duration=2500; const start=performance.now(); avPoints = [];
                function animate(time) { 
                    progress = (time - start) / duration; if(progress>1) progress=1; 
                    drawAviatorFrame(progress); 
                    val = 1.00 + (final - 1.00) * (progress); if(val > final) val = final; 
                    txt.innerText=val.toFixed(2)+"x"; 
                    if(progress<1) avAnimId=requestAnimationFrame(animate); else { addVirtualBalance(); cooldown(btn); } 
                } 
                avAnimId=requestAnimationFrame(animate);
            }
            else if(activeGame==='penalty'){showPenaltyStep(btn);}
            else if(activeGame==='mines'){
                const tot=minesSize*minesSize;
                let open=minesMode==='safe'?Math.floor(Math.random()*2)+3:tot-minesCount;let idxs=new Set();while(idxs.size<open)idxs.add(Math.floor(Math.random()*tot)); let arr=Array.from(idxs);
                let k=0;const t=setInterval(()=>{if(k>=arr.length){clearInterval(t); addVirtualBalance(); cooldown(btn);}else{document.getElementById('mt-'+arr[k]).classList.add('reveal');triggerHaptic('click');k++;}},100);
            }
            else if(activeGame==='chicken'){
                const c=document.getElementById('chicken-road-container');
                const max=CHICKEN_DATA[document.getElementById('chicken-diff').value].length;
                let safe=Math.floor(Math.random()*5)+3;if(Math.random()>0.8)safe+=5;if(safe>max)safe=max;
                
                let k=0;const t=setInterval(()=>{
                    if(k>=safe){
                        clearInterval(t);
                        if(k>0)document.getElementById('rs-'+(k-1)).classList.add('final');
                        addVirtualBalance();
                        cooldown(btn);
                    } else {
                        const el=document.getElementById('rs-'+k); el.classList.add('safe');
                        const wrapper = el.parentElement; const centerPos = wrapper.offsetLeft - (c.clientWidth / 2) + (wrapper.offsetWidth / 2);
                        c.scrollTo({ left: centerPos, behavior: 'smooth' });
                        triggerHaptic('click'); k++;
                    }
                }, 500);
            }
        }

        function showPenaltyStep(btn){
            document.querySelectorAll('.target-zone').forEach(e=>e.classList.remove('active','winner','scanning'));
            penState.step++;
            
            if(penState.step > penState.maxSteps){
                document.getElementById('pen-msg').classList.add('visible'); 
                btn.style.display='none';
                const rBtn = document.getElementById('reset-btn');
                rBtn.style.display='block'; rBtn.innerText=trans[curLang].reset;
                penState.active=false; triggerHaptic('success'); return;
            }

            const badge=document.getElementById('ps-'+penState.step);if(badge)badge.classList.add('current');
            const targets=document.querySelectorAll('.target-zone');let step=0;
            const t=setInterval(()=>{
                targets.forEach(e=>e.classList.remove('scanning')); targets[Math.floor(Math.random()*5)].classList.add('scanning'); step++;
                if(step>8){
                    clearInterval(t);
                    targets.forEach(e=>e.classList.remove('scanning'));
                    const winZone=document.querySelectorAll('.target-zone')[Math.floor(Math.random()*5)];
                    if(winZone) winZone.classList.add('active','winner');
                    btn.innerText=trans[curLang].next;btn.className='btn-signal next-step';btn.disabled=false;
                    addVirtualBalance(); triggerHaptic('success');
                }
            },80);
        }

        function cooldown(btn){
            let s=4;
            const textWait = trans[curLang].wait;
            const t=setInterval(()=>{
                btn.innerText=`${textWait} ${s}s`;s--;
                if(s<0){
                    clearInterval(t);
                    btn.innerText=trans[curLang].get_signal; btn.disabled=false;
                    if(activeGame==='penalty'&&!penState.active)btn.className='btn-signal';
                }
            },1000);
        }
    </script>
</body>
</html>
