<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Signal Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;500&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050000;
            --text-color: #ffffff;
            --brand-red: #ff334b; /* Фирменный красный */
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            height: 100vh;
            position: relative;
        }

        /* --- ОПТИМИЗИРОВАННЫЙ ФОН --- */
        /* Вместо тяжелых фильтров просто меняем цвет фона CSS анимацией */
        @keyframes colorCycle {
            0% { background-color: #1a0000; }   /* Dark Red */
            25% { background-color: #1a001a; }  /* Dark Purple */
            50% { background-color: #00001a; }  /* Dark Blue */
            75% { background-color: #001a1a; }  /* Dark Teal */
            100% { background-color: #1a0000; } /* Back to Red */
        }

        .background-animate {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            /* Радиальный градиент: Центр прозрачный (видно цвет анимации), края черные */
            background: radial-gradient(circle at center, transparent 0%, #000000 90%);
            animation: colorCycle 20s infinite linear; /* Очень плавная смена */
        }

        /* ЧАСТИЦЫ */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 10;
        }
        .screen.active { display: flex; }

        /* ЯЗЫК */
        .lang-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
        }
        select {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            outline: none;
            backdrop-filter: blur(5px);
            cursor: pointer;
            text-transform: uppercase;
        }
        option { background: #000; color: white; }

        /* МЕНЮ */
        .menu-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .game-card:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.08); }
        
        /* СТИЛЬ ДЛЯ КАРТИНОК В МЕНЮ */
        .game-img {
            width: 60px; /* Размер иконки */
            height: 60px;
            object-fit: contain;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2)); /* Легкое свечение */
            transition: 0.3s;
        }
        .game-card:hover .game-img { transform: scale(1.1); }

        .game-title { font-weight: 600; font-size: 14px; letter-spacing: 1px; color: #ddd; }

        /* SOON CARD */
        .card-disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none; /* Нельзя нажать */
            filter: grayscale(1); /* Черно-белый */
        }

        /* --- AVIATOR UI --- */
        
        .telegram-link {
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            color: var(--brand-red);
            border: 1px solid var(--brand-red);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 51, 75, 0.2);
            margin-bottom: 20px;
            margin-top: -40px;
            background: rgba(0, 0, 0, 0.4);
            transition: 0.3s;
            display: inline-block;
        }
        .telegram-link:active { transform: scale(0.95); }

        .aviator-logo-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }
        .aviator-logo-img {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(229, 11, 32, 0.6));
        }

        /* КРУГ */
        .circle-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .circle-glow {
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: transparent;
            /* Свечение меняется JS-ом синхронно с частицами */
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.1); 
            z-index: 0;
            transition: box-shadow 0.1s;
        }

        .progress-ring { transform: rotate(-90deg); z-index: 1; }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s ease-in-out;
            transform-origin: 50% 50%;
        }

        .coef-text {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-size: 52px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
            z-index: 2;
        }

        /* КНОПКА (Всегда Красная) */
        .btn-signal {
            background: linear-gradient(90deg, #d6002a 0%, #8a001a 100%);
            border: none;
            width: 80%;
            max-width: 300px;
            padding: 18px;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 5px 25px rgba(214, 0, 42, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 5;
        }
        .btn-signal:active { transform: scale(0.98); }
        .btn-signal:disabled { filter: grayscale(1); cursor: not-allowed; }
        .btn-signal::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        .btn-signal:hover::before { left: 100%; }

        .loader-bar-container {
            width: 80%;
            max-width: 300px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .loader-bar {
            height: 100%;
            width: 0%;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            transition: width 0.1s linear;
        }
        .loader-text {
            font-size: 12px; color: #aaa; margin-top: 8px; font-family: 'Orbitron', sans-serif;
            display: none; letter-spacing: 1px;
        }

        .btn-back {
            margin-top: 30px;
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }
        .btn-back:hover { border-color: #fff; color: #fff; }

        body.rtl { font-family: 'Cairo', sans-serif !important; direction: rtl; }
        body.rtl .menu-header, body.rtl .btn-signal, body.rtl .loader-text, body.rtl .btn-back, body.rtl select {
            font-family: 'Cairo', sans-serif !important; font-weight: 700;
        }
        body.rtl .coef-text { font-family: 'Orbitron', sans-serif !important; direction: ltr; }

    </style>
</head>
<body>

    <div class="background-animate"></div>
    <canvas id="particles-canvas"></canvas>

    <div class="lang-container">
        <select id="language-select" onchange="changeLanguage()">
            <option value="en">🇬🇧 EN</option>
            <option value="es">🇪🇸 ES</option>
            <option value="ms">🇲🇾 MS</option>
            <option value="ar">🇸🇦 AR</option>
        </select>
    </div>

    <!-- МЕНЮ -->
    <div id="screen-menu" class="screen active">
        <div class="menu-header" data-translate="choose_game">CHOOSE GAME</div>
        <div class="menu-grid">
            <!-- AVIATOR -->
            <div class="game-card" onclick="openGame('aviator')">
                <!-- Замени иконку на картинку -->
                <img src="/img/menu_aviator.png" class="game-img" alt="Aviator">
                <div class="game-title">AVIATOR</div>
            </div>
            
            <!-- PENALTY -->
            <div class="game-card" onclick="openGame('penalty')">
                <img src="/img/menu_penalty.png" class="game-img" alt="Penalty">
                <div class="game-title">PENALTY</div>
            </div>
            
            <!-- MINES (SOON) -->
            <!-- Добавил класс card-disabled, чтобы было видно что скоро -->
            <div class="game-card card-disabled">
                <img src="/img/menu_mines.png" class="game-img" alt="Mines">
                <div class="game-title">MINES (SOON)</div>
            </div>
            
            <!-- Заглушка (чтобы было 4 плитки, красиво) -->
            <div class="game-card card-disabled">
                <div style="font-size: 30px;">🔒</div>
                <div class="game-title">SOON...</div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="screen-game" class="screen">
        
        <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>

        <div class="aviator-logo-container">
            <img src="/img/aviator_logo.png" alt="Aviator" class="aviator-logo-img">
        </div>

        <div class="circle-container">
            <div class="circle-glow" id="circle-glow"></div>
            
            <svg class="progress-ring" width="260" height="260">
                <circle class="progress-ring__circle-bg" stroke="#222" stroke-width="6" fill="transparent" r="110" cx="130" cy="130"/>
                <circle class="progress-ring__circle" stroke="#ff334b" stroke-width="8" fill="transparent" r="110" cx="130" cy="130"
                        style="stroke-dasharray: 691; stroke-dashoffset: 691; stroke-linecap: round;"/>
            </svg>
            <div class="coef-text" id="coef-text">0.00x</div>
        </div>

        <button class="btn-signal" id="signal-btn" onclick="getAviatorSignal()" data-translate="get_signal">GET SIGNAL</button>
        
        <div class="loader-bar-container" id="loader-bar-container">
            <div class="loader-bar" id="loader-bar"></div>
        </div>
        <div class="loader-text" id="loader-text">...</div>

        <button class="btn-back" onclick="backToMenu()" data-translate="exit">EXIT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const translations = {
            en: { choose_game: "CHOOSE GAME", get_signal: "GET SIGNAL", exit: "EXIT", connecting: "Connecting...", analyzing: "Analyzing...", predicting: "Predicting...", wait: "NEXT IN", seconds: "s" },
            es: { choose_game: "ELIGE JUEGO", get_signal: "OBTENER SEÑAL", exit: "SALIR", connecting: "Conectando...", analyzing: "Analizando...", predicting: "Prediciendo...", wait: "SIGUIENTE", seconds: "s" },
            ms: { choose_game: "PILIH PERMAINAN", get_signal: "DAPATKAN SIGNAL", exit: "KELUAR", connecting: "Menyambung...", analyzing: "Menganalisis...", predicting: "Meramal...", wait: "SETERUSNYA", seconds: "s" },
            ar: { choose_game: "اختر اللعبة", get_signal: "احصل على إشارة", exit: "خروج", connecting: "جار الاتصال...", analyzing: "تحليل...", predicting: "تنبؤ...", wait: "التالي في", seconds: "ث" }
        };

        let currentLang = 'en';

        function changeLanguage() {
            const selector = document.getElementById('language-select');
            currentLang = selector.value;
            if (currentLang === 'ar') document.body.classList.add('rtl');
            else document.body.classList.remove('rtl');
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (translations[currentLang][key]) el.innerText = translations[currentLang][key];
            });
        }

        // --- ВЫСОКОПРОИЗВОДИТЕЛЬНАЯ АНИМАЦИЯ (CANVAS) ---
        const canvas = document.getElementById("particles-canvas");
        const ctx = canvas.getContext("2d");
        const circleGlow = document.getElementById("circle-glow");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;
        let hue = 0; // Переменная цвета для всего спектра

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.directionX = (Math.random() * 0.2) - 0.1;
                this.directionY = (Math.random() * 0.2) - 0.1;
                this.size = Math.random() * 2 + 0.5;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                // Используем HSL для супер-плавной смены цвета
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            // Оптимизация: меньше частиц на слабых экранах
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) particlesArray.push(new Particle());
        }

        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Плавно меняем цвет (hue) каждый кадр
            hue += 0.2; 
            
            // Применяем этот цвет к свечению круга (синхронизация)
            if(circleGlow) {
                 circleGlow.style.boxShadow = `0 0 60px hsla(${hue}, 100%, 50%, 0.2)`;
            }

            for (let i = 0; i < particlesArray.length; i++) particlesArray[i].update();
            connectParticles();
        }

        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance / 20000);
                        // Цвет линий тоже динамический HSL
                        ctx.strokeStyle = `hsla(${hue}, 100%, 50%, ${opacityValue})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });
        initParticles();
        animateParticles();

        const circle = document.querySelector('.progress-ring__circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;
        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function openGame(game) {
            // Mines пока отключен
            if(game === 'aviator' || game === 'penalty') {
                document.getElementById('screen-menu').classList.remove('active');
                document.getElementById('screen-game').classList.add('active');
            }
        }
        function backToMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }

        function getAviatorSignal() {
            const btn = document.getElementById('signal-btn');
            const textElement = document.getElementById('coef-text');
            const loaderBar = document.getElementById('loader-bar');
            const loaderContainer = document.getElementById('loader-bar-container');
            const loaderText = document.getElementById('loader-text');
            const t = translations[currentLang];

            if (btn.disabled) return;
            btn.disabled = true;

            loaderContainer.style.display = 'block';
            loaderText.style.display = 'block';
            loaderText.innerText = t.connecting;
            loaderBar.style.width = '0%';
            textElement.innerText = "0.00x";
            setProgress(0);
            
            let progress = 0;
            let interval = setInterval(() => {
                progress += Math.random() * 10;
                if(progress > 100) progress = 100;
                loaderBar.style.width = progress + '%';
                if (progress > 30) loaderText.innerText = t.analyzing;
                if (progress > 70) loaderText.innerText = t.predicting;
                if (progress >= 100) { clearInterval(interval); showResult(); }
            }, 150);

            function showResult() {
                loaderText.style.display = 'none';
                let result;
                if (Math.random() > 0.6) result = (Math.random() * (4.00 - 1.20) + 1.20).toFixed(2);
                else result = (Math.random() * (15.00 - 4.00) + 4.00).toFixed(2);
                animateValue(textElement, 1.00, parseFloat(result), 1000);
                setProgress(100); 
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                
                let cooldown = 5;
                const updateTimerBtn = () => { btn.innerHTML = `${t.wait} ${cooldown}${t.seconds}`; }
                updateTimerBtn();
                let cooldownTimer = setInterval(() => {
                    cooldown--;
                    updateTimerBtn();
                    if (cooldown <= 0) {
                        clearInterval(cooldownTimer);
                        btn.innerHTML = t.get_signal;
                        btn.disabled = false;
                        setProgress(0);
                        loaderContainer.style.display = 'none';
                    }
                }, 1000);
            }
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = (progress * (end - start) + start).toFixed(2) + "x";
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
