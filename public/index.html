<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Signal Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;500&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505; /* Почти черный */
            --text-color: #ffffff;
            --brand-red: #ff334b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            height: 100vh;
            position: relative;
        }

        /* --- ФОН "NEON SMOKE" (Туманность) --- */
        /* Это легкие цветные пятна, которые плавают на фоне */
        .fog-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            background: #000;
        }
        
        .fog-blob {
            position: absolute;
            filter: blur(80px); /* Сильное размытие для эффекта дыма */
            opacity: 0.6;
            animation: moveFog 20s infinite alternate ease-in-out;
            border-radius: 50%;
        }

        /* Красное пятно */
        .blob-1 {
            width: 300px; height: 300px;
            background: #4a0005;
            top: -50px; left: -50px;
            animation-duration: 25s;
        }
        /* Синее/Фиолетовое пятно */
        .blob-2 {
            width: 400px; height: 400px;
            background: #0f0025;
            bottom: -100px; right: -50px;
            animation-duration: 30s;
        }
        /* Центральное пятно */
        .blob-3 {
            width: 250px; height: 250px;
            background: #1a0000;
            top: 40%; left: 30%;
            animation-duration: 35s;
            opacity: 0.4;
        }

        @keyframes moveFog {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.2); }
        }

        /* --- ИНТЕРФЕЙС --- */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 10;
        }
        .screen.active { display: flex; }

        .lang-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
        }
        select {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            outline: none;
            backdrop-filter: blur(10px);
            cursor: pointer;
            text-transform: uppercase;
        }
        option { background: #000; color: white; }

        .menu-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        /* КАРТОЧКА ИГРЫ */
        .game-card {
            background: rgba(255, 255, 255, 0.05); /* Стекло */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .game-card:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.1); }
        
        /* ИКОНКА (App Icon Style) */
        .game-img {
            width: 75px;
            height: 75px;
            object-fit: cover;
            border-radius: 16px; /* Закругленный квадрат (как iOS) */
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* Тень */
            transition: 0.3s;
        }
        
        .game-card:hover .game-img { transform: scale(1.05); }

        .game-title { 
            font-weight: 600; font-size: 13px; letter-spacing: 1px; color: #eee; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* СТИЛЬ ДЛЯ НЕДОСТУПНЫХ (SOON) */
        .card-disabled {
            cursor: not-allowed;
            /* НЕ ДЕЛАЕМ ЧЕРНО-БЕЛЫМ, ОСТАВЛЯЕМ ЦВЕТ! */
            /* filter: grayscale(1);  <- УБРАЛИ ЭТО */
        }
        
        /* Затемнение поверх карточки (вуаль) */
        .card-disabled::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Полупрозрачный черный */
            z-index: 5;
            border-radius: 20px;
        }
        
        /* Замочек поверх затемнения */
        .lock-icon {
            position: absolute;
            top: 10px; right: 10px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            z-index: 6;
        }

        /* --- UI ИГРЫ --- */
        
        .telegram-link {
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            color: var(--brand-red);
            border: 1px solid rgba(255, 51, 75, 0.5);
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 14px;
            letter-spacing: 1px;
            background: rgba(20, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            margin-bottom: 20px;
            margin-top: -40px;
            transition: 0.3s;
            display: inline-block;
        }
        .telegram-link:active { transform: scale(0.95); background: rgba(255, 51, 75, 0.1); }

        .aviator-logo-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }
        .aviator-logo-img {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 51, 75, 0.4));
        }

        /* КРУГ */
        .circle-container {
            position: relative;
            width: 260px;
            height: 260px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* Свечение за кругом (статичное, но мягкое) */
        .circle-glow {
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 0 80px rgba(255, 51, 75, 0.25); 
            z-index: 0;
        }

        .progress-ring { transform: rotate(-90deg); z-index: 1; }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s ease-in-out;
            transform-origin: 50% 50%;
        }

        .coef-text {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-size: 52px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            z-index: 2;
        }

        .btn-signal {
            background: linear-gradient(90deg, #d6002a 0%, #8a001a 100%);
            border: none;
            width: 80%;
            max-width: 300px;
            padding: 18px;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(214, 0, 42, 0.2);
            transition: 0.3s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 5;
        }
        .btn-signal:active { transform: scale(0.98); }
        .btn-signal:disabled { filter: grayscale(1); cursor: not-allowed; }
        .btn-signal::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        .btn-signal:hover::before { left: 100%; }

        .loader-bar-container {
            width: 80%;
            max-width: 300px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .loader-bar {
            height: 100%;
            width: 0%;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            transition: width 0.1s linear;
        }
        .loader-text {
            font-size: 12px; color: #aaa; margin-top: 8px; font-family: 'Orbitron', sans-serif;
            display: none; letter-spacing: 1px;
        }

        .btn-back {
            margin-top: 30px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #aaa;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }
        .btn-back:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }

        body.rtl { font-family: 'Cairo', sans-serif !important; direction: rtl; }
        body.rtl .menu-header, body.rtl .btn-signal, body.rtl .loader-text, body.rtl .btn-back, body.rtl select {
            font-family: 'Cairo', sans-serif !important; font-weight: 700;
        }
        body.rtl .coef-text { font-family: 'Orbitron', sans-serif !important; direction: ltr; }

    </style>
</head>
<body>

    <!-- ФОНОВЫЙ ТУМАН (Без JS, только CSS) -->
    <div class="fog-container">
        <div class="fog-blob blob-1"></div>
        <div class="fog-blob blob-2"></div>
        <div class="fog-blob blob-3"></div>
    </div>

    <div class="lang-container">
        <select id="language-select" onchange="changeLanguage()">
            <option value="en">🇬🇧 EN</option>
            <option value="es">🇪🇸 ES</option>
            <option value="ms">🇲🇾 MS</option>
            <option value="ar">🇸🇦 AR</option>
        </select>
    </div>

    <!-- МЕНЮ -->
    <div id="screen-menu" class="screen active">
        <div class="menu-header" data-translate="choose_game">CHOOSE GAME</div>
        <div class="menu-grid">
            <!-- AVIATOR -->
            <div class="game-card" onclick="openGame('aviator')">
                <img src="/img/menu_aviator.png" class="game-img" alt="Aviator">
                <div class="game-title">AVIATOR</div>
            </div>
            
            <!-- PENALTY -->
            <div class="game-card" onclick="openGame('penalty')">
                <img src="/img/menu_penalty.png" class="game-img" alt="Penalty">
                <div class="game-title">PENALTY</div>
            </div>
            
            <!-- MINES (SOON) -->
            <!-- Цветная картинка, но под темной вуалью -->
            <div class="game-card card-disabled">
                <div class="lock-icon">🔒</div> <!-- Иконка замка -->
                <img src="/img/menu_mines.png" class="game-img" alt="Mines">
                <div class="game-title">MINES (SOON)</div>
            </div>
            
            <!-- Заглушка -->
            <div class="game-card card-disabled">
                <div class="lock-icon">🔒</div>
                <div style="font-size: 40px; margin-bottom: 10px; opacity: 0.5;">🎲</div>
                <div class="game-title">SOON...</div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <div id="screen-game" class="screen">
        
        <a href="https://t.me/Omarsupportbot" class="telegram-link">@Omarsupportbot</a>

        <div class="aviator-logo-container">
            <img src="/img/aviator_logo.png" alt="Aviator" class="aviator-logo-img">
        </div>

        <div class="circle-container">
            <div class="circle-glow"></div>
            
            <svg class="progress-ring" width="260" height="260">
                <circle class="progress-ring__circle-bg" stroke="#1a1a1a" stroke-width="6" fill="transparent" r="110" cx="130" cy="130"/>
                <circle class="progress-ring__circle" stroke="#ff334b" stroke-width="8" fill="transparent" r="110" cx="130" cy="130"
                        style="stroke-dasharray: 691; stroke-dashoffset: 691; stroke-linecap: round;"/>
            </svg>
            <div class="coef-text" id="coef-text">0.00x</div>
        </div>

        <button class="btn-signal" id="signal-btn" onclick="getAviatorSignal()" data-translate="get_signal">GET SIGNAL</button>
        
        <div class="loader-bar-container" id="loader-bar-container">
            <div class="loader-bar" id="loader-bar"></div>
        </div>
        <div class="loader-text" id="loader-text">...</div>

        <button class="btn-back" onclick="backToMenu()" data-translate="exit">EXIT</button>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const translations = {
            en: { choose_game: "CHOOSE GAME", get_signal: "GET SIGNAL", exit: "EXIT", connecting: "Connecting...", analyzing: "Analyzing...", predicting: "Predicting...", wait: "NEXT IN", seconds: "s" },
            es: { choose_game: "ELIGE JUEGO", get_signal: "OBTENER SEÑAL", exit: "SALIR", connecting: "Conectando...", analyzing: "Analizando...", predicting: "Prediciendo...", wait: "SIGUIENTE", seconds: "s" },
            ms: { choose_game: "PILIH PERMAINAN", get_signal: "DAPATKAN SIGNAL", exit: "KELUAR", connecting: "Menyambung...", analyzing: "Menganalisis...", predicting: "Meramal...", wait: "SETERUSNYA", seconds: "s" },
            ar: { choose_game: "اختر اللعبة", get_signal: "احصل على إشارة", exit: "خروج", connecting: "جار الاتصال...", analyzing: "تحليل...", predicting: "تنبؤ...", wait: "التالي في", seconds: "ث" }
        };

        let currentLang = 'en';

        function changeLanguage() {
            const selector = document.getElementById('language-select');
            currentLang = selector.value;
            if (currentLang === 'ar') document.body.classList.add('rtl');
            else document.body.classList.remove('rtl');
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (translations[currentLang][key]) el.innerText = translations[currentLang][key];
            });
        }

        const circle = document.querySelector('.progress-ring__circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = circumference;
        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function openGame(game) {
            if(game === 'aviator' || game === 'penalty') {
                document.getElementById('screen-menu').classList.remove('active');
                document.getElementById('screen-game').classList.add('active');
            }
        }
        function backToMenu() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-menu').classList.add('active');
        }

        function getAviatorSignal() {
            const btn = document.getElementById('signal-btn');
            const textElement = document.getElementById('coef-text');
            const loaderBar = document.getElementById('loader-bar');
            const loaderContainer = document.getElementById('loader-bar-container');
            const loaderText = document.getElementById('loader-text');
            const t = translations[currentLang];

            if (btn.disabled) return;
            btn.disabled = true;

            loaderContainer.style.display = 'block';
            loaderText.style.display = 'block';
            loaderText.innerText = t.connecting;
            loaderBar.style.width = '0%';
            textElement.innerText = "0.00x";
            setProgress(0);
            
            let progress = 0;
            let interval = setInterval(() => {
                progress += Math.random() * 10;
                if(progress > 100) progress = 100;
                loaderBar.style.width = progress + '%';
                if (progress > 30) loaderText.innerText = t.analyzing;
                if (progress > 70) loaderText.innerText = t.predicting;
                if (progress >= 100) { clearInterval(interval); showResult(); }
            }, 150);

            function showResult() {
                loaderText.style.display = 'none';
                let result;
                if (Math.random() > 0.6) result = (Math.random() * (4.00 - 1.20) + 1.20).toFixed(2);
                else result = (Math.random() * (15.00 - 4.00) + 4.00).toFixed(2);
                animateValue(textElement, 1.00, parseFloat(result), 1000);
                setProgress(100); 
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                
                let cooldown = 5;
                const updateTimerBtn = () => { btn.innerHTML = `${t.wait} ${cooldown}${t.seconds}`; }
                updateTimerBtn();
                let cooldownTimer = setInterval(() => {
                    cooldown--;
                    updateTimerBtn();
                    if (cooldown <= 0) {
                        clearInterval(cooldownTimer);
                        btn.innerHTML = t.get_signal;
                        btn.disabled = false;
                        setProgress(0);
                        loaderContainer.style.display = 'none';
                    }
                }, 1000);
            }
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = (progress * (end - start) + start).toFixed(2) + "x";
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
